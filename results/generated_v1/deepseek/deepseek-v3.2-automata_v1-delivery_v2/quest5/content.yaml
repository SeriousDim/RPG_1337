quest:
  explanation:
    destination:
      character_to_deliver: Выбран Гном Брок из Гномьих Копей, так как у него в списке
        принимаемых предметов (items_can_be_accepted_for_delivery_or_collection) есть
        Железо (ранг 2). Его локация отличается от локации Гаррика, что соответствует
        требованию. Его профиль (гном в копях) логично связан с рудой и кузнечным
        делом.
      dialogs: Диалог с Гномом Броком подтверждает успешное выполнение задания, содержит
        благодарность и логичное вручение награды. Персонажи отправителя и получателя
        различны, как и требуется.
      reward: Гном Брок в списке выдаваемых предметов имеет Железную кирку (ранг 2).
        Её ранг превышает ранг Деревянной кирки (ранг 1), которая уже есть у игрока
        в инвентаре. Таким образом, награда является улучшением, не дублирует имеющийся
        у игрока предмет и строго соответствует данным мира.
    enemy_to_face:
      amount: Установлено количество 2 врага, чтобы вызов был ощутимым (прогресс статистики
        enemies_killed), но не непреодолимым для игрока с его уроном и здоровьем.
      dialogs: Диалог спроектирован так, чтобы объяснить столкновение логикой ограбления
        на дороге. Противники хотят отобрать ценный ресурс. Реплики игрока подчеркивают
        его цель и решимость.
      enemy: Выбран Лесной разбойник (ранг 1). Игрок имеет 100 HP и деревянный меч
        (2 урона за ход). Два разбойника имеют 28 HP каждый и наносят 4 урона за ход
        каждый. Без брони игрок может победить их, получив урон (~56 HP максимум),
        что оставит его живым. Это сбалансированная угроза для его уровня.
    resource_to_deliver:
      amount: Количество установлено в 3 единицы, чтобы задача была значимой, но выполнимой
        для новичка, и логично соответствовала потребностям ремесленника в партии
        инструментов.
      character: Выбран Гаррик Кузнец из Королевской столицы, так как он имеет в списке
        принимаемых предметов железную руду. Он логичный отправитель задания, связанного
        с ресурсом для ремесла.
      dialogs: Выбран диалог с Гарриком Кузнецом, который логично отправляет игрока,
        так как у него уже есть соответствующий инструмент (деревянная кирка). Диалог
        объясняет цель, местонахождение ресурса, причины поручения и дает наставление.
      resource: Выбрана железная руда (ранг 2), так как деревянная кирка игрока имеет
        ранг 1, а минимальный ранг инструмента для добычи железа - 1. Игрок может
        ее добыть. Одуванчик и уголь также подходят по рангу, но железо логичнее для
        заданий от кузнеца.
  objective_description: Добудь 3 единицы железной руды в Подорожниковом Бору для
    нужд Гнома Брока и доставь их ему в Гномьи Копи.
  parts:
    destination:
      character_to_deliver: Гном Брок
      dialogs:
      - remark: Ну что, тебя Гаррик прислал? Показывай, что принес!
        speaker: Гном Брок
      - remark: Отлично! Все три куска железной руды на месте. Качество неплохое.
        speaker: Гном Брок
      - remark: Теперь я смогу закончить партию кирок для новых шахтеров. Кузнец не
          ошибся в тебе, парень.
        speaker: Гном Брок
      - remark: Ты не только руду добыл, но и от разбойников отбился. Заслужил награду.
          Возьми эту железную кирку – она тебе пригодится больше, чем старая деревянная.
        speaker: Гном Брок
      - remark: Передай привет Гаррику, когда будешь в столице. И спасибо за помощь!
        speaker: Гном Брок
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Эй, ты! Что это ты несёшь такое блестящее? Похоже на ценную руду.
        speaker: Лесной разбойник
      - remark: Оставь свою ношу здесь, и можешь идти с миром. Не то мы сами возьмем!
        speaker: Лесной разбойник
      - remark: Не думай, что твой деревянный меч нас пугает. Нас двое против одного.
        speaker: Лесной разбойник
      - remark: Эта руда нужна для важного дела в Гномьих Копях. Я не отдам ее вам.
        speaker: Игрок
      - remark: Значит, будет по-нашему! В атаку!
        speaker: Лесной разбойник
      enemy: Лесной разбойник
    resource_to_deliver:
      amount: 3
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую, путник! Ты мне очень нужен. Мой старый коллега, Гном
          Брок из Гномьих Копей, работает над новой партией железных кирок. Однако
          ему срочно нужна железная руда для плавки.
        speaker: Гаррик Кузнец
      - remark: Обычно я бы отправил своего подмастерья, но он заболел. Смог бы ты
          помочь? Тебе нужно будет добыть для него железную руду.
        speaker: Гаррик Кузнец
      - remark: Железную руду ты найдешь в Подорожниковом Бору. У тебя есть деревянная
          кирка – ее ранга достаточно для добычи.
        speaker: Гаррик Кузнец
      - remark: Нужно собрать три куска руды. Это минимум, который требуется Броку
          для начала работы.
        speaker: Гаррик Кузнец
      - remark: Собери железо и немедленно отправляйся с ним в Гномьи Копи. Брок тебя
          ждет. Будь осторожен в лесу!
        speaker: Гаррик Кузнец
      resource: Железо
  reward:
    item_name: Железная кирка
