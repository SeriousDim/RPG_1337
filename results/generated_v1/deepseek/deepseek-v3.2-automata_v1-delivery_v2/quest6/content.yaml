quest:
  explanation:
    destination:
      character_to_deliver: Травница Марта. Она находится в другой локации (Деревня
        Речных Лугов), что заставляет игрока путешествовать. Она логично связана с
        Гарриком (оба ремесленники) и может принять уголь (он есть в её списке items_can_be_accepted_for_delivery_or_collection).
        Персонажи отличаются.
      dialogs: Диалог завершает цикл доставки, даёт лор (Марте нужен уголь для зелий),
        создаёт ощущение связанности мира и вручает награду. Персонаж дружелюбный
        и благодарный.
    enemy_to_face:
      amount: 1 противник. Для первого боя и уровня игрока одного слабого противника
        достаточно, чтобы не создавать угрозы смерти и дать уверенность.
      dialogs: Диалог короткий, агрессивный, объясняет мотивацию нападения (грабёж)
        и даёт игроку почувствовать себя героем, защищающим груз. Враг показан слабым
        и трусоватым, что соответствует его игровым характеристикам (низкий урон и
        здоровье).
      enemy: Гоблин-вор. Это противник ранга 1 с умеренным здоровьем (24) и небольшим
        уроном (3). С учётом оружия игрока (2 урона за ход) и его полного здоровья
        (100), бой будет лёгким, но не автоматическим, обучая игрока базовой механике
        сражений.
    objective_description: Описание чётко указывает цель (добыть и доставить), ресурс,
      его количество и двух NPC без спойлеров о встрече с врагом, чтобы сохранить
      элемент неожиданности.
    resource_to_deliver:
      amount: 3 единицы. Это небольшое, но не тривиальное количество, которое потребует
        от игрока нескольких действий по добыче, но не вызовет чрезмерного гринда
        на самом старте.
      character: Выбран Гаррик Кузнец, так как он находится в стартовой локации (Королевская
        столица), принимает уголь (ресурс ранга 1) и может логично делегировать доставку
        другому персонажу.
      dialogs: Диалог построен на введении в мир, объяснении простой задачи (добыча
        ресурса 1-го ранга) и установке цели доставки другому персонажу. Уголь — базовый
        ресурс, соответствующий инструменту игрока (деревянная кирка, ранг 1). Количество
        (3) — небольшая, но значимая цель для новичка. Упоминание об опасности плавно
        подводит к следующей части квеста.
      resource: 'Уголь. Это ресурс ранга 1, который можно добыть деревянной киркой
        (ранг 1), имеющейся у игрока. Соответствует min_instrument_rank: 1.'
    reward: Каменный меч (урон 4, ранг 2). Это значимое улучшение по сравнению с текущим
      Деревянным мечом (урон 2). Данный предмет есть в списке наград у Травницы Марты,
      и его ещё нет в инвентаре игрока, что соответствует требованию.
  objective_description: Добудь 3 единицы угля на Одуванчиковой Поляне и доставь его
    травнице Марте в Деревню Речных Лугов.
  parts:
    destination:
      character_to_deliver: Травница Марта
      dialogs:
      - remark: Ох, и кто это к нам пожаловал? Не часто тут видят незнакомцев.
        speaker: Травница Марта
      - remark: Уголь? Ах, да, да! Гаррик писал, что пришлёт помощника. Спасибо, что
          доставил.
        speaker: Травница Марта
      - remark: Старый ворчун вечно занят, а мне для отваров нужны угли особого жара.
          Твой как раз подойдёт.
        speaker: Травница Марта
      - remark: Вот, возьми это за труды. Небогатый подарок, но для начала пути сгодится.
          Удачи тебе, путник.
        speaker: Травница Марта
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Стой! Что это у тебя блестит? А, уголь... Скучно.
        speaker: Гоблин-вор
      - remark: Но раз уж встретились, оставь всё, что у тебя есть! Или мы сами возьмём!
        speaker: Гоблин-вор
      - remark: Я только выполняю заказ для кузнеца. Уступите дорогу.
        speaker: Игрок
      - remark: Ха! Кузнец? Он богатый! Значит, и у тебя заплатил хорошо! В атаку!
        speaker: Гоблин-вор
      - remark: Ай! Он деревянным мечом бьётся! Не так-то он и слаб!
        speaker: Гоблин-вор
      - remark: Всё, я сдаюсь! Забирай свой чёрный камень и проваливай!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 3
      character: Гаррик Кузнец
      dialogs:
      - remark: А, новое лицо! Добро пожаловать в мою кузницу. Работы невпроворот,
          а помощников не хватает.
        speaker: Гаррик Кузнец
      - remark: Для новых заказов мне постоянно нужен уголь. Без него огонь в горне
          не разгорится.
        speaker: Гаррик Кузнец
      - remark: Не мог бы ты помочь? На окраине города, на Одуванчиковой Поляне, есть
          залежи угля.
        speaker: Гаррик Кузнец
      - remark: Возьми свою деревянную кирку и добудь мне, скажем... 3 куска угля.
          Должно хватить на пару дней работы.
        speaker: Гаррик Кузнец
      - remark: Будь осторожен на дорогах. Говорят, в тех краях орудуют мелкие воришки.
          Но с твоим мечом справишься.
        speaker: Гаррик Кузнец
      - remark: Как добудешь уголь, отнеси его моей знакомой, травнице Марте, в Деревню
          Речных Лугов. У неё для меня кое-что есть.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Каменный меч
