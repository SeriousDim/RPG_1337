quest:
  explanation:
    destination:
      character_to_deliver: Кузнец Роган. Он также находится в Королевской столица,
        что делает доставку логичной и короткой. Он отличается от Гаррика, выполняя
        требование задания. Роган имеет в списке наград деревянный щит, который идеально
        подходит как первая награда в броне.
      dialogs: Диалог с Роганом подтверждает успешную доставку, объясняет логику передачи
        (оба кузнецы в столице), и дает награду. Диалог также устанавливает Рогана
        как потенциального будущего контакта для квестов с более высокими рангами
        (он принимает Олово и Бриллиант).
    enemy_to_face:
      amount: 2 противника. Это создает небольшую, но ощутимую опасность после добычи
        ресурса. С учетом урона игрока (2 на одного врага) и здоровья врагов (20),
        бой будет коротким, но требующим внимания.
      dialogs: Диалог для противников минимальный и стереотипный, поскольку пещерные
        крысы — неразумные существа. Их реакция описана через звуки и действия, связанные
        с защитой территории/ресурса.
      enemy: Пещерная крыса. Это враг ранга 1, самый слабый в списке (20 здоровья,
        2 урона за ход). Игрок с деревянным мечом (2 урона на одного врага) может
        убить ее за 10 ударов (20 здоровья / 2 урона), что приемлемо для первого уровня.
        У игрока 100 здоровья, поэтому даже две крысы не представляют смертельной
        угрозы.
    resource_to_deliver:
      amount: 10 единиц. Достаточное количество для ощущения выполненной работы, но
        не чрезмерное для первого квеста.
      character: Гаррик Кузнец — идеальный стартовый персонаж. Он находится в Королевской
        столица (близко к игроку), принимает уголь (ресурс ранга 1), и может логично
        делегировать доставку другому кузнецу в той же локации.
      dialogs: Диалог с Гарриком Кузнецом построен вокруг логичной для него потребности
        в базовом ресурсе (угле), его доступности для игрока уровня 1 (уголь требует
        кирку ранга 1, которая у игрока есть), и объяснения следующего шага (доставка
        другому персонажу). Диалог также мягко предупреждает об опасности.
      resource: Уголь. Ресурс ранга 1, который можно добыть деревянной киркой (ранг
        1), имеющейся у игрока. Соответствует его текущим возможностям.
  objective_description: Добыть 10 единиц угля в Одуванчиковой Поляне и доставить
    их кузнецу Рогану в Королевской столице.
  parts:
    destination:
      character_to_deliver: Кузнец Роган
      dialogs:
      - remark: А, это ты! Гаррик сообщил, что отправляет помощника. Уголь принес?
        speaker: Кузнец Роган
      - remark: Отлично! Без него я не могу начать плавить высококачественные металлы.
          Олово и бриллианты требуют точного температурного контроля.
        speaker: Кузнец Роган
      - remark: Спасибо за работу. Гаррик всегда находит надежных людей. В качестве
          оплаты... у меня есть небольшой запас.
        speaker: Кузнец Роган
      - remark: Деревянный щит. Не самый прочный, но для начала он защитит тебя от
          первых ударов. У тебя такого еще нет, верно?
        speaker: Кузнец Роган
      - remark: Возьми его. И если будет нужна еще работа - знай, я всегда в поиске
          редких руд для своих экспериментов.
        speaker: Кузнец Роган
      - remark: Береги себя. И передай Гаррику, что поставка принята.
        speaker: Кузнец Роган
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: '*Злобный писк*'
        speaker: Пещерная крыса
      - remark: '*Шипит, увидев уголь*'
        speaker: Пещерная крыса
      - remark: '*Пытается схватить кусок угля*'
        speaker: Пещерная крыса
      - remark: '*Атакует, защищая свою территорию*'
        speaker: Пещерная крыса
      - remark: '*Свирепо визжит*'
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 10
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую, путник. Вижу, ты еще новичок в наших краях. Работы в
          кузнице много, а уголь для плавильных печей почти закончился.
        speaker: Гаррик Кузнец
      - remark: Недалеко от столицы есть Одуванчиковая Поляна. Там в скалах можно
          найти угольные залежи. Это сырье первого уровня, подойдет даже для деревянной
          кирки.
        speaker: Гаррик Кузнец
      - remark: Если ты мне принесешь хотя бы 10 единиц угля, я смогу продолжить работу.
          А в качестве благодарности... у меня есть что предложить.
        speaker: Гаррик Кузнец
      - remark: Но будь осторожен! По слухам, в тех местах последнее время орудует
          мелкая шушара - пещерные крысы. Они не сильны, но могут напасть, если почуют
          добычу.
        speaker: Гаррик Кузнец
      - remark: Собрав уголь, отнеси его моему брату, кузнецу Рогану. Он работает
          на другой стороне столицы и ждет поставок.
        speaker: Гаррик Кузнец
      - remark: 'Ну что, берешься? У тебя есть для этого все необходимое: деревянная
          кирка для добычи и меч для защиты.'
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Деревянный щит
