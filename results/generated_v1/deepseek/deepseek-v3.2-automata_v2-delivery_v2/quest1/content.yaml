quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь. Она отличается от квестодателя (Гаррик),
        как и требуется. Она входит в список сгенерированных персонажей, логично связана
        с целебными ресурсами и имеет в списке наград инструмент, подходящий игроку.
      dialogs: Выбрана Лира Лекарь как получатель. Она находится в другой локации
        (Деревня Речных Лугов), что отвечает требованию 'доставки'. Её диалог благодарит
        игрока, объясняет важность доставленного ресурса для мира и вручает награду.
    enemy_to_face:
      amount: '1 противник. Для первого квеста и слабого оружия игрока (enemies_to_hit:
        1) бой с одним слабым противником является адекватным испытанием, не ведущим
        к гарантированной смерти.'
      dialogs: Враги (Пещерные крысы) не разговаривают осмысленно, поэтому реплики
        от их имени — это звуки (визг, скрежет), описывающие агрессивное поведение.
        Это соответствует низкоуровневой твари.
      enemy: Пещерная крыса. Это враг ранга 1 с низкими показателями здоровья (20)
        и урона (2). Игрок с 'Деревянным мечом' (урон 2) сможет победить её за 10
        ударов (20 HP / 2 урон), получив при этом небольшой урон, что соответствует
        балансу для уровня 1.
    resource_to_deliver:
      amount: 5 единиц. Достаточное количество, чтобы ощутить процесс добычи, но не
        чрезмерное для первого квеста, учитывая слабый инструмент и низкий уровень
        героя.
      character: Гаррик Кузнец. Он есть в игре, находится в Королевской столице, имеет
        в списке запрашиваемых ресурсов 'Уголь'. Идеально подходит как стартовый квестодатель.
      dialogs: Выбран Гаррик Кузнец, так как он находится в стартовой локации (Королевская
        столица) и связан с ресурсами низкого ранга. Его диалог объясняет логику квеста
        (нужда лекаря), конкретизирует задание и локацию (Одуванчиковая Поляна), соответствующую
        рангу игрока. Ресурс (Уголь, ранг 1) соответствует инструменту игрока (Деревянная
        кирка, ранг 1). Количество (5) достаточно для прогресса, но не является изнурительным.
      resource: 'Уголь. Это ресурс ранга 1 (ore rank: 1). Для его добычи требуется
        инструмент с min_instrument_rank: 1. У игрока есть ''Деревянная кирка'' (rank:
        1), что соответствует требованию. Это логичный первый шаг.'
    reward:
      item_name: Деревянная лопата. Это инструмент ранга 1, которого нет в текущем
        инвентаре игрока (у него есть Деревянный меч и Деревянная кирка). Награда
        логична для лекаря, который собирает травы, и полезна игроку для последующего
        сбора ресурсов типа 'трава' (например, Подорожник).
  objective_description: Доставить целебный уголь из Королевской столицы лекарю в
    Деревню Речных Лугов.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: О, это уголь от Гаррика? Наконец-то! Я уже начала волноваться.
        speaker: Лира Лекарь
      - remark: Благодаря этому я смогу приготовить настои и мази. В деревне у многих
          осенняя лихорадка.
        speaker: Лира Лекарь
      - remark: Ты проделал долгий путь, да еще и с грузом. Спасибо тебе, странник.
        speaker: Лира Лекарь
      - remark: Я мало что могу предложить взамен, но у меня есть старая, но надежная
          лопата. Возьми её. Она пригодится для сбора целебных трав.
        speaker: Лира Лекарь
      - remark: И если вдруг поранишься в походах — заходи, полечу. Удачи!
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: '*Пронзительный визг*'
        speaker: Пещерная крыса
      - remark: '*Скрежет когтей по камню*'
        speaker: Пещерная крыса
      - remark: '*Агрессивно выпрыгивает из норы, привлеченная шумом добычи*'
        speaker: Пещерная крыса
      - remark: '*Пытается укусить за ногу*'
        speaker: Пещерная крыса
      - remark: '*Издает предсмертный писк и отступает*'
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 5
      character: Гаррик Кузнец
      dialogs:
      - remark: А, новый искатель приключений! Нужны средства, чтобы разжечь горны?
          У меня для тебя есть работа.
        speaker: Гаррик Кузнец
      - remark: Лире, местному лекарю в Деревне Речных Лугов, срочно нужен уголь.
          Без него она не сможет готовить снадобья.
        speaker: Гаррик Кузнец
      - remark: Её запасы кончились, а торговый караван задерживается. Без лекарств
          люди начнут болеть.
        speaker: Гаррик Кузнец
      - remark: Добудь для нее 5 единиц угля на старой Одуванчиковой Поляне. Там рудные
          выходы рядом с цветами.
        speaker: Гаррик Кузнец
      - remark: С твоей деревянной киркой справишься. Копай у темных скальных образований.
          Добыл — вези Лире.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Деревянная лопата
