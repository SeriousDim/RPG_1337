quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь. Она отличается от Гаррика Кузнеца, как и
        требуется. Она находится в другой локации (Деревня Речных Лугов), что соответствует
        типу квеста 'Доставка'. Ее ранг (2) чуть выше, что задает легкое направление
        для развития.
      dialogs: Диалог содержит 6 реплик. Он создает небольшую narrative twist (уголь
        предназначался не напрямую этому персонажу), объясняет логику доставки (обмен
        между NPC), подтверждает завершение задачи и плавно подводит к награде.
    enemy_to_face:
      amount: 2 противника. Это создает легкий, но не тривиальный вызов для игрока
        1 уровня с деревянным мечом. Бой продемонстрирует игроку базовую боевую механику.
      dialogs: Диалог состоит из 2 реплик, описывающих звуки и поведение врага. Так
        как враг - животное, оно не ведет осмысленных разговоров, что соответствует
        сеттингу.
      enemy: Пещерная крыса. Это враг самого низкого ранга (1) с небольшим уроном
        (2) и здоровьем (20). С учетом оружия игрока (урон 2) и его полного здоровья
        (100), бой с двумя такими противниками будет посильным, но потребует внимания.
    resource_to_deliver:
      amount: 5 единиц. Это небольшое, но ощутимое количество для первого квеста,
        которое не займет у игрока слишком много времени.
      character: Выбран Гаррик Кузнец, так как он находится в стартовой локации (Королевская
        столица), соответствует уровню игрока (rank 1) и среди ресурсов, которые он
        принимает, есть Уголь (rank 1).
      dialogs: Диалог содержит 5 реплик. Он объясняет причину запроса (нехватка угля
        для заказа гвардии), указывает локацию (Одуванчиковая Поляна), упоминает инструмент
        игрока (у него есть кирка) и четко ставит задачу.
      resource: Уголь. Это ресурс rank 1, для добычи которого нужна кирка минимального
        ранга (1). У игрока в инвентаре есть 'Деревянная кирка' rank 1, что делает
        добычу возможной.
  objective_description: Накопать 5 единиц угля по просьбе кузнеца Гаррика и доставить
    их получателю в Деревне Речных Лугов.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: О, посланник? Что ты принес?
        speaker: Лига Лекарь
      - remark: Уголь. Мне сказали, он нужен вам.
        speaker: Игрок
      - remark: Мне? О нет, это ошибка. Уголь мне не нужен... Подожди-ка.
        speaker: Лига Лекарь
      - remark: На ящике записка от Гаррика. 'Если принесет уголь - это для моей новой
          плавильной печи. Прими, я за твои травы рассчитаюсь. Спасибо'.
        speaker: Лига Лекарь
      - remark: Хитрый кузнец! Ладно, оставь уголь здесь. А это передай ему от меня.
        speaker: Лига Лекарь
      - remark: И спасибо за доставку. Дороги стали небезопасны.
        speaker: Лига Лекарь
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: '*Пронзительный писк*'
        speaker: Пещерная крыса
      - remark: '*Шуршит в груде камней, почуяв запах добычи*'
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 5
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую, путник. Нужна мне помощь. Производство встало.
        speaker: Гаррик Кузнец
      - remark: Королевская гвардия заказала новые доспехи, а у меня кончился самый
          базовый компонент - уголь.
        speaker: Гаррик Кузнец
      - remark: Поблизости от столицы есть Одуванчиковая Поляна. Там встречаются небольшие
          жилы бурого угля.
        speaker: Гаррик Кузнец
      - remark: У тебя с собой есть кирка. Это как раз то, что нужно.
        speaker: Гаррик Кузнец
      - remark: Сможешь накопать мне 5 кусков? Я заплачу, чем смогу.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Позолоченный щит
