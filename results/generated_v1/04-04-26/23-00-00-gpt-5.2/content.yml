quest:  
  parts:    
    resource_to_deliver:      
      dialogs:        
        - speaker: Гаррик Кузнец          
          remark: "Эй, новобранец. В столице сейчас каждый гвоздь на счету."        
        - speaker: Гаррик Кузнец          
          remark: "Мне нужен один кусок угля — срочно, без него горн встанет."        
        - speaker: Гаррик Кузнец          
          remark: "Я сам не могу уйти: очередь у наковальни не кончается."        
        - speaker: Гаррик Кузнец          
          remark: "Отнеси уголь Лире Лекарь в Деревню Речных Лугов. Она попросила топливо для своих смесей."        
        - speaker: Гаррик Кузнец         
          remark: "Держи. Запечатай в мешочке и не рассыпь по дороге."        
        - speaker: Гаррик Кузнец         
          remark: "По тракту шныряют мелкие воры. Если полезут — держи меч крепче."      
      resource: Уголь      
      amount: 1    
    enemy_to_face:      
      dialogs:        
        - speaker: Гоблин-вор          
          remark: "О-о! Мешочек звенит и пахнет костром!"        
        - speaker: Гоблин-вор          
          remark: "Давай сюда! Уголь мне нужнее!"        
        - speaker: Гоблин-вор          
          remark: "Не отдашь — порежу ремень и уроню твой груз!"        
        - speaker: Гоблин-вор          
          remark: "Эй, человек, не геройствуй, я быстрый!"        
        - speaker: Гоблин-вор          
          remark: "Ладно-ладно... тогда дерись!"      
      enemy: Гоблин-вор      
      amount: 1    
    destination:      
      dialogs:        
        - speaker: Лира Лекарь         
          remark: "Ты от Гаррика? Я ждала вестей из столицы."
        - speaker: Лира Лекарь          
          remark: "Покажи мешочек... да, это уголь. Отлично, не отсырел."        
        - speaker: Лира Лекарь          
          remark: "С ним я смогу прогреть настои и очистить ступку после трав."        
        - speaker: Лира Лекарь         
          remark: "По дороге никто не отнял груз?"        
        - speaker: Лира Лекарь         
          remark: "Хорошо. Тогда держи награду — тебе пригодится защита в пути."        
        - speaker: Лира Лекарь          
          remark: "Если снова будешь в Речных Лугах — загляни, я всегда найду дело."      
      character_to_deliver: Лира Лекарь  
  objective_description: "В Королевской столице возьми у Гаррика Кузнеца 1 Уголь, по пути одолей 1 Гоблин-вор и доставь уголь Лире Лекарь в Деревню Речных Лугов."  
  reward:    
    item_name: Деревянный щит  
  explanation: "Игрок 1 уровня без брони и с Деревянным мечом (урон 2) подходит для короткого квеста доставки с одним противником ранга 1. Ресурс выбран из доступных у Гаррика (Уголь, мин. ранг инструмента 1), а получатель — Лира Лекарь, существующий персонаж в Деревне Речных Лугов. Встречный враг — Гоблин-вор ранга 1, что соответствует стартовой сложности. Награда Деревянный щит из списка брони ранга 1 усиливает выживаемость новичка, не нарушая прогрессии мира."
