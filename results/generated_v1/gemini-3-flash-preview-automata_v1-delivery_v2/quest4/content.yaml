quest:
  explanation:
    destination:
      character_to_deliver: Лорд Дрейк выбран в качестве получателя, так как он официально
        принимает уголь согласно списку игрового мира.
      dialogs: Завершающий диалог в Высоком Замке закрывает сюжетную арку доставки
        и обосновывает выдачу брони.
    enemy_to_face:
      amount: 2 противника создают умеренную сложность, учитывая 100 HP игрока.
      dialogs: Диалог подчеркивает агрессивную природу противника, встречающегося
        на пути доставки.
      enemy: Гоблин-вор выбран, так как его характеристики (24 HP, 3 урона) позволяют
        игроку 1-го уровня с деревянным мечом выйти победителем.
    resource_to_deliver:
      amount: 5 единиц — оптимальное количество для стартового квеста, требующее времени,
        но не переутомляющее игрока.
      character: Гаррик Кузнец выбран, так как он находится в стартовой локации и
        работает с ресурсами.
      dialogs: Диалог устанавливает связь между столицей и замком, используя персонажа
        Гаррика как квестодателя, что логично для его профессии.
      resource: Уголь выбран, так как он имеет 1-й ранг и может быть добыт деревянной
        киркой игрока (Rank 1).
  objective_description: Соберите 5 единиц угля на Одуванчиковой Поляне и доставьте
    их Лорду Дрейку в Высокий Замок по поручению Гаррика Кузнеца.
  parts:
    destination:
      character_to_deliver: Лорд Дрейк
      dialogs:
      - remark: Ваша Светлость, я прибыл из Королевской столицы от кузнеца Гаррика.
        speaker: Игрок
      - remark: Наконец-то. В залах становится прохладно. Ты принес то, что я просил?
        speaker: Лорд Дрейк
      - remark: Да, здесь 5 единиц отборного угля с Одуванчиковой Поляны.
        speaker: Игрок
      - remark: Отлично. Но я вижу кровь на твоей одежде. Столкнулся с трудностями?
        speaker: Лорд Дрейк
      - remark: Гоблин-вор и его напарник пытались отобрать груз, но я справился.
        speaker: Игрок
      - remark: Твоя верность долгу заслуживает уважения. Тебе нужна защита получше,
          чем эта старая рубаха.
        speaker: Лорд Дрейк
      - remark: Благодарю, Ваша Светлость. Я готов продолжать службу.
        speaker: Игрок
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Стой! Что это у тебя в сумке? Пахнет чем-то ценным!
        speaker: Гоблин-вор
      - remark: Это просто уголь для Лорда. Уйдите с дороги, иначе пожалеете.
        speaker: Игрок
      - remark: Ха! Черные камни — это тоже сокровище! Мы заберем их и твою жизнь!
        speaker: Гоблин-вор
      - remark: Мой деревянный меч готов к бою. Нападайте!
        speaker: Игрок
      - remark: Окружай его! Сегодня мы будем пировать в Высоком Замке вместо него!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 5
      character: Гаррик Кузнец
      dialogs:
      - remark: Слушай, путник. Из Высокого Замка пришел срочный запрос, а у меня
          руки заняты ковкой.
        speaker: Гаррик Кузнец
      - remark: Что-то случилось в замке?
        speaker: Игрок
      - remark: Лорду Дрейку нечем растопить камины в главных залах. Им нужен качественный
          уголь.
        speaker: Гаррик Кузнец
      - remark: Я как раз искал работу. Где мне его найти?
        speaker: Игрок
      - remark: Бери свою деревянную кирку и отправляйся на Одуванчиковую Поляну.
          Там богатые жилы.
        speaker: Гаррик Кузнец
      - remark: Сколько угля мне нужно собрать?
        speaker: Игрок
      - remark: Добудь 5 единиц. Этого хватит на первое время. Поспеши, Лорд Дрейк
          не любит ждать.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Деревянный нагрудник
