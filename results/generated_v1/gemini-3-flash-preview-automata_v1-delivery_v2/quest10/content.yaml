quest:
  explanation:
    destination:
      character_to_deliver: Лорд Дрейк выбран в качестве получателя, так как он официально
        принимает Уголь согласно параметрам игрового мира и находится в другой локации
        (Высокий Замок).
      dialogs: Диалог завершает квестовую арку, подтверждая доставку и демонстрируя
        статус Лорда Дрейка как конечного получателя.
    enemy_to_face:
      amount: Два противника создают умеренную угрозу (6 урона в сумме за ход), которую
        игрок со 100 HP и Деревянным мечом способен преодолеть.
      dialogs: 'Диалог создает конфликтную ситуацию: гоблины пытаются отобрать ценный
        ресурс, который игрок несет заказчику.'
      enemy: Гоблин-вор выбран как противник 1 ранга, что соответствует текущему уровню
        игрока и его снаряжению.
    resource_to_deliver:
      amount: Количество 5 единиц является оптимальным для начального квеста игрока
        1 уровня.
      character: Гаррик Кузнец выбран как NPC, выдающий задание, так как он находится
        в столице и связан с ресурсом 'Уголь'.
      dialogs: Диалог знакомит игрока с Гарриком Кузнецом в Королевской столице, обосновывая
        необходимость добычи угля для Высокого Замка.
      resource: Уголь выбран, так как для его добычи требуется кирка ранга 1, которая
        имеется у игрока.
  objective_description: Добудьте 5 единиц угля на Одуванчиковой Поляне и доставьте
    его Лорду Дрейку в Высокий Замок по поручению Гаррика Кузнеца.
  parts:
    destination:
      character_to_deliver: Лорд Дрейк
      dialogs:
      - remark: Стой! Предъяви цель визита в Высокий Замок.
        speaker: Страж Замка
      - remark: У меня доставка угля от Гаррика Кузнеца для Лорда Дрейка.
        speaker: Игрок
      - remark: Пропустите его. Я уже заждался этого курьера.
        speaker: Лорд Дрейк
      - remark: Наконец-то. В замке стало чертовски холодно. Давай сюда мой уголь.
        speaker: Лорд Дрейк
      - remark: Вот, ровно пять единиц, как и заказывали.
        speaker: Игрок
      - remark: Хм, качество достойное. Гаррик не подвел, да и ты, смотрю, парень
          не промах.
        speaker: Лорд Дрейк
      - remark: За службу и верность делу возьми это. Тебе не помешает дополнительная
          защита.
        speaker: Лорд Дрейк
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Стой! Что это у тебя в мешке так звонко стучит?
        speaker: Гоблин-вор
      - remark: Прочь с дороги, это груз для Высокого Замка.
        speaker: Игрок
      - remark: Хе-хе! Черные камни! Мы заберем их, они отлично горят в наших котлах!
        speaker: Гоблин-вор
      - remark: Отдавай мешок по-хорошему, или мы заберем его вместе с твоей головой!
        speaker: Гоблин-вор
      - remark: Попробуйте забрать, если осмелитесь.
        speaker: Игрок
      - remark: Парни, в атаку! Сегодня у нас будет жаркий костер!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 5
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую, путник! Вижу, у тебя есть деревянная кирка, а значит,
          ты не боишься честного труда.
        speaker: Гаррик Кузнец
      - remark: Мне поступил срочный заказ из Высокого Замка, но мои запасы топлива
          истощены.
        speaker: Гаррик Кузнец
      - remark: Что именно вам нужно доставить?
        speaker: Игрок
      - remark: Мне нужен качественный Уголь. Лорд Дрейк требует, чтобы камины в его
          залах не гасли ни на минуту.
        speaker: Гаррик Кузнец
      - remark: Добудь 5 единиц угля и отнеси их лично Лорду Дрейку. Он щедро платит
          за пунктуальность.
        speaker: Гаррик Кузнец
      - remark: Я сделаю это. Где мне найти уголь?
        speaker: Игрок
      - remark: Отправляйся на Одуванчиковую Поляну, там есть богатые жилы. Поспеши,
          время — деньги!
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Деревянный нагрудник
