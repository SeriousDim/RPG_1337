quest:
  explanation:
    destination:
      character_to_deliver: Гном Брок выбран как получатель, так как он официально
        принимает Железо согласно данным игрового мира и находится в Гномьих Копях.
      dialogs: Диалоги завершают сюжетную арку доставки и объясняют получение награды
        за проявленную смелость.
    enemy_to_face:
      amount: Два противника создают умеренную сложность, учитывая, что у игрока 100
        HP и нет брони.
      dialogs: Диалоги отражают суть противника — гоблина-вора, который жаждет легкой
        наживы в виде добытых ресурсов.
      enemy: Гоблин-вор выбран как противник 1-го ранга, с которым игрок 1-го уровня
        может справиться, используя Деревянный меч.
    resource_to_deliver:
      amount: Количество 5 является сбалансированным для первого квеста уровня 1.
      character: Гаррик Кузнец выбран как начальный NPC, так как он связан с обработкой
        металлов и находится в стартовой локации.
      dialogs: Гаррик Кузнец находится в Королевской столице и логично просит игрока
        о помощи, учитывая наличие у игрока деревянной кирки.
      resource: Железо выбрано, так как для его добычи требуется инструмент 1-го ранга,
        который есть у игрока (Деревянная кирка).
  objective_description: Добудьте 5 единиц Железа в Подорожниковом Бору и доставьте
    их Гному Броку в Гномьи Копи по просьбе Гаррика Кузнеца.
  parts:
    destination:
      character_to_deliver: Гном Брок
      dialogs:
      - remark: Клянусь своей бородой, наконец-то! Я уже собирался сам идти в столицу
          и набить морду этому Гаррику!
        speaker: Гном Брок
      - remark: Давай сюда мешок. Хм, неплохое железо, чистая порода. Ты неплохо поработал
          киркой, парень.
        speaker: Гном Брок
      - remark: Что? На тебя напали гоблины? Эти мелкие вредители совсем обнаглели,
          раз грабят курьеров на главных дорогах.
        speaker: Гном Брок
      - remark: Хорошо, что ты не струсил. Твой деревянный меч выглядит потрёпанным
          после этой заварушки.
        speaker: Гном Брок
      - remark: Гаррик просил передать тебе кое-что за работу. Это защитит твою грудь
          лучше, чем простая рубаха.
        speaker: Гном Брок
      - remark: Заходи как-нибудь ещё. Нам в копях всегда нужны крепкие руки и те,
          кто не боится трудностей.
        speaker: Гном Брок
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Хе-хе! Смотрите, ребята, какая удача! Человек с тяжелым мешком!
        speaker: Гоблин-вор
      - remark: В этом мешке что-то звонко бряцает... Это железо! Нам оно нужно больше,
          чем тебе!
        speaker: Гоблин-вор
      - remark: Бросай добычу и уходи по-хорошему, пока мы не превратили твой деревянный
          меч в щепки!
        speaker: Гоблин-вор
      - remark: Парни, окружайте его! Мы заберем это железо и продадим его на черном
          рынке!
        speaker: Гоблин-вор
      - remark: Твоя жизнь не стоит пяти кусков руды, глупец! В атаку!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 5
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую тебя, путник. Вижу, у тебя есть деревянная кирка, но она
          совсем чистая. Хочешь подзаработать?
        speaker: Гаррик Кузнец
      - remark: Мне поступил срочный заказ из Гномьих Копей от моего старого товарища
          Брока. Ему не хватает материалов для работы.
        speaker: Гаррик Кузнец
      - remark: Нужно добыть 5 единиц железа. Я бы сходил сам, но печи в столице нельзя
          оставлять без присмотра ни на минуту.
        speaker: Гаррик Кузнец
      - remark: Отправляйся в Подорожниковый Бор, там как раз недавно нашли богатую
          жилу. Твоей кирки должно хватить.
        speaker: Гаррик Кузнец
      - remark: Как только соберешь нужное количество, не возвращайся ко мне. Сразу
          неси ресурсы в Гномьи Копи.
        speaker: Гаррик Кузнец
      - remark: Поторопись, Брок — гном вспыльчивый, он не любит ждать поставки слишком
          долго.
        speaker: Гаррик Кузнец
      resource: Железо
  reward:
    item_name: Деревянный нагрудник
