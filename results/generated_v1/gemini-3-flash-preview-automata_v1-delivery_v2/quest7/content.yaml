quest:
  explanation:
    destination:
      character_to_deliver: Лорд Дрейк является персонажем, принимающим Уголь согласно
        настройкам мира, и отличается от начального персонажа (Гаррика).
      dialogs: Лорд Дрейк в Высоком Замке принимает ресурс, что обосновывает перемещение
        игрока между локациями игрового мира.
    enemy_to_face:
      amount: 2 противника создают умеренную сложность для начала игры.
      dialogs: Диалог с существом (Пещерная крыса) представлен через описание его
        поведения и реакцию игрока, так как животные не владеют речью.
      enemy: Пещерная крыса выбрана как противник 1-го ранга, с которым игрок 1-го
        уровня может справиться без брони.
    resource_to_deliver:
      amount: 5 единиц — стандартное количество для начального квеста по сбору.
      character: Гаррик Кузнец выбран как логичный персонаж для задания по добыче
        ресурсов в Королевской столице.
      dialogs: Гаррик Кузнец выступает в роли квестгивера, связывая нужды столицы
        с ресурсами ближайших локаций. Диалог подчеркивает наличие у игрока необходимого
        инструмента.
      resource: Уголь — ресурс 1-го ранга, который игрок может добыть своей Деревянной
        киркой (rank 1).
  objective_description: Добудьте 5 единиц Угля на Одуванчиковой Поляне с помощью
    кирки и доставьте их Лорду Дрейку в Высокий Замок.
  parts:
    destination:
      character_to_deliver: Лорд Дрейк
      dialogs:
      - remark: Наконец-то! Я уже начал думать, что Гаррик забыл о моем поручении.
        speaker: Лорд Дрейк
      - remark: Никак нет, Ваша Милость. Доставка угля с Одуванчиковой Поляны задержалась
          лишь из-за мелких вредителей.
        speaker: Игрок
      - remark: Главное, что топливо здесь. Мои покои уже начали напоминать ледник.
        speaker: Лорд Дрейк
      - remark: Ты хорошо потрудился. Редко встретишь работягу, готового проделать
          такой путь ради простого угля.
        speaker: Лорд Дрейк
      - remark: В качестве благодарности прими этот нагрудник. В твоих странствиях
          он защитит тебя лучше, чем простая рубаха.
        speaker: Лорд Дрейк
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: '*Громкое агрессивное пищание и скрежет зубов*'
        speaker: Пещерная крыса
      - remark: Похоже, запах свежевырытого угля привлек местных вредителей.
        speaker: Игрок
      - remark: '*Прыгает вперед, пытаясь вцепиться в ботинок*'
        speaker: Пещерная крыса
      - remark: Назад! У меня нет времени на схватку с грызунами, этот уголь ждут
          в замке!
        speaker: Игрок
      - remark: '*Готовится к следующему броску, сверкая красными глазами*'
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 5
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую, путник. Вижу, у тебя в руках верная деревянная кирка,
          а это именно то, что мне сейчас нужно.
        speaker: Гаррик Кузнец
      - remark: Лорд Дрейк из Высокого Замка прислал гонца. Ему срочно требуется уголь
          для растопки каминов, иначе замок промерзнет до основания.
        speaker: Гаррик Кузнец
      - remark: Я готов помочь. Где мне найти подходящую жилу?
        speaker: Игрок
      - remark: Ступай на Одуванчиковую Поляну. Там богатые выходы угля прямо на поверхности,
          твоя кирка легко с ними справится.
        speaker: Гаррик Кузнец
      - remark: Собери ровно пять крупных кусков. После этого немедленно отправляйся
          в Высокий Замок и передай их лично Лорду.
        speaker: Гаррик Кузнец
      - remark: Договорились. Пять единиц угля будут доставлены Лорду Дрейку.
        speaker: Игрок
      resource: Уголь
  reward:
    item_name: Деревянный нагрудник
