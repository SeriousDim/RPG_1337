quest:
  explanation:
    destination:
      character_to_deliver: Целительница Алина выбрана, так как она принимает уголь
        согласно данным игрового мира и находится в Древнем Монастыре.
      dialogs: Диалог завершает квестовую арку, подтверждая важность доставки и выражая
        благодарность от лица духовенства.
    enemy_to_face:
      amount: 1 противник, так как игрок только начинает игру и не имеет защиты.
      dialogs: Диалог отражает внезапное нападение вора, привлеченного добычей игрока.
      enemy: Гоблин-вор выбран как противник 1-го ранга с уроном 3, что безопасно
        для игрока с 100 HP и без брони.
    resource_to_deliver:
      amount: 5 единиц — оптимальное количество для стартового квеста.
      character: Гаррик Кузнец выбран как начальный NPC, так как он находится в столице
        и работает с углем.
      dialogs: Диалог знакомит игрока с Гарриком Кузнецом, который находится в Королевской
        столице, и обосновывает необходимость добычи угля для Монастыря.
      resource: Уголь выбран потому, что у игрока есть Деревянная кирка (ранг 1),
        позволяющая добывать ресурсы 1-го ранга.
  objective_description: Добудьте 5 единиц угля на Одуванчиковой Поляне, используя
    свою кирку, и доставьте их Целительнице Алине в Древний Монастырь по просьбе Гаррика
    Кузнеца.
  parts:
    destination:
      character_to_deliver: Целительница Алина
      dialogs:
      - remark: Приветствую тебя в Древнем Монастыре. Ты кажешься уставшим, путник.
        speaker: Целительница Алина
      - remark: Я принес уголь от Гаррика Кузнеца. Вот, все пять кусков.
        speaker: Игрок
      - remark: О, хвала небесам! Наши жаровни почти погасли. Ты спас наши ритуалы.
        speaker: Целительница Алина
      - remark: По пути пришлось столкнуться с одним назойливым гоблином, но уголь
          в сохранности.
        speaker: Игрок
      - remark: Гоблины в этих краях совсем обнаглели. Ты проявил истинную отвагу.
        speaker: Целительница Алина
      - remark: В благодарность я дам тебе защиту, которая убережет тебя в будущих
          странствиях.
        speaker: Целительница Алина
      - remark: Спасибо, Алина. Рад был помочь монастырю.
        speaker: Игрок
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Хе-хе! Что это у нас в мешке? Черные камни? Дай сюда!
        speaker: Гоблин-вор
      - remark: Этот уголь принадлежит Древнему Монастырю. Отойди, малявка.
        speaker: Игрок
      - remark: Мое! Все, что блестит или пачкает — мое! Отдавай добро!
        speaker: Гоблин-вор
      - remark: Я предупреждал. Мой деревянный меч еще не затупился.
        speaker: Игрок
      - remark: Глупый человек! Сейчас я позову... а, ладно, справлюсь сам!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 5
      character: Гаррик Кузнец
      dialogs:
      - remark: Эй, путник! Вижу, у тебя есть верная деревянная кирка. Поможешь старому
          мастеру?
        speaker: Гаррик Кузнец
      - remark: Что нужно сделать, Гаррик? Я как раз искал достойное поручение.
        speaker: Игрок
      - remark: В Древнем Монастыре совсем беда — у них закончилось топливо для очистительных
          жаровен.
        speaker: Гаррик Кузнец
      - remark: Мне нужно, чтобы ты отправился на Одуванчиковую Поляну и добыл там
          уголь.
        speaker: Гаррик Кузнец
      - remark: Уголь? Это мне под силу. Сколько нужно принести?
        speaker: Игрок
      - remark: Пяти кусков будет достаточно. Но не неси его мне, доставь сразу Целительнице
          Алине.
        speaker: Гаррик Кузнец
      - remark: Понял задачу. Одуванчиковая Поляна, пять единиц угля, доставка в Древний
          Монастырь.
        speaker: Игрок
      - remark: Поспеши, без жаровен монахи не смогут проводить свои обряды.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Деревянный нагрудник
