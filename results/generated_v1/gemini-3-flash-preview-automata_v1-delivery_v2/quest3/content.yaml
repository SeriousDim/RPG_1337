quest:
  explanation:
    destination:
      character_to_deliver: Лорд Дрейк выбран, так как он принимает Уголь (согласно
        списку предметов для доставки) и является отличным от Гаррика персонажем.
      dialogs: Завершают сюжетную арку доставки и обосновывают получение ценной награды
        от высокопоставленного лица.
    enemy_to_face:
      amount: Один противник выбран для обеспечения выживаемости игрока без брони.
      dialogs: Отражают классический конфликт фэнтезийного мира и объясняют причину
        внезапного боя во время доставки.
      enemy: Гоблин-вор выбран как противник 1-го ранга, с которым игрок 1-го уровня
        может справиться, используя имеющийся Деревянный меч.
    resource_to_deliver:
      amount: Количество 5 является стандартным для начального собирательного квеста.
      character: Гаррик Кузнец выбран как стартовый NPC, так как он находится в столице
        и работает с рудой.
      dialogs: Диалог задает мотивацию игрока и объясняет логику перемещения между
        локациями.
      resource: 'Уголь выбран, так как игрок имеет Деревянную кирку 1-го ранга, что
        соответствует требованию (min_instrument_rank: 1).'
  objective_description: Соберите 5 единиц Угля на Одуванчиковой Поляне и доставьте
    их Лорду Дрейку в Высокий Замок по поручению Гаррика Кузнеца.
  parts:
    destination:
      character_to_deliver: Лорд Дрейк
      dialogs:
      - remark: Стой! Высокий Замок закрыт для бродяг. Какова твоя цель?
        speaker: Страж Замка
      - remark: Я принес уголь от Гаррика Кузнеца для Лорда Дрейка.
        speaker: Игрок
      - remark: Пропустите его. Я уже заждался вестей из столицы.
        speaker: Лорд Дрейк
      - remark: Вот ваш груз, милорд. Пять мер отборного угля.
        speaker: Игрок
      - remark: Превосходно. Гаррик не подвел, прислав такого решительного гонца.
        speaker: Лорд Дрейк
      - remark: Я слышал, на дорогах неспокойно. Твоя одежда совсем истрепалась в
          пути.
        speaker: Лорд Дрейк
      - remark: Возьми это. Защита тебе пригодится больше, чем простому рудокопу.
        speaker: Лорд Дрейк
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Хе-хе! Что это у нас в мешках? Что-то черное и блестящее?
        speaker: Гоблин-вор
      - remark: Это просто уголь. Отойди с дороги, недоросль.
        speaker: Игрок
      - remark: Уголь — это тепло! Уголь — это огонь! Моя стая хочет огонь! Отдавай!
        speaker: Гоблин-вор
      - remark: Я не собираюсь кормить твою стаю за счет королевской кузни. Обнажай
          оружие, если смеешь.
        speaker: Игрок
      - remark: Твоя кирка тебе не поможет! Ррра-а-а! Смерть человеку!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 5
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую, путник! Вижу, у тебя есть кирка, а у меня — пустая печь
          и горящий заказ.
        speaker: Гаррик Кузнец
      - remark: Нуждаешься в помощи мастера или просто в рабочих руках?
        speaker: Игрок
      - remark: Для начала — в руках. Королевская столица требует мечей, а у меня
          закончилось топливо.
        speaker: Гаррик Кузнец
      - remark: Отправляйся на Одуванчиковую Поляну. Там в скалах полно отличного
          угля.
        speaker: Гаррик Кузнец
      - remark: Я добуду его. Сколько тебе нужно для работы?
        speaker: Игрок
      - remark: Мне нужно 5 единиц. Но не неси их мне — доставь прямиком Лорду Дрейку
          в Высокий Замок. Он ждет партию для своих стражников.
        speaker: Гаррик Кузнец
      - remark: Будет сделано, Гаррик. Я отправляюсь немедленно.
        speaker: Игрок
      resource: Уголь
  reward:
    item_name: Деревянный нагрудник
