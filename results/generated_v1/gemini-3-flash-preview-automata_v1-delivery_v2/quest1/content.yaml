quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь — персонаж из Деревни Речных Лугов, которая
        по данным игры может принимать предметы и выдавать награды.
      dialogs: Лира Лекарь подтверждает получение ресурса и обосновывает награду своим
        профессиональным занятием (лечением).
    enemy_to_face:
      amount: 3 противника — создают угрозу, но учитывая 100 HP игрока, бой остается
        безопасным для обучения механике боя.
      dialogs: Гоблины-воры ведут себя дерзко и комично, что соответствует их низкому
        рангу и статусу 'воров', польстившихся на добычу игрока.
      enemy: Гоблин-вор (Rank 1) идеально подходит для игрока 1 уровня. Его урон (3)
        и здоровье (24) позволяют игроку с деревянным мечом (dmg 2) победить в честном
        бою.
    resource_to_deliver:
      amount: 5 единиц — стандартное количество для начального квеста, требующее времени
        на добычу, но не утомляющее.
      character: Гаррик Кузнец выбран как начальный NPC, так как он работает с рудами
        и находится в стартовой локации.
      dialogs: Гаррик Кузнец (согласно миру, находится в Столице) выдает логичное
        задание на добычу угля, который он принимает для доставки. Диалог раскрывает
        мотивацию персонажа и пункт назначения.
      resource: Уголь — ресурс 1 ранга, который игрок может добыть своей Деревянной
        киркой (rank 1).
  objective_description: Добудьте 5 единиц угля на Одуванчиковой Поляне и доставьте
    его Лире Лекарю в Деревню Речных Лугов по просьбе кузнеца Гаррика.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: Ох, наконец-то! Я уже боялась, что придется тушить котлы и выливать
          лекарство.
        speaker: Лира Лекарь
      - remark: Гаррик просил передать этот уголь. Дорога выдалась непростой.
        speaker: Игрок
      - remark: Вижу по твоему виду... Ты встретил тех проказников из леса? Они совсем
          распоясались.
        speaker: Лира Лекарь
      - remark: Спасибо тебе огромное. Теперь я смогу закончить мазь для раненых стражников.
        speaker: Лира Лекарь
      - remark: У меня как раз завалялось кое-что получше твоей деревянной палки.
          Возьми, тебе нужнее.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 3
      dialogs:
      - remark: Эй! Что это у тебя в мешке так весело позвякивает?
        speaker: Гоблин-вор
      - remark: Это просто уголь. Пропусти меня, я спешу в Деревню Речных Лугов.
        speaker: Игрок
      - remark: Уголь? Черные камни? Нам они нужнее! Мы из них сделаем отличную краску
          для рож!
        speaker: Гоблин-вор
      - remark: Отдавай мешок по-хорошему, иначе мы заберем его вместе с твоими ботинками!
        speaker: Гоблин-вор
      - remark: Попробуй отними. Мой меч еще не затупился.
        speaker: Игрок
      - remark: Парни, окружайте его! Хватай блестяшки!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 5
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую, путник. Вижу, у тебя есть кирка, а значит, ты можешь
          мне помочь.
        speaker: Гаррик Кузнец
      - remark: Для Лиры из Деревни Речных Лугов нужно срочно передать качественный
          уголь — её печи для варки зелий совсем остыли.
        speaker: Гаррик Кузнец
      - remark: Мои запасы истощились, а караван задерживается. Сходи на Одуванчиковую
          Поляну, там есть старые выработки.
        speaker: Гаррик Кузнец
      - remark: Я справлюсь. Сколько угля нужно добыть?
        speaker: Игрок
      - remark: Принеси хотя бы 5 кусков. Этого хватит, чтобы она могла продолжить
          работу.
        speaker: Гаррик Кузнец
      - remark: Будь осторожен, дорога до деревни сейчас не самая спокойная. Удачи!
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Каменный меч
