quest:
  explanation:
    destination:
      character_to_deliver: Лорд Дрейк выбран, так как он находится в другой локации
        (Высокий Замок) и официально принимает Уголь согласно справочнику мира.
      dialogs: Завершающая стадия подчеркивает статусность Лорда Дрейка и дает игроку
        чувство выполненного долга перед высокопоставленным лицом.
    enemy_to_face:
      amount: 1 противник выбран для обеспечения гарантированного прохождения квеста
        игроком без брони на текущем этапе.
      dialogs: Конфликт строится на классическом посягательстве монстров на добытые
        ресурсы, создавая напряжение перед завершением квеста.
      enemy: Гоблин-вор (ранг 1) — идеальный противник для игрока 1 уровня с деревянным
        мечом (у гоблина 24 HP, у игрока 2 ед. урона, бой будет затяжным, но безопасным).
    resource_to_deliver:
      amount: Количество 10 является сбалансированным для первого квеста по сбору
        ресурсов.
      character: Гаррик Кузнец выбран как стартовый NPC, находящийся в Королевской
        столице, что логично для начала игры.
      dialogs: 'Диалоги раскрывают завязку квеста: Гаррик выступает как связующее
        звено между столицей и дворянством, мотивируя игрока 1 уровня заняться добычей.'
      resource: Уголь выбран, так как у игрока есть Деревянная кирка (ранг 1), позволяющая
        добывать ресурсы 1-го ранга на Одуванчиковой Поляне.
  objective_description: Добыть 10 единиц угля на Одуванчиковой Поляне и доставить
    их Лорду Дрейку в Высокий Замок.
  parts:
    destination:
      character_to_deliver: Лорд Дрейк
      dialogs:
      - remark: Наконец-то. Я уже начал думать, что Гаррик решил заморозить меня в
          собственном замке.
        speaker: Лорд Дрейк
      - remark: Ваша светлость, уголь доставлен. Пришлось задержаться из-за незваных
          гостей на дороге.
        speaker: Игрок
      - remark: Гоблины? Эти паразиты совсем распоясались в последнее время. Ты цел?
        speaker: Лорд Дрейк
      - remark: Мой деревянный меч еще держится, хотя бой был не из легких.
        speaker: Игрок
      - remark: Ты проделал долгий путь из столицы. Гаррик не ошибся, выбрав тебя.
        speaker: Лорд Дрейк
      - remark: Рад был помочь. Надеюсь, этого угля хватит надолго.
        speaker: Игрок
      - remark: Хватит, чтобы пережить эту неделю. Возьми это — тебе явно нужно снаряжение
          покрепче, чем твоя старая рубаха.
        speaker: Лорд Дрейк
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: О-хо-хо! Смотрите, что тут у нас! Человечишка с полным мешком!
        speaker: Гоблин-вор
      - remark: Этот уголь принадлежит короне. Убирайся с дороги, мелкий воришка.
        speaker: Игрок
      - remark: Короне? Плевать на корону! Нам нужны блестящие камни и тепло для норы!
        speaker: Гоблин-вор
      - remark: Я не собираюсь отдавать добычу без боя. Доставай оружие!
        speaker: Игрок
      - remark: Бой? Нас больше, а ты один! Хватай его, ребята!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 10
      character: Гаррик Кузнец
      dialogs:
      - remark: Эй, приятель! Вижу, у тебя есть кирка, а руки не боятся мозолей.
        speaker: Гаррик Кузнец
      - remark: Ищу работу. В столице всегда найдется дело для того, кто готов помахать
          инструментом.
        speaker: Игрок
      - remark: Это точно. Слушай, Лорд Дрейк из Высокого Замка прислал гонца. Требует
          уголь для своих каминов.
        speaker: Гаррик Кузнец
      - remark: Мои запасы пусты, а отправлять караван ради одной повозки — себе дороже.
          Справишься?
        speaker: Гаррик Кузнец
      - remark: Где мне найти лучший уголь?
        speaker: Игрок
      - remark: Ступай на Одуванчиковую Поляну. Там в породе много хорошего антрацита.
          Нам нужно ровно десять кусков.
        speaker: Гаррик Кузнец
      - remark: Десять кусков угля. А что потом? Вернуть их тебе?
        speaker: Игрок
      - remark: Нет, сразу неси их Лорду Дрейку в Высокий Замок. Он не любит ждать,
          так что поторопись.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Деревянный нагрудник
