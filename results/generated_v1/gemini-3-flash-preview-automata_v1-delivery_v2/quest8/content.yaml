quest:
  explanation:
    destination:
      character_to_deliver: Лорд Дрейк — персонаж из Высокого Замка. В данных указано,
        что он принимает уголь (items_can_be_accepted_for_delivery_or_collection),
        что делает его идеальным получателем.
      dialogs: Лорд Дрейк проявляет характерную для его статуса надменность, но вознаграждает
        игрока за полезную службу.
    enemy_to_face:
      amount: 2 противника выбраны для создания групповой угрозы, соответствующей
        уровню игрока и контексту засады.
      dialogs: Диалоги Гоблинов-воров подчеркивают их оппортунистическую натуру и
        создают конфликт на пути игрока.
      enemy: Гоблин-вор — противник 1-го ранга с уроном 3 и здоровьем 24. У игрока
        100 HP и урон 2, что делает бой с двумя гоблинами умеренно сложным, но проходимым
        для 1-го уровня.
    resource_to_deliver:
      amount: 10 единиц — стандартное количество для собирательного квеста на первом
        уровне, создающее ощущение работы, но не переходящее в гринд.
      character: Гаррик Кузнец — персонаж из Королевской столицы, который может принимать
        уголь, что соответствует его роли кузнеца.
      dialogs: Гаррик Кузнец выступает в роли квестодателя, объясняя игроку логистическую
        задачу, связанную с его ремеслом и социальным заказом.
      resource: 'Уголь — ресурс типа ''руда'' с min_instrument_rank: 1. У игрока есть
        Деревянная кирка (Rank 1), что позволяет ему выполнить задание.'
  objective_description: Добудьте 10 единиц угля на Одуванчиковой Поляне и доставьте
    его Лорду Дрейку в Высокий Замок по поручению Гаррика Кузнеца.
  parts:
    destination:
      character_to_deliver: Лорд Дрейк
      dialogs:
      - remark: Кто это посмел явиться в Высокий Замок без приглашения? А, ты от Гаррика...
        speaker: Лорд Дрейк
      - remark: Наконец-то! В этих залах стало чертовски холодно. Давай сюда этот
          уголь.
        speaker: Лорд Дрейк
      - remark: Хм, качество вполне приемлемое для простого работяги. Вижу, по дороге
          тебе пришлось несладко.
        speaker: Лорд Дрейк
      - remark: Твоя одежда превратилась в лохмотья. Нам не нужны в замке герои, которые
          выглядят как оборванцы.
        speaker: Лорд Дрейк
      - remark: Я распоряжусь, чтобы тебе выдали кое-какую защиту из старых запасов
          стражи.
        speaker: Лорд Дрейк
      - remark: Можешь быть свободен. Если Гаррик снова решит что-то передать, постарайся
          прийти быстрее.
        speaker: Лорд Дрейк
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Хе-хе! Слышишь, парни? Что-то тяжелое гремит в его сумке!
        speaker: Гоблин-вор
      - remark: Черные камни? Блестящие? Дай-ка нам посмотреть, высокий человечек!
        speaker: Гоблин-вор
      - remark: Нам тоже нужно греться в наших норах, а ты выглядишь слишком слабым,
          чтобы нести такой груз.
        speaker: Гоблин-вор
      - remark: Бросай мешок и убирайся, пока мы не решили забрать еще и твои сапоги!
        speaker: Гоблин-вор
      - remark: Не хочешь по-хорошему? Тогда мы заберем всё с твоего остывшего тела!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 10
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую, путник! Вижу, у тебя есть новенькая кирка, а у меня —
          срочный заказ от самого Лорда Дрейка.
        speaker: Гаррик Кузнец
      - remark: Ему в Высокий Замок требуется особый уголь для каминов, а мои запасы
          совсем истощились из-за работы над доспехами.
        speaker: Гаррик Кузнец
      - remark: Отправляйся на Одуванчиковую Поляну, там есть отличные жилы угля,
          которые легко поддадутся твоей деревянной кирке.
        speaker: Гаррик Кузнец
      - remark: Добудь ровно 10 единиц угля. Этого должно хватить, чтобы прогреть
          главный зал замка хотя бы одну ночь.
        speaker: Гаррик Кузнец
      - remark: Как только закончишь с добычей, не возвращайся ко мне, а неси их прямиком
          в Высокий Замок. Лорд не любит ждать.
        speaker: Гаррик Кузнец
      - remark: Будь осторожен на дорогах, сейчас неспокойно. Удачи тебе!
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Деревянный нагрудник
