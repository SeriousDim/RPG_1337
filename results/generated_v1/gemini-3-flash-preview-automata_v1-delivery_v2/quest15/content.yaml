quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь выбрана как получатель, так как она официально
        принимает железо согласно данным игры.
      dialogs: Лира подтверждает получение ресурса и логически обосновывает награду,
        замечая износ снаряжения игрока.
    enemy_to_face:
      amount: Две крысы создают небольшое напряжение, но гарантируют выживание игрока
        со 100 HP.
      dialogs: Диалоги крысы передают агрессивное поведение животного-вредителя, характерное
        для фэнтези-сеттинга.
      enemy: Пещерная крыса выбрана как наиболее слабый противник (урон 2), что безопасно
        для игрока 1 уровня без брони.
    resource_to_deliver:
      amount: Количество 3 является оптимальным для начального квеста, не перегружая
        инвентарь.
      character: Гаррик Кузнец выбран как стартовый NPC, так как он находится в столице
        и связан с металлами.
      dialogs: Диалог Гаррика объясняет игроку контекст мира (нужда лекаря) и дает
        четкую инструкцию по механике (использование кирки).
      resource: Железо выбрано, так как для его добычи достаточно деревянной кирки
        игрока (rank 1), и оно принимается Лирой.
  objective_description: Добудьте 3 единицы железа в Подорожниковом Бору и доставьте
    их Лире Лекарю в Деревню Речных Лугов по просьбе кузнеца Гаррика.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: Ох, ты как раз вовремя! Я уже начала терять надежду.
        speaker: Лира Лекарь
      - remark: Это железо... оно именно того качества, которое обещал прислать Гаррик.
        speaker: Лира Лекарь
      - remark: Теперь я смогу переплавить его и сделать новые ланцеты для операций.
        speaker: Лира Лекарь
      - remark: Вижу, тебе пришлось несладко в пути. Твой деревянный меч совсем истрепался
          о шкуры крыс.
        speaker: Лира Лекарь
      - remark: В благодарность за спасение моих пациентов я отдам тебе одну из своих
          находок.
        speaker: Лира Лекарь
      - remark: Этот меч надежнее деревянного. Пусть он защитит тебя в твоих дальнейших
          странствиях!
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: '*Громкий писк раздается из-за груды камней*'
        speaker: Пещерная крыса
      - remark: '*Существо скалит зубы, почуяв запах свежевырытой руды*'
        speaker: Пещерная крыса
      - remark: '*Крыса делает резкий выпад в сторону твоих ног*'
        speaker: Пещерная крыса
      - remark: '*Злобное шипение сопровождает каждую атаку монстра*'
        speaker: Пещерная крыса
      - remark: '*Глаза существа горят голодным огнем в полумраке бора*'
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 3
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую, путник! Вижу, у тебя есть деревянная кирка, а значит,
          ты не боишься честного труда.
        speaker: Гаррик Кузнец
      - remark: В Деревне Речных Лугов сейчас беда — Лира Лекарь не может ковать медицинские
          инструменты, ей не хватает сырья.
        speaker: Гаррик Кузнец
      - remark: Я бы и сам отправил ей поставку, но мои запасы истощились из-за заказов
          столичной стражи.
        speaker: Гаррик Кузнец
      - remark: Мне нужно, чтобы ты отправился в Подорожниковый Бор и добыл там немного
          железной руды.
        speaker: Гаррик Кузнец
      - remark: Добудь ровно 3 куска железа. Твоей деревянной кирки должно хватить
          для такой задачи.
        speaker: Гаррик Кузнец
      - remark: Как только соберешь всё необходимое, не возвращайся ко мне, а сразу
          иди в Деревню Речных Лугов к Лире.
        speaker: Гаррик Кузнец
      - remark: Поторопись, от этого зависят жизни раненых селян!
        speaker: Гаррик Кузнец
      resource: Железо
  reward:
    item_name: Каменный меч
