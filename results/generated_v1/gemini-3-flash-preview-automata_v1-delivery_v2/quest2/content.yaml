quest:
  explanation:
    destination:
      character_to_deliver: Гаррик Кузнец выбран в качестве получателя, так как он
        находится в другой локации (Королевская Столица) и также принимает данный
        ресурс по списку.
      dialogs: Завершающий диалог в Королевской Столице подчеркивает важность выполненного
        задания и вознаграждает игрока за бдительность.
    enemy_to_face:
      amount: Один противник достаточен для ознакомительного боя без риска мгновенной
        смерти игрока.
      dialogs: Гоблин-вор пытается украсть собранные ресурсы, создавая конфликтную
        ситуацию, типичную для низкоуровневых приключений.
      enemy: Гоблин-вор выбран как противник 1-го ранга, с которым игрок 1-го уровня
        может справиться, имея 100 здоровья и Деревянный меч.
    resource_to_deliver:
      amount: Количество 5 является сбалансированным для стартового квеста 1-го уровня.
      character: Торговец Нарек выбран как квестодатель, так как он находится в Торговом
        Городе и принимает Одуванчики.
      dialogs: Диалог знакомит игрока с Торговцем Нареком и обосновывает необходимость
        сбора ресурса в фэнтезийном контексте (использование трав в кузнечном деле).
      resource: Одуванчик выбран, так как это ресурс 1-го ранга, доступный игроку
        с его текущим инструментом (Деревянная лопата/кирка не требуются для трав,
        но уровень позволяет).
  objective_description: Соберите 5 единиц Одуванчика на Одуванчиковой Поляне и доставьте
    их Гаррику Кузнецу в Королевскую Столицу по просьбе Торговца Нарека.
  parts:
    destination:
      character_to_deliver: Гаррик Кузнец
      dialogs:
      - remark: Кто это тут бродит около моей наковальни? Мне некогда болтать, работы
          полно.
        speaker: Гаррик Кузнец
      - remark: Я от Нарека. Принес одуванчики, которые вы заказывали.
        speaker: Игрок
      - remark: Наконец-то! Еще бы час, и вся партия мечей была бы испорчена без нужного
          состава.
        speaker: Гаррик Кузнец
      - remark: По пути на меня напал гоблин-вор. Кажется, эти существа становятся
          смелее.
        speaker: Игрок
      - remark: Проклятые твари... Ты молодец, что отбился. За честную службу положена
          честная награда.
        speaker: Гаррик Кузнец
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Хе-хе! Что это у нас в мешочке? Пахнет... цветами?
        speaker: Гоблин-вор
      - remark: Прочь с дороги! Это груз для королевского кузнеца.
        speaker: Игрок
      - remark: Королевского? Значит, это дорого стоит! Гоблины любят блестящие и
          дорогие штуки!
        speaker: Гоблин-вор
      - remark: Это просто трава, она тебе не поможет. Уходи по-хорошему.
        speaker: Игрок
      - remark: Врешь! Отдавай сумку, или я попробую твою плоть на вкус своим ножом!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 5
      character: Торговец Нарек
      dialogs:
      - remark: Эй, путник! Вижу, ты только начинаешь свой путь, но выглядишь вполне
          надежным.
        speaker: Торговец Нарек
      - remark: Приветствую. Что-то случилось? Вы выглядите обеспокоенным.
        speaker: Игрок
      - remark: Мне нужно срочно передать партию сырья в Столицу кузнецу Гаррику,
          но мои караваны задерживаются.
        speaker: Торговец Нарек
      - remark: О каком сырье идет речь? Мои инструменты справятся с этим?
        speaker: Игрок
      - remark: Это обычный Одуванчик. Гаррик использует его экстракт для особого
          метода закалки мелких деталей.
        speaker: Торговец Нарек
      - remark: Хорошо, я соберу цветы. Где мне их найти?
        speaker: Игрок
      - remark: Отправляйся на Одуванчиковую Поляну. Собери 5 единиц и немедленно
          неси Гаррику.
        speaker: Торговец Нарек
      resource: Одуванчик
  reward:
    item_name: Деревянный нагрудник
