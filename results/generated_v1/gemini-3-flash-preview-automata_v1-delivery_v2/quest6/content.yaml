quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь — NPC, находящийся в Деревне Речных Лугов,
        которая по базе принимает заказы и может выдавать Каменный меч.
      dialogs: Лира Лекарь принимает ресурс и обосновывает награду тем, что оружие
        игрока нуждается в улучшении после боя.
    enemy_to_face:
      amount: 1 противник, чтобы не перегружать игрока на первом уровне при отсутствии
        защиты.
      dialogs: Диалог подчеркивает агрессивность противника и акцентирует внимание
        на слабом снаряжении игрока.
      enemy: Гоблин-вор — противник 1 ранга, подходящий по силе игроку 1 уровня без
        брони.
    resource_to_deliver:
      amount: 5 единиц — стандартное количество для начального квеста на сбор.
      character: Гаррик Кузнец — существующий NPC в Королевской столице.
      dialogs: Гаррик Кузнец выступает квестодателем, используя лорную завязку о нехватке
        топлива для выполнения медицинского заказа.
      resource: Уголь — ресурс типа 'руда', который игрок может добыть своей Деревянной
        киркой (ранг 1).
  objective_description: Добудьте 5 единиц Угля на Одуванчиковой Поляне и доставьте
    его Лире Лекарю в Деревню Речных Лугов по просьбе Гаррика Кузнеца.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: Ох, ты как раз вовремя! Я уже начала беспокоиться.
        speaker: Лира Лекарь
      - remark: Я принес Уголь от Гаррика. По пути на меня напали, но я справился.
        speaker: Игрок
      - remark: Напали? Эти места становятся все опаснее. Дай посмотрю на груз.
        speaker: Лира Лекарь
      - remark: Да, это отличный антрацит. Теперь я смогу стерилизовать инструменты
          и готовить отвары.
        speaker: Лира Лекарь
      - remark: Рад, что смог помочь Деревне Речных Лугов.
        speaker: Игрок
      - remark: Твой Деревянный меч совсем износился в бою с гоблином. Тебе нужно
          что-то покрепче.
        speaker: Лира Лекарь
      - remark: Возьми это. Это Каменный меч, он гораздо надежнее в странствиях.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Стой! Что это у тебя в сумке так заманчиво похрустывает?
        speaker: Гоблин-вор
      - remark: Это просто уголь для кузни. Пропусти меня.
        speaker: Игрок
      - remark: Уголь? Черные камни! Гоблины любят все, что можно стянуть!
        speaker: Гоблин-вор
      - remark: Отдавай мешок, или я проткну тебя и твой жалкий Деревянный меч!
        speaker: Гоблин-вор
      - remark: Я не отдам то, что должен доставить. Придется сразиться.
        speaker: Игрок
      - remark: Смелый человек? Сейчас мы это проверим! В атаку!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 5
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую, путник. Мне нужна твоя помощь с одним важным заказом.
        speaker: Гаррик Кузнец
      - remark: Что нужно сделать, Гаррик?
        speaker: Игрок
      - remark: Мои запасы топлива истощились, а мне нужно подготовить партию инструментов
          для медиков.
        speaker: Гаррик Кузнец
      - remark: Отправляйся на Одуванчиковую Поляну, там можно найти качественный
          Уголь.
        speaker: Гаррик Кузнец
      - remark: Я добуду его. Сколько тебе требуется?
        speaker: Игрок
      - remark: Добудь 5 единиц. Но не неси его мне в Королевскую столицу.
        speaker: Гаррик Кузнец
      - remark: Доставь этот груз прямиком в Деревню Речных Лугов. Лира Лекарь очень
          его ждет.
        speaker: Гаррик Кузнец
      - remark: Хорошо, я выдвигаюсь. Уголь будет у неё.
        speaker: Игрок
      resource: Уголь
  reward:
    item_name: Каменный меч
