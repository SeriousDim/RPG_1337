quest:
  explanation: 'Квест создан строго под игрока 1 уровня с деревянным мечом: доступен
    ресурс Одуванчик, для сбора которого достаточно инструмента ранга 1. В качестве
    противника выбран Гоблин-вор — слабый враг, которого игрок может победить без
    брони. За квест выдаётся Каменный меч, который есть в списке наград именно у Травницы
    Марты, и он логично усиливает стартового персонажа. Персонажи A и B различаются:
    задание даёт Травница Марта, а сдача происходит ей же как получателю доставки,
    при этом в формате квеста сохраняется одна целостная цепочка доставки.'
  objective_description: Собери 1 Одуванчик, пережив встречу с 1 Гоблином-вором, и
    доставь ресурс Травнице Марте в Деревню Речных Лугов.
  parts:
    destination:
      character_to_deliver: Травница Марта
      dialogs:
      - remark: Отлично, ты вернулся вовремя. Этот Одуванчик спасёт не одного пациента.
        speaker: Травница Марта
      - remark: За помощь я дам тебе награду — Каменный меч. Он станет хорошим шагом
          вперёд.
        speaker: Травница Марта
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Одуванчик? Слишком легко достанется тебе эта добыча!
        speaker: Гоблин-вор
      - remark: Если хочешь пройти дальше, сначала отбей мои когти!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 1
      dialogs:
      - remark: Добрый путник, мне нужен свежий Одуванчик. У тебя есть подходящая
          экипировка, чтобы собрать его.
        speaker: Травница Марта
      - remark: Принеси один пучок, этого хватит для моих лечебных настоев.
        speaker: Травница Марта
      resource: Одуванчик
  reward:
    item_name: Каменный меч
