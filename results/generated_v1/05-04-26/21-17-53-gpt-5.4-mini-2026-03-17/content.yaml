quest:
  explanation: 'Квест рассчитан на игрока 1 уровня без брони и с деревянным мечом.
    Для задания выбран доступный ресурс первого ранга — Одуванчик, который можно получить
    и перенести без требований к более высокому инструменту. В качестве противника
    выбран Гоблин-вор: он соответствует ранней сложности и посилен при 100 здоровья
    и оружии с 2 урона. Наградой стал Деревянный нагрудник, так как это предмет ранга
    1, логично усиливающий стартового персонажа и не превышающий текущий уровень прогрессии
    мира.'
  objective_description: Доставь 1 Одуванчик от Травницы Марты в Королевской столице
    к Гаррику Кузнецу, по пути пережив встречу с 1 Гоблином-вором.
  parts:
    destination:
      character_to_deliver: Гаррик Кузнец
      dialogs:
      - remark: Отлично, Одуванчик доставлен в срок. Мне как раз не хватало этой травы
          для работы.
        speaker: Гаррик Кузнец
      - remark: 'Для новичка ты справился смело: и путь нашёл, и грабителя не испугался.'
        speaker: Гаррик Кузнец
      - remark: Забирай награду — Деревянный нагрудник пригодится тебе в следующих
          вылазках.
        speaker: Гаррик Кузнец
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Ха! Одинокий путник с травой в сумке — лёгкая добыча!
        speaker: Гоблин-вор
      - remark: Не пройдёшь через тракт просто так, я заберу всё ценное.
        speaker: Гоблин-вор
      - remark: Твой деревянный меч не внушает страха, но и я не дам тебе уйти без
          драки.
        speaker: Гоблин-вор
      - remark: Если хочешь доставить Одуванчик, сначала одолей меня.
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 1
      dialogs:
      - remark: Мне нужен свежий Одуванчик из ближайшей поляны. Без него мои настои
          не закипят вовремя.
        speaker: Травница Марта
      - remark: 'Ты как раз подходишь: даже с деревянным мечом можно пройти до места
          сбора.'
        speaker: Травница Марта
      - remark: Принеси один Одуванчик, и я сразу приготовлю всё для дальнейшего пути.
        speaker: Травница Марта
      - remark: Одуванчики растут на Одуванчиковой Поляне, путь туда не опасен для
          новичка.
        speaker: Травница Марта
      - remark: Возвращайся ко мне с добычей, и я передам её дальше по делу.
        speaker: Травница Марта
      resource: Одуванчик
  reward:
    item_name: Деревянный нагрудник
