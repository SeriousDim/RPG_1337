quest:
  explanation: 'Квест строго соответствует текущему уровню игрока: задание начинается
    у персонажа 1 ранга в Королевской столице, требует ресурс 1 ранга — Одуванчик,
    доступный деревянной лопатой или для сбора без конфликтов с прогрессией. Противник
    выбран из ранга 1 — Гоблин-вор, что безопасно для игрока с 100 здоровья и деревянным
    мечом. Получатель доставки — Лира Лекарь в Деревне Речных Лугов — отличается от
    выдающего квест Гаррика Кузнеца, как и требуется. Награда — Каменный меч — логично
    усиливает игрока на раннем этапе и есть в списке допустимых наград для данного
    мира.'
  objective_description: Доставь 1 Одуванчик от Гаррика Кузнеца к Лире Лекарю в Деревне
    Речных Лугов, по пути победив 1 Гоблина-вора.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: Гаррик попросил помочь с поставкой? Тогда ты пришёл по адресу.
        speaker: Лира Лекарь
      - remark: Мне нужен один Одуванчик для лечебного настоя и проверки партии сырья.
        speaker: Лира Лекарь
      - remark: Отлично, что ты сумел добыть его и дойти сюда без потерь.
        speaker: Лира Лекарь
      - remark: Передай кузнецу, что его заказ принят и будет полезен делу.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Эй, ты! Думаешь, сможешь пронести добычу мимо меня?
        speaker: Гоблин-вор
      - remark: Я уже почуял твой Одуванчик. Отдай его, и я, может быть, уйду.
        speaker: Гоблин-вор
      - remark: Если хочешь пройти дальше, сначала одолей меня.
        speaker: Гоблин-вор
      - remark: Покажи, что деревянный меч у тебя не просто для вида.
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 1
      dialogs:
      - remark: Мне нужен простой материал для новой партии подков и креплений.
        speaker: Гаррик Кузнец
      - remark: Принеси мне 1 Одуванчик из Одуванчиковой Поляны.
        speaker: Гаррик Кузнец
      - remark: Ты уже умеешь пользоваться самым простым оружием, так что задание
          тебе по силам.
        speaker: Гаррик Кузнец
      - remark: 'Не медли: мне важна свежесть и точность доставки.'
        speaker: Гаррик Кузнец
      resource: Одуванчик
  reward:
    item_name: Каменный меч
