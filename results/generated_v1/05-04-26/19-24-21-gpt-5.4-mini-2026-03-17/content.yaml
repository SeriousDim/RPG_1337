quest:
  explanation: 'Квест соответствует игроку 1 уровня с Деревянным мечом и без брони:
    выбран самый ранний и доступный маршрут доставки. Уголь доступен для добычи инструментом
    1 ранга, а противник Лесной разбойник является врагом низкого ранга и подходит
    для первого столкновения. Награда — Деревянный меч — строго присутствует среди
    возможных наград Гаррика Кузнеца и логично усиливает стартового игрока.'
  objective_description: Отправляйся к Гаррику Кузнецу в Королевскую столицу, добудь
    3 Угля, по пути отбейся от 1 Лесного разбойника и доставь ресурс заказчику.
  parts:
    destination:
      character_to_deliver: Гаррик Кузнец
      dialogs:
      - remark: А, вот и ты. Уголь цел, это главное.
        speaker: Гаррик Кузнец
      - remark: Теперь я смогу закончить работу и закрыть старый заказ.
        speaker: Гаррик Кузнец
      - remark: За твою помощь я вручу тебе Деревянный меч.
        speaker: Гаррик Кузнец
      - remark: Пусть он станет твоим первым настоящим оружием.
        speaker: Гаррик Кузнец
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Эй, стой! Добычу сюда, и никто не пострадает.
        speaker: Лесной разбойник
      - remark: Такие, как ты, обычно не доходят до столицы.
        speaker: Лесной разбойник
      - remark: Отдай уголь, и я, может быть, пропущу тебя живым.
        speaker: Лесной разбойник
      - remark: Или попробуй пройти силой, если хватит духу.
        speaker: Лесной разбойник
      enemy: Лесной разбойник
    resource_to_deliver:
      amount: 3
      dialogs:
      - remark: Мне срочно нужен Уголь для плавки заготовок. Без него я не смогу продолжить
          работу.
        speaker: Гаррик Кузнец
      - remark: Ты только начинаешь путь, так что это дело тебе по силам.
        speaker: Гаррик Кузнец
      - remark: Принеси мне 3 единицы Угля из ближайших залежей.
        speaker: Гаррик Кузнец
      - remark: Уголь — простой ресурс, но для кузницы он на вес золота.
        speaker: Гаррик Кузнец
      - remark: Если справишься, я щедро отблагодарю тебя оружием.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Деревянный меч
