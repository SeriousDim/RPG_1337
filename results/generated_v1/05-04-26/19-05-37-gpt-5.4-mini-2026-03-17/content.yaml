quest:
  parts:
    resource_to_deliver:
      dialogs:
        - speaker: Лира Лекарь
          remark: Я готовлю перевязочные сборы для раненых, но мне не хватает Подорожника.
        - speaker: Лира Лекарь
          remark: Тебе по силам найти его в окрестностях и принести сюда?
        - speaker: Лира Лекарь
          remark: Для моего заказа нужен только свежий Подорожник, без примесей и лишнего груза.
        - speaker: Лира Лекарь
          remark: Возьми его столько, сколько потребуется для одной передачи.
        - speaker: Лира Лекарь
          remark: Если справишься, я помогу тебе с оружием, которое пригодится в дороге.
      resource: Подорожник
      amount: 1

    enemy_to_face:
      dialogs:
        - speaker: Гоблин-вор
          remark: Глупец, не пройдёшь мимо меня с чужой добычей!
        - speaker: Гоблин-вор
          remark: Я уже почуял запах лекарской травы.
        - speaker: Гоблин-вор
          remark: Отдавай Подорожник, и, может, я не стану нападать сразу.
        - speaker: Гоблин-вор
          remark: Хотя нет, всё равно заберу его силой.
      enemy: Гоблин-вор
      amount: 1

    destination:
      dialogs:
        - speaker: Лира Лекарь
          remark: Ты вернулся вовремя. Подорожник будет очень кстати для раненых.
        - speaker: Лира Лекарь
          remark: Передай его мне, и я завершу приготовление целебных повязок.
        - speaker: Лира Лекарь
          remark: За твою помощь я выдаю тебе Каменный меч.
      character_to_deliver: Лира Лекарь

  objective_description: Доставь 1 Подорожник Лире Лекарю в Деревню Речных Лугов, по пути отбившись от 1 Гоблина-вора.

  reward:
    item_name: Каменный меч

  explanation: Квест соответствует текущему уровню игрока 1 и его стартовому инвентарю: Подорожник доступен для сбора с инструментом минимального ранга 1, а Гоблин-вор является умеренной угрозой для новичка. Награда в виде Каменного меча логично усиливает игрока после первого задания и доступна среди наград Лиры Лекарь. Все сущности, ресурсы, противники, локации и предметы взяты строго из игрового мира.