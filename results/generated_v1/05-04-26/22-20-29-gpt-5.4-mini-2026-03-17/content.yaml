quest:
  explanation: 'Квест сгенерирован как доставка, потому что игрок 1 уровня с деревянным
    мечом способен выполнить сбор ресурса ранга 1 — Угля, доступного в локации Одуванчиковая
    Поляна и принимаемого Гарриком Кузнецом. Встреча с Гоблином-вором соответствует
    раннему боевому этапу мира: этот противник слабее большинства и логично сопровождает
    дорогу новичка. Награда — Каменный меч — доступна в списке наград мира и является
    естественным улучшением для игрока с текущим снаряжением.'
  objective_description: Отправляйся к Гаррику Кузнецу в Королевскую столицу, добудь
    2 Угля, отбейся от Гоблина-ворa и вернись к кузнецу с добычей.
  parts:
    destination:
      character_to_deliver: Гаррик Кузнец
      dialogs:
      - remark: Вижу, ты вернулся с тем, что я просил.
        speaker: Гаррик Кузнец
      - remark: Уголь пригодится мне для срочного горна.
        speaker: Гаррик Кузнец
      - remark: Для такого старания я выдам тебе награду из моих запасов.
        speaker: Гаррик Кузнец
      - remark: 'Держи ухо востро: дальше задания станут сложнее.'
        speaker: Гаррик Кузнец
      - remark: А пока — спасибо за помощь, новичок.
        speaker: Гаррик Кузнец
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Ха! Думаешь, пройдёшь мимо и утащишь добычу?
        speaker: Гоблин-вор
      - remark: Я уже почуял свежий Уголь в твоём мешке.
        speaker: Гоблин-вор
      - remark: Сначала придётся отбиться, а потом уже идти дальше.
        speaker: Гоблин-вор
      - remark: Проверим, чего стоит твой деревянный меч.
        speaker: Гоблин-вор
      - remark: 'Не сворачивай: только после этой стычки путь к кузнецу будет открыт.'
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 2
      dialogs:
      - remark: Мне нужен простой и доступный ресурс для срочной работы. Принеси мне
          Уголь.
        speaker: Гаррик Кузнец
      - remark: Ты только начал путь, так что задание должно быть тебе по силам.
        speaker: Гаррик Кузнец
      - remark: Добудь 2 единицы Угля и не теряй времени.
        speaker: Гаррик Кузнец
      - remark: Когда вернёшься, я сразу проверю добычу.
        speaker: Гаррик Кузнец
      - remark: Это дело для новичка, но и новичку нужна осторожность.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Каменный меч
