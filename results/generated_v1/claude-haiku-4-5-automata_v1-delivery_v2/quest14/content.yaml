quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь выбрана потому что она находится в Деревне
        Речных Лугов (отличается от Королевской столицы, где Гаррик), может принять
        в качестве награды Уголь (ранг 1) и способна дать награду игроку. Это создает
        логическую цепочку доставки между двумя персонажами разных локаций.
      dialogs: Диалоги Лиры Лекаря написаны в дружелюбном тоне. Она выражает благодарность
        за доставку ресурса и объясняет, зачем ей нужен Уголь (для приготовления зелий).
        Это создает логическую цепочку и погружает игрока в мир игры.
    enemy_to_face:
      amount: 1 противник - это оптимальное количество для первого боевого квеста
        игрока уровня 1, чтобы не перегрузить новичка.
      dialogs: Диалоги противника (Лесной разбойник) написаны агрессивным тоном, объясняя
        причину конфликта - нарушение его территории. Они создают атмосферу боевого
        столкновения.
      enemy: Лесной разбойник выбран потому что это враг ранга 1 (как и игрок), с
        28 HP и 4 урона за ход. Это справедливый противник для нового игрока с деревянным
        мечом (2 урона). Боевое столкновение органично вписывается в сюжет квеста.
    resource_to_deliver:
      amount: Количество 3 единицы выбрано как небольшой, но значительный объем для
        первого квеста игрока уровня 1.
      character: Гаррик Кузнец выбран как NPC уровня 1, который может принять в качестве
        награды Уголь (ранг 1). Он находится в Королевской столице и подходит для
        первого квеста новичка.
      dialogs: Диалоги написаны от лица Гаррика Кузнеца, который находится в Королевской
        столице. Он объясняет игроку, что ему нужен Уголь, указывает локацию добычи
        (Одуванчиковая Поляна) и просит привезти 3 единицы ресурса. Диалоги содержат
        атмосферное наполнение и предостережение об опасностях.
      resource: Уголь выбран потому что это ресурс ранга 1, доступный для добычи с
        помощью Деревянной кирки (ранг 1), которая уже есть в инвентаре игрока. Он
        находится в Одуванчиковой Поляне.
  objective_description: Отправьтесь на Одуванчиковую Поляну и добудьте 3 единицы
    Угля. Затем доставьте ресурсы Лире Лекарю в Деревню Речных Лугов. Будьте готовы
    к опасностям в пути!
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: О, это ты! Я слышала о твоих делах в соседних землях.
        speaker: Лира Лекарь
      - remark: Гаррик прислал тебя? Хорошо, я знаю его давно.
        speaker: Лира Лекарь
      - remark: Уголь нужен мне для приготовления зелий и лекарств.
        speaker: Лира Лекарь
      - remark: Ты выполнил задание честно - вот твоя награда!
        speaker: Лира Лекарь
      - remark: Приходи ко мне ещё, если понадобится помощь или работа.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Стой, путник! Это моя территория!
        speaker: Лесной разбойник
      - remark: Никто не добывает ресурсы в этих землях без моего позволения!
        speaker: Лесной разбойник
      - remark: Пришло время рассчитаться с тобой, незнакомец!
        speaker: Лесной разбойник
      - remark: Твоё золото и ресурсы скоро будут моими!
        speaker: Лесной разбойник
      - remark: На бой, трус!
        speaker: Лесной разбойник
      enemy: Лесной разбойник
    resource_to_deliver:
      amount: 3
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую тебя, путник! Мне срочно нужен Уголь для моей кузницы.
        speaker: Гаррик Кузнец
      - remark: Мои запасы истощились, и я не могу продолжать работу без этого ценного
          ресурса.
        speaker: Гаррик Кузнец
      - remark: Одуванчиковая Поляна славится залежами угля. Туда-то и направляйся!
        speaker: Гаррик Кузнец
      - remark: Добудь мне 3 единицы угля, и я щедро тебя вознагражу.
        speaker: Гаррик Кузнец
      - remark: Будь осторожен в дороге - земли эти нередко посещают разбойники.
        speaker: Гаррик Кузнец
      - remark: Возвращайся с ресурсами - я буду ждать!
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Деревянная лопата
