quest:
  explanation:
    destination:
      character_to_deliver: "Лира Лекарь из Деревни Речных Лугов выбрана как персонаж,\
        \ отличный от Гаррика. \nОна логично принимает травы для лечебных целей и\
        \ может дать подходящую награду следующего ранга."
      dialogs: "5 диалогов раскрывают назначение ресурса, благодарность персонажа\
        \ и его готовность \nпомогать в будущем. Создают чувство выполненного долга\
        \ и причастности к миру.\n"
    enemy_to_face:
      amount: "Количество 2 крысы достаточно, чтобы создать угрозу и требовать тактики,\
        \ \nно не настолько велико, чтобы убить новичка. Общая HP врагов 40.\n"
      dialogs: "4 диалога создают атмосферу встречи с противником. Описывают поведение\
        \ пещерных крыс, \nнарастают напряжение и подготавливают к боевому столкновению.\n"
      enemy: "Пещерная крыса выбрана как враг ранга 1, с низкой HP (20) и средним\
        \ уроном (2). \nПолностью соответствует силе игрока уровня 1 с Деревянным\
        \ мечом (урон 2).\n"
    resource_to_deliver:
      amount: "Количество 3 пучка выбрано как небольшое, но значимое задание для начинающего\
        \ игрока. \nДостаточно для ощущения прогресса, но не перегружает.\n"
      character: "Выбран Гаррик Кузнец из Королевской столицы. Это логичный персонаж\
        \ для получения задания на сбор \nтравы, так как он первый в иерархии персонажей\
        \ и имеет подходящие по рангу награды.\n"
      dialogs: "Созданы 5 диалогов, которые последовательно знакомят игрока с задачей,\
        \ объясняют суть работы \nи мотивируют к её выполнению. Диалоги естественны\
        \ и погружают в фентэзийный мир.\n"
      resource: "Одуванчик выбран потому, что это самый базовый ресурс в игре (ранг\
        \ 1), идеально подходящий \nдля новичка уровня 1. Требует только базовую лопату\
        \ ранга 1.\n"
  objective_description: "Гаррик Кузнец из Королевской столицы просит тебя собрать\
    \ три пучка Одуванчика с Одуванчиковой Поляны \nи доставить их Лире Лекарю в Деревню\
    \ Речных Лугов. Трава необходима для создания целебных зелий. \nСпешь с выполнением\
    \ этого задания!\n"
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: О, какой приятный сюрприз! Гаррик прислал к нам помощника?
        speaker: Лира Лекарь
      - remark: Одуванчик - чудесное растение. Оно помогает мне создавать целебные
          зелья для моих пациентов.
        speaker: Лира Лекарь
      - remark: Спасибо тебе за доставку! Это поможет мне спасти много жизней.
        speaker: Лира Лекарь
      - remark: Вот тебе награда за твой труд и отвагу. Ты настоящий герой!
        speaker: Лира Лекарь
      - remark: Приходи ко мне ещё, если понадобится помощь. Мы всегда рады храбрым
          странникам.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Пищащий звук эхом разносится по лесу...
        speaker: Пещерная крыса
      - remark: Грызун вытягивает острые когти, готовясь к атаке!
        speaker: Пещерная крыса
      - remark: Две пары красных глаз светят в темноте, направляясь в твою сторону!
        speaker: Пещерная крыса
      - remark: Звери издают боевой клич и бросаются на тебя!
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 3
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую, молодой искатель приключений! Мне срочно требуется Одуванчик
          для моих кузнечных нужд.
        speaker: Гаррик Кузнец
      - remark: Эта трава обладает особыми свойствами, которые помогают закалять металл.
          Ты сможешь её найти?
        speaker: Гаррик Кузнец
      - remark: Отправляйся на Одуванчиковую Поляну - там её в изобилии. Собери для
          меня три пучка.
        speaker: Гаррик Кузнец
      - remark: Но будь осторожен - эти земли не безопасны. После сбора травы спеши
          к тому, кого я назову.
        speaker: Гаррик Кузнец
      - remark: За эту работу я щедро вознагражу тебя. Согласен ли ты?
        speaker: Гаррик Кузнец
      resource: Одуванчик
  reward:
    item_name: Железная лопата
