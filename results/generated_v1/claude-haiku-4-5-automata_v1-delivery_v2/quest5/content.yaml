quest:
  explanation:
    destination:
      character_to_deliver: 'Лира Лекарь находится в Деревне Речных Лугов и может
        принимать Уголь и Подорожник (оба ресурсы низкого ранга). Она отличается от
        Гаррика, что требуется условиями. Логически это создает цепь: кузнец просит
        уголь для лекаря, которая использует его для исцеления.'
      dialogs: Диалоги от Лиры Лекаря объясняют, почему ей нужен уголь (целебные отвары)
        и её благодарность. Содержат 5 реплик, завершая нарратив квеста.
    enemy_to_face:
      amount: 'Количество 2 крысы выбрано потому, что игрок должен использовать свой
        меч на 2 врагов (damage_per_enemy: 2, enemies_to_hit: 1 требует одного удара
        на врага). Это обеспечивает достаточный вызов без перегрузки.'
      dialogs: Диалоги написаны от лица Пещерной крысы. Они показывают враждебность
        врагов и их намерение защищать ресурс. Содержат 4 реплики, добавляя атмосферу
        опасности.
      enemy: 'Пещерная крыса выбрана потому, что это враг ранга 1 с характеристиками:
        20 HP и 2 урона в ход. Это соответствует уровню игрока (уровень 1 с 100 HP
        и деревянным мечом 2 урона). Встреча будет вызовом, но не смертельной.'
    resource_to_deliver:
      amount: Количество 2 выбрано как минимально достаточное для первого квеста,
        но не требующее длительной фармки. Это соответствует уровню сложности новичка
        (уровень 1).
      character: Гаррик Кузнец выбран как персонаж, который дает задание. Он находится
        в Королевской столице и может принимать уголь и дерево (ресурсы ранга 1).
        Это логично для кузнеца.
      dialogs: Диалоги написаны от лица Гаррика Кузнеца, который является начальным
        персонажем квеста. Они объясняют причину задания (нужен уголь для кузницы),
        место добычи (Одуванчиковая Поляна) и приблизительное количество (2 куска).
        Диалоги содержат 6 реплик, что соответствует требованиям (5-10).
      resource: Уголь выбран потому, что это ресурс ранга 1 с минимальным требованием
        к инструменту (rank 1). Одуванчиковая Поляна - это буферная локация, которая
        содержит именно этот ресурс. Игрок может её добыть с помощью деревянной лопаты,
        которая у него уже есть.
  objective_description: Найди 2 куска Угля для Гаррика Кузнеца в Королевской столице.
    Затем доставь их Лире Лекарю в Деревню Речных Лугов. Уголь можно добыть на Одуванчиковой
    Поляне с помощью инструментов.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: О, как хорошо, что ты пришёл! Гаррик послал тебя, верно?
        speaker: Лира Лекарь
      - remark: Мне нужен Уголь для приготовления целебных отваров и припарок.
        speaker: Лира Лекарь
      - remark: Благодаря твоей помощи я смогу исцелить много больных в деревне.
        speaker: Лира Лекарь
      - remark: Вот, возьми эту награду - она поможет тебе в будущих приключениях!
        speaker: Лира Лекарь
      - remark: Спасибо за помощь, отважный путник! Ты истинный герой!
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Ширрррр! Кто смеет вторгаться на нашу территорию?!
        speaker: Пещерная крыса
      - remark: Ты только посмотри, какой аппетитный кусочек пришёл к нам в гости!
        speaker: Пещерная крыса
      - remark: Мы не позволим тебе забрать наш Уголь!
        speaker: Пещерная крыса
      - remark: Атакуй, братья! Защищайте нашу добычу!
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 2
      character: Гаррик Кузнец
      dialogs:
      - remark: Привет, молодой путник! Мне срочно нужен Уголь для моей кузницы.
        speaker: Гаррик Кузнец
      - remark: Без него я не смогу разжечь печь и создать новые инструменты.
        speaker: Гаррик Кузнец
      - remark: Слышал, что Уголь можно найти на Одуванчиковой Поляне.
        speaker: Гаррик Кузнец
      - remark: Принеси мне хотя бы 2 куска Угля, и я щедро вознагражу тебя.
        speaker: Гаррик Кузнец
      - remark: Только учти - путь туда опасен, и ты можешь встретить врагов.
        speaker: Гаррик Кузнец
      - remark: Но ты выглядишь достаточно боеспособным. Согласен помочь?
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Деревянная лопата
