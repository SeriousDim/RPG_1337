quest:
  explanation:
    destination:
      character_to_deliver: 'Лира Лекарь из Деревни Речных Лугов выбрана потому что:
        1) она отличается от Гаррика (требование выполнено), 2) она принимает Одуванчик
        в своём списке ресурсов, 3) она логически связана с Гарриком (обработка материалов),
        4) её награды подходят новичку.'
      dialogs: Лира Лекарь благодарит игрока, объясняет важность привезённого ресурса
        и вознаграждает его. 5 реплик показывают её благодарность и завершение квеста.
    enemy_to_face:
      amount: 2 крысы - небольшой вызов, который усложняет квест, но остаётся преодолимым
        для игрока с 100 HP и деревянным мечом.
      dialogs: Пещерная крыса общается с игроком атмосферными звуками и угрозами.
        4 реплики создают напряженную атмосферу встречи с врагом.
      enemy: Пещерная крыса ранга 1 выбрана как враг, соответствующий уровню игрока.
        Имеет 20 HP и наносит 2 урона за ход - новичок с деревянным мечом (2 урона
        за удар) может победить в честной борьбе за 10 ходов.
    resource_to_deliver:
      amount: 3 штуки - небольшое количество для первого квеста, не перегружает новичка,
        позволяет быстро завершить задачу.
      character: Гаррик Кузнец выбран потому, что он находится в Королевской столице
        и может давать простые задания новичкам. У него есть в списке принимаемых
        ресурсов Одуванчик ранга 1.
      dialogs: 'Гаррик Кузнец выступает как персонаж, дающий задание. Его реплики
        информативны и мотивируют игрока: сначала объясняет задачу, затем просит доставить
        ресурс конкретному персонажу, заканчивается обещанием награды. 6 реплик отвечают
        требованиям (5-10 вхождений).'
      resource: Одуванчик ранга 1 выбран как самый простой ресурс для начинающего
        игрока уровня 1. Требует инструмент ранга 1 (у игрока есть деревянная лопата).
        Находится в Одуванчиковой Поляне - первой локации для сбора.
  objective_description: Собери 3 Одуванчика на Одуванчиковой Поляне и доставь их
    Лире Лекарь в Деревню Речных Лугов. Гаррик Кузнец из Королевской столицы дал тебе
    это задание для обработки материалов.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: О, добро пожаловать! Гаррик сказал, что ты придёшь.
        speaker: Лира Лекарь
      - remark: Спасибо, что принёс травы в целости и сохранности!
        speaker: Лира Лекарь
      - remark: Эти Одуванчики помогут мне создать волшебное зелье для кузнеца.
        speaker: Лира Лекарь
      - remark: Твоя помощь очень ценна для нас обоих. Вот твоё награда!
        speaker: Лира Лекарь
      - remark: Приходи ещё, если понадобишься добрые руки!
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Пищащие звуки раздаются из мрака...
        speaker: Пещерная крыса
      - remark: Грызун встаёт на дыбы, готовясь к атаке!
        speaker: Пещерная крыса
      - remark: Это маленькое, но злое существо преграждает твой путь!
        speaker: Пещерная крыса
      - remark: Крыса издаёт боевой клич и бросается в атаку!
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 3
      character: Гаррик Кузнец
      dialogs:
      - remark: Добрый день, странник! Мне срочно нужны материалы для работы.
        speaker: Гаррик Кузнец
      - remark: Принеси мне Одуванчик - простую траву, которая растёт на Одуванчиковой
          Поляне.
        speaker: Гаррик Кузнец
      - remark: Мне нужно всего три штуки. Это не должно быть сложно для опытного
          собирателя.
        speaker: Гаррик Кузнец
      - remark: После сбора травы, доставь её Лире Лекарь в Деревню Речных Лугов.
        speaker: Гаррик Кузнец
      - remark: Она поможет мне обработать материал. За твою помощь я щедро вознагражу
          тебя!
        speaker: Гаррик Кузнец
      - remark: Поспеши! Мне не терпится начать работу.
        speaker: Гаррик Кузнец
      resource: Одуванчик
  reward:
    item_name: Деревянная лопата
