quest:
  explanation:
    destination:
      character_to_deliver: 'Гаррик Кузнец выбран потому что: 1) находится в Королевской
        столице (другая локация от Лиры); 2) может принять Подорожник (в его списке
        принимаемых ресурсов); 3) он ещё не выдал квесты игроку (персонажи отличаются
        как требуется).'
      dialogs: Диалоги с Гарриком Кузнецом в Королевской столице. Он узнаёт о задании,
        хвалит Лиру, и затем дарует награду за благородство. 7 реплик создают логичное
        завершение квеста.
    enemy_to_face:
      amount: 2 Гоблина-вора выбрано как вызов для уровня 1 игрока. Один враг был
        бы слишком легко, но два создают реальную угрозу без перевеса (возможный урон
        6 за ход).
      dialogs: Диалоги с Гоблином-вором показывают встречу в лесу. Враг угрожает,
        игрок пытается договориться, но схватка неизбежна. 5 реплик создают напряжение
        перед боем.
      enemy: Гоблин-вор выбран из доступных врагов ранга 1 (как и игрок). Здоровье
        24, урон 3 в ход - опасен, но преодолим для игрока с Деревянным мечом (2 урона
        за удар, требуется 12 ударов).
    resource_to_deliver:
      amount: Количество 3 выбрано как умеренное для новичка (уровень 1, здоровье
        100). Достаточно, чтобы быть значимым, но не перегружающим.
      character: Лира Лекарь выбрана потому, что она находится в Деревне Речных Лугов
        (указано в базе данных) и может принять Подорожник ранга 2 (минимальный ранг
        инструмента 1, что соответствует Деревянной лопате игрока).
      dialogs: Диалоги отражают встречу игрока с Лирой Лекарь в Деревне Речных Лугов.
        Целительница объясняет ситуацию (эпидемия), просит помощь (сбор Подорожника),
        указывает локацию (Подорожниковый Бор) и даёт советы. Выбраны 7 диалоговых
        линий для естественного диалога.
      resource: 'Подорожник выбран потому что: 1) соответствует уровню игрока (ранг
        2, требует инструмент ранга 1); 2) находится в Подорожниковом Боре (доступная
        локация); 3) Лира Лекарь может принять этот ресурс.'
  objective_description: Помогите целительнице Лире Лекарь. Она просит вас собрать
    три пучка Подорожника из Подорожникового Бора и доставить их кузнецу Гаррику в
    Королевскую столицу. Берегись опасностей на пути!
  parts:
    destination:
      character_to_deliver: Гаррик Кузнец
      dialogs:
      - remark: О, добро пожаловать в мою кузницу! Что привело тебя ко мне?
        speaker: Гаррик Кузнец
      - remark: Лира Лекарь попросила меня доставить ей Подорожник для лечебного зелья.
        speaker: Игрок
      - remark: Ах, отличная целительница! Её зелья спасли не одну жизнь в нашем королевстве.
        speaker: Гаррик Кузнец
      - remark: Постой, ты же не из здешних мест? Редкий гость в Королевской столице
          так помогает простым деревенским врачам.
        speaker: Гаррик Кузнец
      - remark: За такую доброту и помощь ты достоин награды. Я дам тебе мою Железную
          лопату - поверь, она пригодится!
        speaker: Гаррик Кузнец
      - remark: Спасибо, мастер! Это благородно с твоей стороны.
        speaker: Игрок
      - remark: Это наименьшее, что я могу сделать. Переди благодарность Лире - она
          настоящий ангел для всех нас.
        speaker: Гаррик Кузнец
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Хе-хе! Свежая добыча! Редко когда сюда забредают путники...
        speaker: Неизвестный голос
      - remark: Зачем ты пришёл в мой лес, человечишка? Вещи свои отдавай!
        speaker: Гоблин-вор
      - remark: Я только собираю травы для целительницы. Дай мне пройти!
        speaker: Игрок
      - remark: Ха! Никого не отпускаю просто так. Встреча с нами - твой последний
          день!
        speaker: Гоблин-вор
      - remark: И ещё двое моих братьев здесь где-то... Готовься к схватке!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 3
      character: Лира Лекарь
      dialogs:
      - remark: Приветствую тебя, молодой путешественник! Мне срочно нужна твоя помощь.
        speaker: Лира Лекарь
      - remark: Чем я могу быть полезен, целительница?
        speaker: Игрок
      - remark: В нашей деревне разразилась эпидемия. Мне нужен Подорожник для приготовления
          лекарства.
        speaker: Лира Лекарь
      - remark: Подорожник растёт в Подорожниковом Бору, неподалёку отсюда. Сможешь
          ли ты собрать для меня три пучка?
        speaker: Лира Лекарь
      - remark: Конечно, я помогу! Где именно расположен этот бор?
        speaker: Игрок
      - remark: Направляйся на восток от Деревни Речных Лугов. Будь осторожен на дороге!
        speaker: Лира Лекарь
      - remark: 'Вот тебе совет: эта трава предпочитает влажные места. Ищи её у подножия
          деревьев.'
        speaker: Лира Лекарь
      resource: Подорожник
  reward:
    item_name: Железная лопата
