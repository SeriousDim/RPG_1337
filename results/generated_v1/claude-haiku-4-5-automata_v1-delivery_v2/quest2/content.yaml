quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь выбрана потому, что она находится в Деревне
        Речных Лугов (другое место, чем отправитель) и может принять Уголь в качестве
        ресурса согласно её профилю.
      dialogs: Диалоги Лиры Лекаря показывают её удивление и благодарность. Она радуется
        полученному ресурсу и предлагает награду.
    enemy_to_face:
      amount: Одна крыса — подходящая сложность для первого квеста игрока без брони.
      dialogs: Диалоги врага отражают его природу и боевой дух. Крыса издает звуки
        и пытается атаковать игрока.
      enemy: Пещерная крыса выбрана как враг ранга 1, соответствующий уровню игрока.
        Она наносит 2 урона за ход и имеет 20 HP, что вполне преодолимо с деревянным
        мечом (2 урона за удар).
    resource_to_deliver:
      amount: Одна единица ресурса подходит для начинающего игрока и не является чрезмерно
        сложной задачей.
      character: Гаррик Кузнец выбран потому, что он находится в Королевской столице
        и может выдать задание на добычу Угля (который ему требуется согласно его
        профилю).
      dialogs: Диалоги показывают срочность задачи и доброе отношение кузнеца к игроку.
        Персонаж дает четкие инструкции о месте добычи ресурса.
      resource: Уголь выбран как первый доступный ресурс для игрока уровня 1. Он требует
        инструмент ранга 1, а у игрока есть деревянная кирка ранга 1.
  objective_description: Гаррик Кузнец из Королевской столицы просит тебя добыть Уголь
    и доставить его Лире Лекарю в Деревню Речных Лугов. Отправляйся в Одуванчиковую
    Поляну, добудь необходимый ресурс и выполни поручение!
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: Здравствуй, странник! Откуда ты пришел?
        speaker: Лира Лекарь
      - remark: Погляди-ка... это же Уголь! Где же ты его нашел?
        speaker: Лира Лекарь
      - remark: Мне как раз нужен был такой материал для моих лекарственных опытов!
        speaker: Лира Лекарь
      - remark: Это отличного качества. Ты настоящий помощник!
        speaker: Лира Лекарь
      - remark: Вот, прими это в знак благодарности. Тебе это пригодится!
        speaker: Лира Лекарь
      - remark: Спасибо, друже! Заходи ещё, если понадобишься.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: '*Издает пронзительный писк и бросается в атаку!*'
        speaker: Пещерная крыса
      - remark: '*Пытается загрызть тебя своими острыми зубами!*'
        speaker: Пещерная крыса
      - remark: '*Крыса дает отпор, царапая острыми когтями!*'
        speaker: Пещерная крыса
      - remark: '*Животное все еще полно боевого духа!*'
        speaker: Пещерная крыса
      - remark: '*Последний отчаянный бросок!*'
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 1
      character: Гаррик Кузнец
      dialogs:
      - remark: Добрый день, путник! Мне срочно нужен Уголь для моей кузницы.
        speaker: Гаррик Кузнец
      - remark: Без топлива я не смогу работать. Это очень срочно!
        speaker: Гаррик Кузнец
      - remark: Ты выглядишь сильным. Сможешь ли ты добыть для меня Уголь?
        speaker: Гаррик Кузнец
      - remark: Одного куска Угля будет достаточно. Поторопись, пожалуйста!
        speaker: Гаррик Кузнец
      - remark: В Одуванчиковой Поляне есть залежи Угля. Вот туда и отправляйся!
        speaker: Гаррик Кузнец
      - remark: Когда добудешь Уголь, не забудь вернуться сюда в Королевскую столицу.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Деревянная лопата
