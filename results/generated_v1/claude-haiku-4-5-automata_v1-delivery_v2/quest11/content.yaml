quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь выбрана как получатель ресурса (отличается
        от Гаррика), находится в соседней локации Деревня Речных Лугов, что логично
        для квеста доставки первого уровня.
      dialogs: Диалог с Лирой Лекарью в Деревне Речных Лугов. Включены 6 реплик, раскрывающих
        неожиданность её участия в квесте и признательность за доставку.
    enemy_to_face:
      amount: 2 крысы - число враждебных существ выбрано с учётом того, что игрок
        имеет деревянный меч с уроном 2 и максимальным здоровьем 100. Две крысы будут
        испытанием, но не смертельным.
      dialogs: Диалог описывает встречу с враждебными существами в месте добычи ресурсов.
        Включены 6 реплик, демонстрирующих агрессию врага и готовность игрока к сражению.
      enemy: Пещерная крыса выбрана как враг ранга 1 (соответствует уровню игрока),
        с минимальным уроном (2 в ход) и скромным здоровьем (20 HP). Обитает в пещерах
        Одуванчиковой Поляны логически.
    resource_to_deliver:
      amount: Количество 3 единицы выбрано как достаточное для новичка - не слишком
        простое, но и не подавляющее. Соответствует раннему игровому контенту.
      character: Гаррик Кузнец выбран как стартовый NPC, так как он предлагает простые
        ресурсы (Уголь и Одуванчик) из первой локации для игрока уровня 1 с деревянной
        киркой ранга 1.
      dialogs: Диалог представляет первую встречу с Гаррик Кузнецом в Королевской
        столице, который излагает задачу добычи ресурса. Включены 6 реплик, раскрывающих
        проблему кузнеца и его просьбу о помощи.
      resource: Уголь выбран как первоначальный ресурс, соответствующий уровню игрока
        (ранг 1), находится в Одуванчиковой Поляне и требует кирку ранга 1, которая
        уже есть у игрока.
  objective_description: Гаррик Кузнец попросил вас добыть 3 единицы Угля из Одуванчиковой
    Поляны и доставить их Лире Лекарю в Деревню Речных Лугов. На пути туда вас ждёт
    встреча с опасными обитателями пещер.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: О, здравствуй! Интересно, что привело тебя в мою деревню?
        speaker: Лира Лекарь
      - remark: Ты идёшь от Гаррика? Я вижу, ты держишь Уголь в руках.
        speaker: Лира Лекарь
      - remark: Странно... Гаррик обычно сам приходит за припасами. Что-то случилось?
        speaker: Лира Лекарь
      - remark: Гаррик попросил меня доставить ему Уголь, но сначала попросил отдать
          его тебе.
        speaker: Игрок
      - remark: Ах, как интересно! Мне действительно нужен Уголь для моих зелий. Спасибо
          тебе, странник!
        speaker: Лира Лекарь
      - remark: За твою помощь я дам тебе полезный инструмент для странствий.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Чирик-чирик! Эта территория моя!
        speaker: Пещерная крыса
      - remark: Ты не пройдёшь мимо без боя!
        speaker: Пещерная крыса
      - remark: Придётся с тобой разобраться, мерзкая тварь!
        speaker: Игрок
      - remark: Берегись моих острых зубов!
        speaker: Пещерная крыса
      - remark: Мой деревянный меч справится и с тобой!
        speaker: Игрок
      - remark: Гррррр!
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 3
      character: Гаррик Кузнец
      dialogs:
      - remark: Добрый день, странник! Мне срочно понадобился Уголь для работы в кузне.
        speaker: Гаррик Кузнец
      - remark: Мои запасы топлива иссякли, и я не могу продолжать свою работу.
        speaker: Гаррик Кузнец
      - remark: Слышал, что в Одуванчиковой Поляне можно найти Уголь. Ты не мог бы
          добыть для меня несколько единиц?
        speaker: Гаррик Кузнец
      - remark: За твою помощь я отблагодарю тебя достойно!
        speaker: Гаррик Кузнец
      - remark: Принеси мне 3 единицы Угля, и я дам тебе один из моих инструментов.
        speaker: Гаррик Кузнец
      - remark: Хорошо, Гаррик! Я найду для тебя Уголь в Одуванчиковой Поляне.
        speaker: Игрок
      resource: Уголь
  reward:
    item_name: Деревянная лопата
