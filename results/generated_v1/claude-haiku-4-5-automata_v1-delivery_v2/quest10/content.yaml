quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь из Деревни Речных Лугов - это второй персонаж
        в цепи квеста, различный от Гаррика. Она принимает Одуванчик и награждает
        игрока. В её списке items_can_be_accepted_for_delivery_or_collection имеется
        Одуванчик ранга 1.
      dialogs: Диалоги Лиры Лекарей показывают признание её работы Гаррика и благодарность
        за выполненное поручение. Создают ощущение связности мира между персонажами.
    enemy_to_face:
      amount: 1 враг - справедливый вызов для новичка, позволяющий пережить боевой
        опыт без риска смерти.
      dialogs: Диалоги создают атмосферу встречи с дикой тварью. Пещерная крыса агрессивно
        реагирует на присутствие игрока, что оправдывает боевой конфликт.
      enemy: Пещерная крыса ранга 1 - слабый враг с 20 HP и 2 урона в ход. Идеально
        подходит для уровня 1 игрока с деревянным мечом (2 урона). Встреча логична
        для локации Одуванчиковой Поляны.
    resource_to_deliver:
      amount: 1 единица - минимальное и логичное количество для начинающего игрока
        уровня 1.
      character: Гаррик Кузнец выбран как НПС, способный давать задания на добычу
        ресурсов. В его list items_can_be_accepted_for_delivery_or_collection включён
        Одуванчик ранга 1, что соответствует уровню игрока.
      dialogs: Диалоги отражают просьбу Гаррика Кузнеца, мастера из Королевской столицы.
        Он представляется как персонаж, нуждающийся в ресурсе, и мотивирует игрока
        выполнить задание.
      resource: Одуванчик ранга 1 - это базовый ресурс из Одуванчиковой Поляны, доступный
        игроку с текущими характеристиками. Требует лопату ранга 1, которая уже есть
        в инвентаре.
  objective_description: Гаррик Кузнец из Королевской столицы просит тебя отыскать
    Одуванчик в Одуванчиковой Поляне и доставить его Лире Лекарю в Деревню Речных
    Лугов. Это поручение даст тебе опыт и поможет установить связи с мастерами ремесла.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: О, добрый путник! Гаррик отправил тебя? Чудесно!
        speaker: Лира Лекарь
      - remark: Одуванчик... именно то, что мне нужно для моих снадобий.
        speaker: Лира Лекарь
      - remark: Благодарю тебя за помощь. Такие помощники мне очень нужны.
        speaker: Лира Лекарь
      - remark: Прошу, возьми это в награду за твою верность и отвагу.
        speaker: Лира Лекарь
      - remark: Может, поможешь мне в будущем с другими делами?
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Писк! Писк!
        speaker: Пещерная крыса
      - remark: Кто посмел вторгнуться в наши земли?!
        speaker: Пещерная крыса
      - remark: На пути к Одуванчиковой Поляне тебя встречает дикая пещерная крыса,
          охраняющая территорию.
        speaker: Повествователь
      - remark: Удались отсюда или будешь сражаться!
        speaker: Пещерная крыса
      - remark: Это МОЯ земля! Ты не пройдёшь без боя!
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 1
      character: Гаррик Кузнец
      dialogs:
      - remark: Здравствуй, путник! Слышал, ты набираешь силу. Мне срочно нужен Одуванчик
          для одного зелья.
        speaker: Гаррик Кузнец
      - remark: В Одуванчиковой Поляне их полно. Сможешь ли ты добыть для меня один?
        speaker: Гаррик Кузнец
      - remark: Это растение поможет мне в работе. Не займёт у тебя много времени.
        speaker: Гаррик Кузнец
      - remark: Спешу я, видишь ли. Помощь твоя будет щедро вознаграждена!
        speaker: Гаррик Кузнец
      - remark: Вернёшься с Одуванчиком - найдёшь меня здесь же в столице.
        speaker: Гаррик Кузнец
      resource: Одуванчик
  reward:
    item_name: Деревянная лопата
