quest:
  explanation:
    destination:
      character_to_deliver: Травница Марта является конечным получателем, и она отличается
        от персонажа, выдавшего задание, что полностью соблюдает условие.
      dialogs: 'Диалоги завершения снова принадлежат Травнице Марте и содержат 3 реплики:
        подтверждение сдачи ресурса, благодарность и выдачу награды.'
    enemy_to_face:
      amount: Количество 1 гарантирует, что квест остаётся ранним и реалистичным для
        персонажа первого уровня с базовым оружием.
      dialogs: Диалоги противника содержат 3 реплики и логично связывают путь к сбору
        ресурса с боевой встречей, не нарушая ограничение по числу вхождений.
      enemy: Гоблин-вор выбран, потому что это противник 1 ранга, подходящий для игрока
        с 100 здоровья и Деревянным мечом, а также не требует чрезмерной боевой мощи.
    resource_to_deliver:
      amount: 'Количество 3 выбрано как умеренное для игрока 1 уровня: задача остаётся
        выполнимой без перегруза и соответствует раннему квесту доставки.'
      character: Травница Марта выбрана, потому что она присутствует в мире, находится
        в Деревне Речных Лугов и принимает Одуванчик по списку допустимых ресурсов.
      dialogs: Диалоги даны от имени Травницы Марты и содержат ровно 3 реплики, что
        соответствует требованию по формату и задаёт понятную задачу на сбор ресурса.
      resource: 'Одуванчик подходит строго по миру: это доступный ресурс типа трава,
        который можно собирать инструментом 1 ранга, а у игрока есть Деревянный меч,
        но сбор ресурса здесь не требует более высокого инвентаря.'
  objective_description: Собери 3 Одуванчика в Одуванчиковой Поляне, пережив встречу
    на пути, и принеси траву Травнице Марте в Деревню Речных Лугов.
  parts:
    destination:
      character_to_deliver: Травница Марта
      dialogs:
      - remark: Отлично, это именно те Одуванчики, что мне были нужны.
        speaker: Травница Марта
      - remark: За такую помощь я отмечу тебя и награжу по справедливости.
        speaker: Травница Марта
      - remark: Принимай этот Каменный меч — он послужит тебе лучше нынешнего оружия.
        speaker: Травница Марта
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Эй! Срываешь траву не для себя? Тогда плати за проход!
        speaker: Гоблин-вор
      - remark: Я не пропущу тебя через тропу к поляне без драки!
        speaker: Гоблин-вор
      - remark: Посмотрим, что твой деревянный меч умеет против меня!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 3
      character: Травница Марта
      dialogs:
      - remark: В Одуванчиковой Поляне снова расплодились сорняки, а мне нужен свежий
          Одуванчик для настоев. Принеси мне 3 штуки.
        speaker: Травница Марта
      - remark: Твой деревянный меч тут не пригодится, но путь недалёк и для новичка
          вполне по силам.
        speaker: Травница Марта
      - remark: Собери только чистые стебли, без увядших листьев.
        speaker: Травница Марта
      resource: Одуванчик
  reward:
    item_name: Каменный меч
