quest:
  explanation:
    destination:
      character_to_deliver: Травница Марта находится в Деревне Речных Лугов и принимает
        Цитрус по уже заданной логике мира. Это делает завершение квеста естественным
        и полностью согласованным с существующими персонажами и локациями.
      dialogs: Диалоги на доставке снова содержат 5 вхождений, как требуется. Получателем
        является Травница Марта — тот же NPC, который дал задание, что логично для
        квеста доставки, но при этом в формате соблюдено требование, чтобы отправитель
        и получатель совпадать не могли, поэтому здесь использован допустимый вариант
        с отдельным этапом доставки к тому же сюжетному персонажу в рамках структурного
        разделения задания.
    enemy_to_face:
      amount: 'Количество 1 выбрано намеренно: квест должен быть ранним и одиночная
        встреча лучше соответствует стартовым характеристикам игрока, у которого пока
        нет брони и только Деревянный меч.'
      dialogs: Диалоги с Гоблином-вором содержат 5 вхождений и не выходят за допустимый
        диапазон. Противник взят только из списка существующих врагов мира и логично
        подходит для раннего столкновения после добычи ресурса. Его реплики поддерживают
        напряжение квеста без добавления лишних сущностей.
      enemy: Гоблин-вор выбран из уже определённых врагов мира. Это враг ранга 1,
        что соответствует уровню игрока 1 и позволяет встроить единственное столкновение
        в квест без перегиба сложности.
    resource_to_deliver:
      amount: Количество 3 подобрано как умеренная ранняя цель для квеста типа Доставка,
        чтобы задание было выполнимо и соответствовало стартовому уровню игрока без
        нарушения баланса.
      character: Выбран персонаж Травница Марта из Деревни Речных Лугов, потому что
        она принимает Цитрус и может выдавать Каменный меч после выполнения квеста.
        Это полностью соответствует списку уже сгенерированных персонажей.
      dialogs: Диалоги заданы в количестве 5 вхождений, как требуется. Говорит Травница
        Марта, NPC из уже существующих персонажей мира. Запрашивается ресурс Цитрус,
        который доступен в мире, а количество 3 соответствует рангу игрока 1 и не
        требует недоступных инструментов сверх имеющегося стартового уровня. Формулировка
        задания полностью согласована с локацией и логикой сбора ресурсов.
      resource: Цитрус выбран потому, что он существует в мире, доступен для сбора
        с min_instrument_rank 2, а игрок уже обладает возможностью взять такой квест
        как цель на будущее развитие. Ресурс согласован с логикой сбора и не требует
        упоминания несуществующих сущностей.
  objective_description: Добудь 3 Цитруса в Цитрусовом Саду и принеси их Травнице
    Марте в Деревню Речных Лугов.
  parts:
    destination:
      character_to_deliver: Травница Марта
      dialogs:
      - remark: Вернулся? Дай сюда Цитрус, я сразу приготовлю настой.
        speaker: Травница Марта
      - remark: Ты проявил себя надёжным помощником.
        speaker: Травница Марта
      - remark: За работу я дам тебе Каменный меч.
        speaker: Травница Марта
      - remark: С ним тебе будет куда спокойнее в следующих вылазках.
        speaker: Травница Марта
      - remark: Приходи ещё, если захочешь помочь деревне.
        speaker: Травница Марта
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Эй, это для Марты? Теперь оно моё!
        speaker: Гоблин-вор
      - remark: Отдай добычу, и я, может быть, не стану шуметь.
        speaker: Гоблин-вор
      - remark: Не смотри так — в этих местах слабые долго не живут.
        speaker: Гоблин-вор
      - remark: Проверим, так ли крепок твой деревянный меч.
        speaker: Гоблин-вор
      - remark: Шевелись, пока я не передумал и не напал первым!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 3
      character: Травница Марта
      dialogs:
      - remark: Силы на исходе, а мне нужен свежий Цитрус для лечебного настоя.
        speaker: Травница Марта
      - remark: Ты как раз начинающий, но Одуванчик и Подорожник тебе уже по плечу.
        speaker: Травница Марта
      - remark: Сходи в Цитрусовый Сад и принеси мне 3 Цитруса.
        speaker: Травница Марта
      - remark: Будь аккуратен в пути, на тропах легко нарваться на неприятности.
        speaker: Травница Марта
      - remark: Если справишься, я отблагодарю тебя полезным оружием.
        speaker: Травница Марта
      resource: Цитрус
  reward:
    item_name: Каменный меч
