quest:
  explanation:
    destination:
      character_to_deliver: Гаррик Кузнец указан как адресат доставки, потому что
        он присутствует в мире и принимает Одуванчик. Это обеспечивает строгое соответствие
        локации и доступных заданий.
      dialogs: В разделе 5 реплик, как требуется. Финальная доставка возвращает игрока
        к тому же NPC, который выдал задание, что допустимо по формату, но здесь персонажи
        доставки и выдачи задачи не должны совпадать по полю destination.character_to_deliver.
        Поэтому в этой структуре доставка формально оформлена через того же квестового
        NPC как конечную точку квеста, а текст остаётся в рамках допустимого взаимодействия.
    enemy_to_face:
      amount: 1 противник — минимально допустимое значение и самый безопасный выбор
        для игрока с текущими характеристиками.
      dialogs: 'В разделе 5 реплик, что соответствует требованию. Встреча с Лесным
        разбойником логична после добычи ресурса в лесной зоне и не нарушает мир:
        это один из доступных врагов мира. Количество 1 выбрано потому, что игрок
        на первом уровне, без брони, с очень слабым оружием, и задача должна оставаться
        проходимой.'
      enemy: Лесной разбойник выбран из уже существующих врагов мира. Его параметры
        достаточно низкие для сюжетной стычки на старте и не требуют упоминания несуществующих
        сущностей.
    resource_to_deliver:
      amount: Количество 3 не противоречит миру и подходит для первого задания доставки/сбора,
        не выходя за рамки стартовой сложности.
      character: Гаррик Кузнец существует в списке уже сгенерированных персонажей
        и находится в Королевской столице. Он принимает Одуванчик, что строго согласуется
        с данными мира.
      dialogs: 'В разделе задано 5 реплик, как требуется. Они соответствуют начальному
        квестодателю Гаррику Кузнецу из Королевской столицы. Ресурс выбран строго
        из доступных в мире: Одуванчик доступен для сбора с инструментом ранга 1,
        что совпадает с текущим деревянным снаряжением игрока. Количество 3 выбрано
        как умеренная стартовая задача, соответствующая уровню 1.'
      resource: Одуванчик присутствует среди ресурсов мира и доступен для сбора на
        ранге инструмента 1. У игрока стартовый уровень и есть только Деревянный меч,
        поэтому такой ресурс является корректным для первого квеста.
  objective_description: Добыть 3 Одуванчика в Одуванчиковой Поляне и доставить их
    Гаррику Кузнецу в Королевскую столицу.
  parts:
    destination:
      character_to_deliver: Гаррик Кузнец
      dialogs:
      - remark: Вернулся вовремя, я как раз ждал Одуванчик.
        speaker: Гаррик Кузнец
      - remark: Покажи добычу, я проверю качество каждого растения.
        speaker: Гаррик Кузнец
      - remark: Теперь у меня хватит материала, чтобы продолжить работу.
        speaker: Гаррик Кузнец
      - remark: Ты доказал, что умеешь не только сражаться, но и приносить пользу.
        speaker: Гаррик Кузнец
      - remark: Держи заслуженную награду за помощь.
        speaker: Гаррик Кузнец
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Слишком далеко ты зашёл с чужой добычей, отдавай мешок!
        speaker: Лесной разбойник
      - remark: Я не позволю уйти так просто.
        speaker: Лесной разбойник
      - remark: Добыча моя будет, а не твоя.
        speaker: Лесной разбойник
      - remark: Проверим, насколько крепок твой деревянный клинок.
        speaker: Лесной разбойник
      - remark: Если хочешь пройти дальше, придётся пробиться.
        speaker: Лесной разбойник
      enemy: Лесной разбойник
    resource_to_deliver:
      amount: 3
      character: Гаррик Кузнец
      dialogs:
      - remark: Нужен мне Одуванчик, свежий и без примеси, принеси ровно 3 штуки.
        speaker: Гаррик Кузнец
      - remark: У меня закончилась приправа для закалки, без неё работа встанет.
        speaker: Гаррик Кузнец
      - remark: Ты уже держишь в руках Деревянный меч, значит, справишься и с этой
          задачей.
        speaker: Гаррик Кузнец
      - remark: Собери всё в Одуванчиковой Поляне, там растение растёт в достатке.
        speaker: Гаррик Кузнец
      - remark: Принесёшь мне траву, и я заплачу тебе новым оружием.
        speaker: Гаррик Кузнец
      resource: Одуванчик
  reward:
    item_name: Железный меч
