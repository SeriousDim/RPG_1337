quest:
  explanation:
    destination:
      character_to_deliver: Гаррик Кузнец выбран как получатель, поскольку он отличается
        от персонажа, выдающего задание, что строго соблюдает требование о разных
        персонажах в начале и конце квеста.
      dialogs: На этапе сдачи Гаррик Кузнец благодарит игрока, проверяет качество
        Одуванчика и выдаёт награду. Диалог состоит из 5 реплик и завершает цепочку
        задания.
    enemy_to_face:
      amount: Количество 1 достаточно для сюжетной встречи после сбора ресурса и соответствует
        формату квеста доставки.
      dialogs: После добычи ресурса игрок сталкивается с Гоблином-вором; его реплики
        отражают попытку отобрать добычу. Этот противник есть в списке врагов мира,
        а диалог содержит 5 реплик, что соответствует требованиям.
      enemy: Гоблин-вор выбран как слабый противник ранга 1, подходящий для игрока
        с 100 здоровья и Деревянным мечом, не создающий несоответствия по балансу.
    resource_to_deliver:
      amount: Количество 3 — умеренная стартовая задача для персонажа 1 уровня, достаточно
        короткая и логичная для первого квеста доставки.
      character: Гаррик Кузнец выбран, потому что он находится в Королевской столице,
        доступной в мире, и принимает Одуванчик. Он является корректным персонажем
        для выдачи задания на добычу этого ресурса.
      dialogs: В диалогах Гаррик Кузнец прямо просит принести 3 Одуванчика и указывает,
        что товар нужен для кузнечного заказа. Количество и ресурс полностью соответствуют
        доступным для игрока рангу 1 и текущему снаряжению, а Одуванчик есть в мире
        и может быть собран с инструментом 1 ранга.
      resource: Одуванчик выбран строго из доступных ресурсов мира; он подходит игроку
        с Деревянным мечом и не требует инструмента выше 1 ранга.
  objective_description: Добыть 3 Одуванчика в Одуванчиковой Поляне и доставить их
    Гаррику Кузнецу в Королевской столице, пережив по пути нападение.
  parts:
    destination:
      character_to_deliver: Гаррик Кузнец
      dialogs:
      - remark: Вот и ты. Показывай добычу.
        speaker: Гаррик Кузнец
      - remark: Одуванчик свежий, именно такой мне и нужен.
        speaker: Гаррик Кузнец
      - remark: Партия принята, работа в кузнице пойдёт быстрее.
        speaker: Гаррик Кузнец
      - remark: Ты справился без проволочек, это ценится.
        speaker: Гаррик Кузнец
      - remark: Держи награду — она пригодится тебе в дальнейших делах.
        speaker: Гаррик Кузнец
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Эй, путник, отдавай всё, что нашёл!
        speaker: Гоблин-вор
      - remark: Три одуванчика? Это уже не трава, а добыча!
        speaker: Гоблин-вор
      - remark: Дальше не пройдёшь, пока не заплатишь.
        speaker: Гоблин-вор
      - remark: Сейчас посмотрим, насколько крепок твой меч.
        speaker: Гоблин-вор
      - remark: Я заберу твой груз и исчезну в траве!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 3
      character: Гаррик Кузнец
      dialogs:
      - remark: Мне нужна свежая партия Одуванчика. Без неё я не смогу закончить заказ.
        speaker: Гаррик Кузнец
      - remark: 'Тебе под силу добыть его даже с твоим Деревянным мечом: для сбора
          тут не нужна сила, только дорога и внимательность.'
        speaker: Гаррик Кузнец
      - remark: Отправляйся к Одуванчиковой Поляне и принеси мне 3 Одуванчика.
        speaker: Гаррик Кузнец
      - remark: 'Заказ простой, но нужный: кузница не любит задержек.'
        speaker: Гаррик Кузнец
      - remark: Вернёшься с добычей — я приму её без лишних вопросов.
        speaker: Гаррик Кузнец
      resource: Одуванчик
  reward:
    item_name: Деревянная лопата
