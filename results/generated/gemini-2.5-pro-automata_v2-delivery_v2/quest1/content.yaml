quest:
  explanation:
    destination:
      character_to_deliver: Выбран 'Мастер Ювелир', который также находится в 'Королевской
        столице'. Это делает логистику квеста удобной для новичка (не нужно бежать
        в другую локацию). Выбор другого NPC в качестве получателя соответствует типу
        квеста 'Доставка' и показывает взаимосвязи между персонажами в одном городе,
        углубляя мир.
      dialogs: Диалоги с Мастером Ювелиром завершают квестовую цепочку. Он благодарит
        игрока, что подтверждает успешное выполнение задания, и выдает логичную награду.
        Его реплики о том, что игрок ходит без защиты, напрямую подводят к награде,
        делая ее получение обоснованным и ценным в глазах игрока.
    enemy_to_face:
      amount: Выбран один противник, чтобы не перегружать игрока на его первом задании.
        Это позволяет ему освоиться с боевой системой в контролируемых условиях. Встреча
        с одним врагом воспринимается как случайная опасность, а не как непреодолимое
        препятствие.
      dialogs: Диалоги с 'Пещерной крысой' сделаны примитивными, чтобы подчеркнуть
        её животную природу. Она не ведет осмысленный разговор, а лишь защищает свою
        территорию. Это создает эффект неожиданного нападения и погружает в атмосферу
        опасности при сборе ресурсов.
      enemy: Выбрана 'Пещерная крыса' – враг 1-го ранга. Это идеальный противник для
        игрока 1-го уровня. Здоровье крысы (20 HP) и урон (2 DMG) сбалансированы против
        урона игрока ('Деревянный меч', 2 DMG) и его здоровья (100 HP). Игроку понадобится
        10 ударов, чтобы победить, за это время он получит ~20 урона, что не является
        критичным и учит основам боя без риска гибели.
    resource_to_deliver:
      amount: Количество 8 является достаточным, чтобы игрок потратил некоторое время
        на добычу, но не слишком большим, чтобы квест стал утомительным для новичка.
        Это также подталкивает игрока к исследованию первой ресурсной локации.
      character: Выбран Гаррик Кузнец, так как он находится в 'Королевской столице',
        стартовой локации, и его профессия напрямую связана с рудой (углем), что делает
        его просьбу логичной. Он принимает ресурсы 1-го ранга, что соответствует возможностям
        игрока 1-го уровня.
      dialogs: Диалоги построены так, чтобы ввести игрока в курс дела. Гаррик Кузнец,
        как опытный ремесленник, обращается к игроку-новичку с простой, но важной
        просьбой. Это создает ощущение живого мира, где у NPC есть свои дела и заботы.
        Упоминание конечного получателя (Мастера Ювелира) сразу задает квесту логику
        'доставки'.
      resource: 'Выбран ''Уголь'' – ресурс 1-го ранга. У игрока есть ''Деревянная
        кирка'' 1-го ранга, которая как раз подходит для добычи этого ресурса (min_instrument_rank:
        1). Это базовый квест на сбор, обучающий игрока механикам добычи.'
    reward:
      item_name: В качестве награды выбран 'Деревянный нагрудник'. У игрока на старте
        нет никакой брони (все слоты 'null'). Этот предмет является первым и значимым
        улучшением его защиты (+2 absorbed_damage), что напрямую повлияет на его выживаемость
        в следующих столкновениях. Предмет соответствует 1-му рангу, что адекватно
        для первого квеста.
  objective_description: Гаррик Кузнец из Королевской столицы попросил вас добыть
    8 единиц угля и доставить их Мастеру Ювелиру в той же столице.
  parts:
    destination:
      character_to_deliver: Мастер Ювелир
      dialogs:
      - remark: А, это ты тот самый юный герой, которого прислал Гаррик? Вижу, уголь
          при тебе. Отличное качество!
        speaker: Мастер Ювелир
      - remark: Да, это я. Вот, держите ваш заказ.
        speaker: Игрок
      - remark: Благодарю. Этот уголь идеально подходит для плавки тонких металлов.
          Гаррик вечно занят своими мечами, хорошо, что есть такие помощники, как
          ты.
        speaker: Мастер Ювелир
      - remark: Я вижу, ты совсем без защиты ходишь. Это не дело для искателя приключений.
          Враги в наших землях не дремлют.
        speaker: Мастер Ювелир
      - remark: Вот, возьми. Это простой, но крепкий деревянный нагрудник. Я выменял
          его у одного торговца. Тебе он сейчас нужнее.
        speaker: Мастер Ювелир
      - remark: Спасибо! Это очень щедрая награда.
        speaker: Игрок
      - remark: Это плата за твою скорость и смелость. Возвращайся, если будет нужна
          работа. Талантливым людям здесь всегда рады.
        speaker: Мастер Ювелир
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: '*Писк!* Моя-моя пещера! Мои камни!'
        speaker: Пещерная крыса
      - remark: Чужак! Убирайся! *Злобный писк*
        speaker: Пещерная крыса
      - remark: Проклятье, всего лишь крыса, но какая огромная! Придется драться.
        speaker: Игрок
      - remark: Не отдам блестяшки! *Скрежет зубов*
        speaker: Пещерная крыса
      - remark: Умри, вор! *Пронзительный визг*
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 8
      character: Гаррик Кузнец
      dialogs:
      - remark: Эй, новичок! Вижу, в руках у тебя не пусто. Ищешь, с чего бы начать
          свой путь героя?
        speaker: Гаррик Кузнец
      - remark: Я всегда готов к работе. Что-то случилось?
        speaker: Игрок
      - remark: Случилось! Заказов по горло, а у меня уголь для горна почти на нуле.
          Руки не доходят самому сходить в шахту у Одуванчиковой Поляны.
        speaker: Гаррик Кузнец
      - remark: Сможешь добыть для меня немного угля? Штук восемь хватит за глаза.
          Я бы и сам, да видишь - этот заказ для королевской стражи горит.
        speaker: Гаррик Кузнец
      - remark: Но есть нюанс. Уголь этот нужен не мне, а нашему Мастеру Ювелиру.
          У него свой, особый горн. Отнесешь ему, как добудешь.
        speaker: Гаррик Кузнец
      - remark: Понял. Добыть 8 угля и отнести Мастеру Ювелиру. Я справлюсь.
        speaker: Игрок
      - remark: Вот и славно! Он тебя щедро отблагодарит, не сомневайся. Удачи, и
          смотри под ноги в тех копях.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Деревянный нагрудник
