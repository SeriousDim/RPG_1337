quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь из Деревни Речных Лугов отличается от Гаррика
        и может принять Одуванчик согласно её профилю. Логично, что травница получает
        травы.
      dialogs: Лира Лекарь благодарит игрока за ресурсы и объясняет их ценность. 5
        реплик создают ощущение завершения квеста и значимости помощи.
    enemy_to_face:
      amount: 2 крысы - достаточно сложная, но преодолимая преграда для игрока уровня
        1 с деревянным мечом (2 урона за удар).
      dialogs: Пещерная крыса общается с игроком, создавая драматургию боя. 6 реплик
        показывают агрессию и решимость врага.
      enemy: Пещерная крыса ранга 1 находится на Одуванчиковой Поляне и по уровню
        соответствует силе игрока. Наносит 2 урона за ход, имеет 20 HP.
    resource_to_deliver:
      amount: Количество 3 одуванчика выбрано как умеренное для уровня 1 игрока. Достаточно
        сложно, но выполнимо.
      character: Гаррик Кузнец выбран из списка персонажей игрового мира. Он находится
        в Королевской столице и может принять Одуванчик.
      dialogs: Диалоги показывают мотивацию персонажа, объясняют задачу и упоминают
        место назначения доставки. Всего 6 реплик, охватывающих суть задания.
      resource: Одуванчик ранг 1 доступен для сбора лопатой ранга 1, которая уже есть
        в инвентаре игрока. Это идеальный первый квест.
  objective_description: Собери три одуванчика на Одуванчиковой Поляне и доставь их
    Лире Лекарю в Деревню Речных Лугов. Гаррик Кузнец попросил помочь ему найти эти
    редкие растения для своей кузницы.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: О, ты явился! Гаррик сказал мне, что ты придёшь с одуванчиками.
        speaker: Лира Лекарь
      - remark: Прекрасно! Это именно то, что мне нужно для моих зелий исцеления.
        speaker: Лира Лекарь
      - remark: Ты оказал мне и всей деревне неоценимую услугу. Люди здесь нуждаются
          в качественных снадобьях.
        speaker: Лира Лекарь
      - remark: Вот, возьми эту лопату как знак моей благодарности. Она намного лучше
          деревянной и прослужит тебе верой и правдой.
        speaker: Лира Лекарь
      - remark: Приходи ко мне ещё, если потребуется помощь!
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: '*ПИСК* Кто осмелился вторгнуться в мои владения?!'
        speaker: Пещерная крыса
      - remark: Эти одуванчики ДЛЯ МЕНЯ! Ты не пройдёшь!
        speaker: Пещерная крыса
      - remark: '*шорохи и звуки когтей по камню*'
        speaker: Пещерная крыса
      - remark: Приготовься к бою, незваный гость!
        speaker: Пещерная крыса
      - remark: '*готовится к атаке*'
        speaker: Пещерная крыса
      - remark: Только один из нас покинет это место живым!
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 3
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую тебя, молодой боец! Мне нужна помощь в сборе материалов
          для моей кузницы.
        speaker: Гаррик Кузнец
      - remark: Я ищу одуванчики для особого зелья, которое помогает закаливать металл.
          Ты можешь мне их принести?
        speaker: Гаррик Кузнец
      - remark: На Одуванчиковой Поляне их предостаточно. Собери для меня три штуки.
        speaker: Гаррик Кузнец
      - remark: Дорога туда не близкая, и в пути ты столкнёшься с опасностью. Но я
          верю в твои силы!
        speaker: Гаррик Кузнец
      - remark: Когда соберёшь одуванчики, отнеси их Лире Лекарю в Деревню Речных
          Лугов. Она знает, как их правильно подготовить.
        speaker: Гаррик Кузнец
      - remark: За помощь я дам тебе деревянную лопату - пригодится для добычи ресурсов
          в будущем!
        speaker: Гаррик Кузнец
      resource: Одуванчик
  reward:
    item_name: Железная лопата
