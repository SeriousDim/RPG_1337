quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь выбрана как конечный получатель. Она может
        принимать Уголь (ранг 1) и находится в Деревне Речных Лугов. Она отличается
        от Гаррик Кузнеца, что соответствует требованиям.
      dialogs: Лира Лекарь принимает ресурс и объясняет связь с Гаррик. Диалоги подтверждают
        доставку и награду.
    enemy_to_face:
      amount: Два врага выбраны, чтобы создать реальный вызов для игрока уровня 1
        без полной брони, но оставить возможность победы с использованием Деревянного
        меча (2 урона за врага).
      dialogs: Пещерная крыса озвучивает свою агрессию при встрече с игроком. Диалоги
        отражают защиту территории и враждебное намерение существа.
      enemy: Пещерная крыса выбрана как противник ранга 1 (соответствует рангу Деревянного
        меча игрока). Она имеет 20 HP и наносит 2 урона за ход, что представляет умеренную
        угрозу для игрока с 100 HP.
    resource_to_deliver:
      amount: Количество 2 куска выбрано как умеренное задание для уровня 1 игрока
        - не слишком лёгкое, но и не чрезмерно сложное.
      character: Гаррик Кузнец выбран как персонаж, выдающий задание. Он находится
        в Королевской столице и может принимать Уголь и Одуванчик (оба ранга 1, соответствуют
        рангу инструментов игрока).
      dialogs: Диалог с Гаррик Кузнецом раскрывает суть задания. Он нуждается в Угле
        для кузни и просит игрока добыть Уголь. Диалоги натуральны и мотивируют игрока
        к выполнению задания.
      resource: Уголь выбран, так как он ранга 1, и игрок может добыть его Деревянной
        лопатой (ранг 1) на Одуванчиковой Поляне.
  objective_description: Добыть два куска Угля на Одуванчиковой Поляне и доставить
    их Лире Лекарю в Деревню Речных Лугов. Гаррик Кузнец просил об этой услуге, чтобы
    пополнить свои запасы топлива.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: Здравствуй, странник! Слышала, что Гаррик ищет помощь в добыче ресурсов.
        speaker: Лира Лекарь
      - remark: Он обещал мне передать тебе кое-что ценное, если ты успешно справишься.
        speaker: Лира Лекарь
      - remark: Принес ли ты Уголь? Отдай его мне, и я позабочусь о доставке Гаррику.
        speaker: Лира Лекарь
      - remark: Отлично! Вот твоя награда за верную службу. Это Деревянная лопата
          лучшего качества.
        speaker: Лира Лекарь
      - remark: Спасибо за помощь, герой. Приходи ко мне снова, если понадобишься.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Кить-кить! Это моя территория!
        speaker: Пещерная крыса
      - remark: Никакие чужаки не будут копать на моих землях!
        speaker: Пещерная крыса
      - remark: Я защищаю свои сокровища от любых нарушителей!
        speaker: Пещерная крыса
      - remark: Кить! Приготовься к схватке!
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 2
      character: Гаррик Кузнец
      dialogs:
      - remark: Добрый день, путник! Мне срочно нужен Уголь для работы в кузне.
        speaker: Гаррик Кузнец
      - remark: Мои запасы топлива почти закончились, и я не могу продолжать ковать
          без него.
        speaker: Гаррик Кузнец
      - remark: Слышал, что Одуванчиковая Поляна богата углём. Не мог бы ты добыть
          для меня несколько кусков?
        speaker: Гаррик Кузнец
      - remark: За это я щедро вознагражу тебя. Мне нужно всего два куска Угля.
        speaker: Гаррик Кузнец
      - remark: Твоя Деревянная лопата вполне справится с добычей. Ты согласен помочь?
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Железная лопата
