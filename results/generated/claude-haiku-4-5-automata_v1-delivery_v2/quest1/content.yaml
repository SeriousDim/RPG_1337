quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь выбрана вторым персонажем, так как она отличается
        от Гаррика. Она находится в Деревне Речных Лугов и может принимать одуванчики.
        Её связь с лекарским ремеслом логична для использования травы.
      dialogs: Диалоги Лиры Лекарей показывают её как доброжелательного персонажа,
        заинтересованного в ресурсах. Её благодарность и предложение награды естественны
        в контексте игрового сюжета.
    enemy_to_face:
      amount: Количество 2 крысы создаёт небольшую сложность, но остаётся победимым
        для первоуровневого игрока с начальным оружием.
      dialogs: Диалоги пещерной крысы отражают враждебное, но простое поведение существа.
        Звукоподражания и угрозы создают атмосферу столкновения с дикой природой.
      enemy: Пещерная крыса выбрана как враг ранга 1, соответствующий уровню игрока.
        Она имеет низкую угрозу (20 HP, 2 урона в ход), что позволит игроку с деревянным
        мечом (2 урона в ход) успешно её победить.
    resource_to_deliver:
      amount: Количество 3 одуванчика выбрано как разумное для первого уровня игрока.
        Это не слишком мало и не слишком много, создаёт баланс игровой механики.
      character: Гаррик Кузнец выбран как первый персонаж, дающий задание. Он находится
        в Королевской столице и может принимать одуванчики и уголь. Это подходящий
        персонаж для начального квеста.
      dialogs: Диалоги представляют Гаррика Кузнеца, который делает обоснованный запрос
        на добычу одуванчиков. Он объясняет, зачем ему нужен ресурс, указывает на
        опасность, но мотивирует игрока наградой. Диалоги естественны и погружают
        в сюжет.
      resource: Одуванчик выбран как самый простой ресурс в игре (ранг 1). Он доступен
        на Одуванчиковой Поляне с помощью деревянной лопаты, которая уже есть у игрока.
  objective_description: Собрать три одуванчика с Одуванчиковой Поляны и доставить
    их Лире Лекарю в Деревню Речных Лугов. Гаррик Кузнец просил тебя помочь ему, отправив
    ресурсы к лекарке.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: О, добро пожаловать в мой дом! Что привело тебя сюда?
        speaker: Лира Лекарь
      - remark: Гаррик прислал тебя? Это славно! Одуванчики мне тоже нужны.
        speaker: Лира Лекарь
      - remark: Из них я готовлю целебные настои для раненых странников.
        speaker: Лира Лекарь
      - remark: Спасибо тебе, путник! Ты оказал мне большую помощь.
        speaker: Лира Лекарь
      - remark: Прими мой подарок в знак благодарности — этот деревянный щит защитит
          тебя в опасных местах!
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Писк! Писк! Эта территория наша!
        speaker: Пещерная крыса
      - remark: Уходи отсюда, путник, иль узнаешь мой укус!
        speaker: Пещерная крыса
      - remark: Писк-писк-писк!
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 3
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую, путник! Мне срочно нужны ресурсы для моей кузницы.
        speaker: Гаррик Кузнец
      - remark: Одуванчик — простое растение, но оно обладает удивительными свойствами
          для закалки металла.
        speaker: Гаррик Кузнец
      - remark: Найди для меня три одуванчика на Одуванчиковой Поляне.
        speaker: Гаррик Кузнец
      - remark: Я знаю, что там водятся опасные существа, но награда будет щедрой.
        speaker: Гаррик Кузнец
      - remark: Поспеши! Мне нужны эти растения как можно скорее для моих работ.
        speaker: Гаррик Кузнец
      - remark: Когда соберёшь ресурсы, отправляйся в Деревню Речных Лугов к Лире
          Лекарю.
        speaker: Гаррик Кузнец
      resource: Одуванчик
  reward:
    item_name: Деревянный щит
