quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь выбрана как получатель, так как она находится
        в другой локации (Деревня Речных Лугов), отличается от Гаррика, и может принимать
        Уголь (rank 1). Это создаёт логичную торговую цепь между персонажами.
      dialogs: Диалоги Лиры раскрывают её роль как персонажа, принимающего ресурсы.
        Она признает вклад игрока и объясняет цепочку поставок в игровом мире.
    enemy_to_face:
      amount: Одна крыса представляет хороший вызов без избыточной сложности для начинающего
        игрока с 100 HP.
      dialogs: Диалоги Пещерной крысы показывают её агрессивность и территориальность.
        Она охраняет добытые ресурсы, что логично для игровой механики.
      enemy: Пещерная крыса (rank 1) - враг первого уровня с 20 HP и 2 урона за ход.
        Она соответствует уровню игрока и его деревянному мечу (2 урона за удар).
    resource_to_deliver:
      amount: Количество 2 куска Угля - разумный объем для первого квеста, позволяет
        игроку набрать опыт в сборке ресурсов.
      character: Гаррик Кузнец выбран как персонаж первого уровня (rank 1), что соответствует
        текущему уровню игрока. Он находится в Королевской столице и может принимать
        Уголь (rank 1).
      dialogs: Диалоги отражают срочность заказа Гаррика, его роль как кузнеца и его
        благодарность. Персонаж заинтересован в получении ресурса и подробно объясняет
        задание.
      resource: Уголь (rank 1) - это ресурс, который идеально подходит для игрока
        уровня 1. Его можно добыть с помощью деревянной кирки на Одуванчиковой Поляне.
  objective_description: Получи у Гаррика Кузнеца задание собрать два куска Угля на
    Одуванчиковой Поляне, затем доставь ресурсы Лире Лекарю в Деревню Речных Лугов.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: О, ты вернулся! Гаррик говорил, что попросит тебя помочь.
        speaker: Лира Лекарь
      - remark: Это именно тот уголь, который нам нужен! Спасибо тебе, боец.
        speaker: Лира Лекарь
      - remark: Гаррик отправляет мне материалы через надежных людей, и ты - один
          из них.
        speaker: Лира Лекарь
      - remark: За твою помощь и отвагу я дам тебе награду. Ты её хорошо используешь.
        speaker: Лира Лекарь
      - remark: Теперь Гаррик сможет снова работать, и мы получим необходимые инструменты.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Пищащий звук... Это моя территория!
        speaker: Пещерная крыса
      - remark: Кто осмелился придти в мои земли?
        speaker: Пещерная крыса
      - remark: Я не позволю тебе забрать мой уголь!
        speaker: Пещерная крыса
      - remark: '*издает угрожающий писк*'
        speaker: Пещерная крыса
      - remark: Приготовься к бою, чужак!
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 2
      character: Гаррик Кузнец
      dialogs:
      - remark: Здравствуй, странник! Мне срочно понадобился Уголь для работы в кузне.
        speaker: Гаррик Кузнец
      - remark: Королевская столица требует новых орудий, а мои запасы топлива истощены.
        speaker: Гаррик Кузнец
      - remark: Найдешь ли ты для меня два куска Угля? Я щедро награжу тебя за помощь.
        speaker: Гаррик Кузнец
      - remark: На Одуванчиковой Поляне можно найти Уголь. Это недалеко отсюда.
        speaker: Гаррик Кузнец
      - remark: Спешу! Заказы копятся, а без топлива я не могу работать.
        speaker: Гаррик Кузнец
      - remark: Когда вернешься с углем, поспеши ко мне - время дорого!
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Деревянная лопата
