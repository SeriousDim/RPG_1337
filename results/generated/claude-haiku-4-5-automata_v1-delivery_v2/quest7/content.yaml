quest:
  explanation:
    destination:
      character_to_deliver: Травница Марта находится в Деревне Речных Лугов и может
        принимать поставки травных ресурсов. Она отличается от Гаррика Кузнеца, что
        соответствует требованиям к структуре квеста.
      dialogs: Травница Марта благодарит игрока за выполненное задание и награждает
        его. Диалоги показывают признание его труда и создают позитивное завершение
        квеста.
    enemy_to_face:
      amount: Одна крыса выбрана, так как для новичка одиночный противник - подходящий
        вызов.
      dialogs: Пещерная крыса издает угрожающие звуки перед боем. Её диалоги создают
        атмосферу встречи с врагом и обоснование конфликта.
      enemy: Пещерная крыса - противник ранга 1 с 20 HP и 2 урона в ход. Соответствует
        уровню игрока и его оружию (Деревянный меч с 2 урона за 1 удар потребует 10
        ударов для победы, что реально).
    resource_to_deliver:
      amount: Количество 3 штуки выбрано как малое число, подходящее для уровня 1
        игрока, чтобы не перегружать его первый квест.
      character: Гаррик Кузнец выбран как стартовый персонаж квеста, он находится
        в Королевской столице и может давать задания по сбору ресурсов.
      dialogs: Гаррик Кузнец инициирует квест, объясняя игроку суть задания. Диалоги
        содержат информацию о нужном ресурсе, количестве и конечном пункте доставки.
        Всего 5 реплик для полноты повествования.
      resource: Одуванчик - ресурс ранга 1, доступен игроку на Одуванчиковой Поляне
        с Деревянной лопатой (уже есть в инвентаре).
  objective_description: Собери три Одуванчика на Одуванчиковой Поляне и доставь их
    травнице Марте в Деревню Речных Лугов. Гаррик Кузнец просил передать их ей как
    одолжение.
  parts:
    destination:
      character_to_deliver: Травница Марта
      dialogs:
      - remark: О, это от Гаррика? Какая вежливость с его стороны!
        speaker: Травница Марта
      - remark: Одуванчик... Да, это именно то, что мне нужно было.
        speaker: Травница Марта
      - remark: Ты хороший помощник. Гаррик выбрал достойного посланника.
        speaker: Травница Марта
      - remark: Вот тебе награда за честное выполнение поручения. Ты её заслужил!
        speaker: Травница Марта
      - remark: Приходи ещё, если нужна помощь. Я всегда помню добрых людей.
        speaker: Травница Марта
      - remark: Удачи тебе на просторах нашего мира!
        speaker: Травница Марта
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Писк! Писк! Это мой дом, уходи отсюда!
        speaker: Пещерная крыса
      - remark: Я не позволю тебе собирать мои травы!
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 3
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую тебя, боец! Мне срочно нужен Одуванчик для приготовления
          специального отвара.
        speaker: Гаррик Кузнец
      - remark: Слышал, что на Одуванчиковой Поляне их предостаточно. Сможешь ли ты
          мне их принести?
        speaker: Гаррик Кузнец
      - remark: Мне понадобится всего три штуки. Это совсем немного!
        speaker: Гаррик Кузнец
      - remark: Собери их и отнеси их травнице Марте в Деревню Речных Лугов. Она мне
          должна одолжение.
        speaker: Гаррик Кузнец
      - remark: Спеши! Эта работа может принести тебе неплохую награду.
        speaker: Гаррик Кузнец
      resource: Одуванчик
  reward:
    item_name: Деревянная лопата
