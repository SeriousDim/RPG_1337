quest:
  explanation:
    destination:
      character_to_deliver: 'Лира Лекарь в Деревне Речных Лугов выбрана потому что:
        1) она отличается от Гаррика, 2) она принимает Одуванчики (rank 1), 3) она
        может выдавать Каменный меч (ранга 2) в качестве награды, что является логичным
        прогрессом для игрока.'
      dialogs: Диалоги Лиры Лекаря теплые и благодарные. Она признает достижение игрока
        и вручает награду. Упоминание Гаррика создает связь между двумя персонажами
        и мирозданием.
    enemy_to_face:
      amount: Одна крыса - достаточно для первого квеста, чтобы дать игроку первый
        боевой опыт без перегрузки.
      dialogs: Диалоги Пещерной крысы написаны в агрессивном, но не чрезмерном тоне.
        Противник демонстрирует территориальное поведение, что логично вписывается
        в сюжет встречи в поляне.
      enemy: Пещерная крыса выбрана как враг ранга 1 с 20 HP и 2 урона в ход. Игрок
        с 100 HP и мечом на 2 урона (требуется 10 попаданий) способен победить, но
        получит некоторый урон (20 урона). Это создает реальный вызов для уровня 1.
    resource_to_deliver:
      amount: Количество 3 выбрано оптимально - достаточно для получения опыта сбора,
        но не утомительно для новичка.
      character: Гаррик Кузнец выбран как персонаж для первого квеста - он находится
        в Королевской столице и может принимать Одуванчики (rank 1). Это подходит
        для игрока уровня 1.
      dialogs: Диалоги написаны от лица Гаррика Кузнеца, который объясняет новичку
        (уровень 1) зачем ему нужен Одуванчик и откуда его взять. Тон дружелюбный
        и поддерживающий, что подходит для первого квеста.
      resource: Одуванчик - это ресурс ранга 1, доступный на Одуванчиковой Поляне.
        Он требует инструмент ранга 1 (у игрока есть Деревянная лопата). Это самый
        простой доступный ресурс.
  objective_description: Гаррик Кузнец в Королевской столице попросил вас принести
    три одуванчика из Одуванчиковой Поляны. После сбора ресурсов необходимо доставить
    их Лире Лекарю в Деревню Речных Лугов.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: О, добрый путник! Что тебя привело в нашу скромную деревню?
        speaker: Лира Лекарь
      - remark: Гаррик прислал тебя? Он верный мастер своего дела.
        speaker: Лира Лекарь
      - remark: Одуванчики... да, они очень полезны. Я использую их для своих зелий
          исцеления.
        speaker: Лира Лекарь
      - remark: Спасибо, что помог Гаррику! Это вознаграждение - плод моего труда,
          прими его с благодарностью.
        speaker: Лира Лекарь
      - remark: Надеюсь, этот меч будет верным помощником в твоих приключениях!
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Писк! Писк! Это наша территория!
        speaker: Пещерная крыса
      - remark: Уходи отсюда, чужак, или поплатишься!
        speaker: Пещерная крыса
      - remark: Мы защищаем эти земли от всех, кто сюда приходит!
        speaker: Пещерная крыса
      - remark: Приготовься к битве!
        speaker: Пещерная крыса
      - remark: Атакуем!
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 3
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую, боец! Мне необходимы ресурсы для работы.
        speaker: Гаррик Кузнец
      - remark: Одуванчик - простое растение, но оно мне пригодится для специальной
          настойки, которая укрепляет металл.
        speaker: Гаррик Кузнец
      - remark: Я знаю, что в Одуванчиковой Поляне эти цветы растут в изобилии.
        speaker: Гаррик Кузнец
      - remark: Принеси мне три одуванчика, и я щедро вознагражу твою помощь.
        speaker: Гаррик Кузнец
      - remark: Это не сложное задание для такого смельчака как ты. Согласен ли ты?
        speaker: Гаррик Кузнец
      resource: Одуванчик
  reward:
    item_name: Каменный меч
