quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь в Деревне Речных Лугов выбрана как получатель,
        так как она отличается от Гаррика (требование квеста) и находится в логичном
        месте. Она принимает Одуванчики и может дать награду - Деревянную лопату.
      dialogs: Лира Лекарь благодарит игрока и подтверждает, что квест выполнен успешно.
        Её диалоги теплые и воодушевляющие, признающие героизм игрока.
    enemy_to_face:
      amount: 1 враг - подходящий вызов для новичка с базовым вооружением, не слишком
        сложный, но требующий внимания.
      dialogs: Диалоги врага драматичны и информативны, предупреждают о конфликте.
        Они создают атмосферу встречи с опасностью.
      enemy: Пещерная крыса (ранг 1, 20 HP, урон 2 за ход) идеально подходит для игрока
        уровня 1 с деревянным мечом (2 урона). Это первый враг в справочнике, подходящий
        по сложности.
    resource_to_deliver:
      amount: Количество 2 выбрано как оптимальное для первого квеста - достаточно
        для целевого испытания, но не перегружающее новичка.
      character: Гаррик Кузнец выбран потому что он находится в Королевской столице
        (логичное место для начала квеста новичка) и принимает Одуванчики ранга 1.
      dialogs: Диалоги составлены таким образом, чтобы выразить срочность задания
        и объяснить назначение ресурса. Гаррик дает подробные инструкции, включая
        направление (Лира Лекарь в Деревне Речных Лугов) и количество (2 одуванчика).
      resource: 'Одуванчик ранга 1 - идеальный выбор для игрока уровня 1 с деревянной
        лопатой (min_instrument_rank: 1). Этот ресурс доступен на Одуванчиковой Поляне.'
  objective_description: Гаррик Кузнец просит тебя добыть два одуванчика на Одуванчиковой
    Поляне и доставить их Лире Лекарю в Деревню Речных Лугов. Используй свою деревянную
    лопату для сбора травы.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: О, добро пожаловать в мою лечебницу! Я слышала о тебе от Гаррика.
        speaker: Лира Лекарь
      - remark: Это одуванчики? Благодарю тебя! Они мне необходимы для приготовления
          целебного напитка.
        speaker: Лира Лекарь
      - remark: Твоя помощь бесценна. Гаррик правильно выбрал помощника - ты настоящий
          боец!
        speaker: Лира Лекарь
      - remark: За твою отвагу и усердие я дарую тебе Деревянную лопату. Она пригодится
          в твоих странствиях.
        speaker: Лира Лекарь
      - remark: Надеюсь, наши пути ещё пересекутся. Удачи тебе, герой!
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Чик-чик! Кто осмелился на мои земли?!
        speaker: Пещерная крыса
      - remark: Хищник по имени Пещерная крыса преграждает тебе путь!
        speaker: Пещерная крыса
      - remark: Готовься к сражению, путник!
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 2
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую тебя, странник! Мне срочно нужен Одуванчик для приготовления
          специального зелья.
        speaker: Гаррик Кузнец
      - remark: Слышал я, что на Одуванчиковой Поляне полно этой травы. Сможешь ли
          ты добыть её для меня?
        speaker: Гаррик Кузнец
      - remark: Мне нужно ровно два одуванчика - ни больше, ни меньше. Остальное может
          пойти другим умельцам.
        speaker: Гаррик Кузнец
      - remark: Это срочное дело - когда вернёшься с одуванчиками, поспеши доставить
          их Лире Лекарю в Деревню Речных Лугов.
        speaker: Гаррик Кузнец
      - remark: О, и учти - путь туда не безопасен. Будь осторожен.
        speaker: Гаррик Кузнец
      - remark: Помни, мне нужны именно одуванчики ранга первого. Возьми с собой любой
          инструмент - даже деревянные предметы подойдут.
        speaker: Гаррик Кузнец
      resource: Одуванчик
  reward:
    item_name: Деревянная лопата
