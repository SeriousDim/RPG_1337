quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь выбрана как получатель, так как согласно данным
        мира, она принимает Железо и находится в Деревне Речных Лугов.
      dialogs: Лира Лекарь завершает квест, подтверждая получение ресурсов и реагируя
        на боевое столкновение игрока, что повышает погружение.
    enemy_to_face:
      amount: Два противника создают умеренную угрозу для игрока 1 уровня со 100 HP,
        учитывая их урон.
      dialogs: Диалог подчеркивает уязвимость игрока (отсутствие брони), на что указывают
        текущие характеристики игрока.
      enemy: Гоблин-вор выбран как противник 1 ранга, соответствующий уровню игрока
        и способный атаковать ради блестящей руды.
    resource_to_deliver:
      amount: Количество 5 является стандартным для начальных квестов сбора, не перегружая
        инвентарь.
      character: Выбран Гаррик Кузнец, так как он находится в столице и работает с
        металлами.
      dialogs: Гаррик Кузнец выступает квестодателем, используя профессиональный тон
        мастера. Мотивация обоснована потребностями другого NPC (Лиры), что связывает
        персонажей мира.
      resource: Выбрано Железо, так как оно требует инструмент 1 ранга (у игрока деревянная
        кирка 1 ранга) и принимается целевым персонажем (Лирой).
  objective_description: По просьбе Гаррика Кузнеца добудьте 5 единиц железа в Подорожниковом
    Бору и доставьте их Лире Лекарю в Деревню Речных Лугов.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: Слава небесам, ты пришел! Я уже начала бояться, что мой запрос затерялся
          в столице.
        speaker: Лира Лекарь
      - remark: Гаррик Кузнец передал, что вам срочно нужно железо. Вот 5 кусков,
          как и просили.
        speaker: Игрок
      - remark: Великолепное качество! Из этого получатся отличные ланцеты. Но ты
          выглядишь запыхавшимся.
        speaker: Лира Лекарь
      - remark: Парочка гоблинов решила, что эта руда принадлежит им. Пришлось объяснить
          им обратное.
        speaker: Игрок
      - remark: Ох, эти разбойники совсем обнаглели. Твой деревянный меч явно прошел
          через серьезное испытание.
        speaker: Лира Лекарь
      - remark: Я не могу оставить твою смелость без награды. Вот, возьми этот меч.
          Он послужит тебе лучше старого дерева.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Стой! Что это у тебя так тяжело бряцает в сумке?
        speaker: Гоблин-вор
      - remark: Это всего лишь руда. Уйди с дороги, маленький воришка.
        speaker: Игрок
      - remark: Руда? Металл! Мы любим металл! Он блестит и дорого стоит у перекупщиков!
        speaker: Гоблин-вор
      - remark: Тебе его не получить. Это груз для лекаря.
        speaker: Игрок
      - remark: Парни, окружайте его! У него даже брони нет, один удар — и мешок наш!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 5
      character: Гаррик Кузнец
      dialogs:
      - remark: Эй, путник! Вижу, у тебя есть кирка, хотя и выглядит она довольно
          хрупкой.
        speaker: Гаррик Кузнец
      - remark: Она справляется со своей работой. Вам что-то нужно, мастер Гаррик?
        speaker: Игрок
      - remark: Лира Лекарь из Деревни Речных Лугов прислала гонца. Ей срочно нужно
          качественное железо для новых медицинских инструментов.
        speaker: Гаррик Кузнец
      - remark: Я бы сам отправился в путь, но королевский заказ на подковы не ждет.
          Поможешь?
        speaker: Гаррик Кузнец
      - remark: Где мне найти подходящую руду?
        speaker: Игрок
      - remark: Отправляйся в Подорожниковый Бор. Там в скалах полно железных жил.
          Добудь 5 кусков железа и отнеси Лире.
        speaker: Гаррик Кузнец
      resource: Железо
  reward:
    item_name: Каменный меч
