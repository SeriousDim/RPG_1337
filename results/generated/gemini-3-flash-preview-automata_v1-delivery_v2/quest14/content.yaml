quest:
  explanation:
    destination:
      character_to_deliver: Лорд Дрейк — персонаж, который согласно игровым данным
        принимает Уголь и находится в Высоком Замке, что делает его отличной целью
        для доставки.
      dialogs: Лорд Дрейк принимает работу, подтверждает получение ресурса и выдает
        награду, завершая сюжетную арку доставки.
    enemy_to_face:
      amount: Один противник достаточен для первого боевого столкновения игрока.
      dialogs: Гоблин-вор пытается отобрать ресурс, создавая конфликтную ситуацию,
        типичную для разбойников на торговых путях.
      enemy: Гоблин-вор — противник 1-го ранга, что идеально подходит для игрока 1-го
        уровня с деревянным мечом.
    resource_to_deliver:
      amount: Количество 5 является сбалансированным для стартового квеста на сбор.
      character: Гаррик Кузнец выбран как логичный персонаж для заказа топлива в сеттинге
        фэнтезийного средневековья.
      dialogs: Диалог знакомит игрока с квестодателем Гарриком, обосновывает необходимость
        добычи угля (заказ для замка) и указывает место добычи.
      resource: 'Уголь выбран, так как игрок имеет Деревянную кирку 1-го ранга, что
        соответствует требованию min_instrument_rank: 1 для этого ресурса.'
  objective_description: Добыть 5 единиц угля на Одуванчиковой Поляне с помощью деревянной
    кирки и доставить их Лорду Дрейку в Высокий Замок по просьбе Гаррика Кузнеца.
  parts:
    destination:
      character_to_deliver: Лорд Дрейк
      dialogs:
      - remark: Кто посмел отвлечь меня от государственных дел? Ты выглядишь как обычный
          рабочий.
        speaker: Лорд Дрейк
      - remark: Я прибыл от Гаррика Кузнеца. Доставка топлива для ваших каминов и
          кузниц.
        speaker: Игрок
      - remark: А, Уголь! Наконец-то. В залах стало слишком зябко.
        speaker: Лорд Дрейк
      - remark: Путь был непростым, мне пришлось столкнуться с грабителями на Одуванчиковой
          Поляне.
        speaker: Игрок
      - remark: Ты рискнул жизнью ради поставки? Это достойно уважения.
        speaker: Лорд Дрейк
      - remark: Вот обещанные 5 единиц угля. Все в сохранности.
        speaker: Игрок
      - remark: Прекрасно. Гаррик просил наградить того, кто доберется до замка. Ты
          заслужил защиту.
        speaker: Лорд Дрейк
      - remark: Благодарю, милорд. Это поможет мне в дальнейших странствиях.
        speaker: Игрок
      - remark: Возьми это снаряжение. Пусть оно оберегает тебя лучше, чем твоя старая
          рубаха.
        speaker: Лорд Дрейк
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Хе-хе! Что это у нас тут? Свежедобытый уголек в мешке?
        speaker: Гоблин-вор
      - remark: Прочь с дороги! Этот груз принадлежит кузнецу и Лорду.
        speaker: Игрок
      - remark: Уголь — это тепло, а тепло стоит денег! Отдавай его нам, и, может
          быть, мы тебя не покусаем.
        speaker: Гоблин-вор
      - remark: Я не для того махал киркой, чтобы отдавать добычу первому встречному
          вору.
        speaker: Игрок
      - remark: Смотрите, он грозит нам своей деревяшкой! Взять его, ребята!
        speaker: Гоблин-вор
      - remark: Придется научить тебя манерам. Защищайся!
        speaker: Игрок
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 5
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую, путник! Вижу, у тебя есть деревянная кирка, а мне как
          раз нужен помощник.
        speaker: Гаррик Кузнец
      - remark: Что случилось, Гаррик? Нужна помощь в кузнице?
        speaker: Игрок
      - remark: Заказов из Высокого Замка столько, что уголь в печах тает на глазах.
          Мои запасы истощены.
        speaker: Гаррик Кузнец
      - remark: Где мне найти топливо для твоего горна?
        speaker: Игрок
      - remark: Отправляйся на Одуванчиковую Поляну. Там в породе легко найти качественный
          Уголь.
        speaker: Гаррик Кузнец
      - remark: Сколько ресурса тебе требуется?
        speaker: Игрок
      - remark: Добудь 5 единиц. Но не неси их мне — доставь уголь прямиком Лорду
          Дрейку, он ждет поставку.
        speaker: Гаррик Кузнец
      - remark: Хорошо, я соберу уголь и отвезу его в Высокий Замок.
        speaker: Игрок
      resource: Уголь
  reward:
    item_name: Деревянный нагрудник
