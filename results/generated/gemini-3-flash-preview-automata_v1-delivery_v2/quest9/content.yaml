quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь — персонаж в Деревне Речных Лугов, который
        по данным мира может принимать железо.
      dialogs: Лира Лекарь завершает квестовую арку, подтверждая получение ресурса
        и выдавая награду, соответствующую её списку предметов.
    enemy_to_face:
      amount: 2 противника создают умеренный вызов, не будучи смертельно опасными
        для игрока с полным здоровьем.
      dialogs: Диалоги подчеркивают агрессивный характер гоблинов и их желание поживиться
        добытым ресурсом, создавая конфликт.
      enemy: Гоблин-вор — противник 1 ранга. Идеально подходит для игрока 1 уровня
        с 100 HP и деревянным мечом.
    resource_to_deliver:
      amount: 5 единиц — стандартное количество для начального квеста по сбору.
      character: Гаррик Кузнец — персонаж из Королевской столицы, который согласно
        данным мира принимает железо или знает о нем.
      dialogs: Гаррик Кузнец выступает инициатором квеста, используя свою связь с
        Лирой для обоснования необходимости доставки. Это создает логичную связь между
        локациями.
      resource: Железо — ресурс ранга 2, для добычи которого требуется инструмент
        минимум 1 ранга. У игрока есть Деревянная кирка (ранг 1), что делает задачу
        выполнимой.
  objective_description: Добудьте 5 единиц железа в Подорожниковом Бору и доставьте
    их Лире Лекарю в Деревню Речных Лугов по просьбе Гаррика Кузнеца.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: Ох, наконец-то! Я уже начала терять надежду, что Гаррик найдет посыльного.
        speaker: Лира Лекарь
      - remark: Ты выглядишь уставшим. На тебя напали в лесу? Гоблины совсем распоясались.
        speaker: Лира Лекарь
      - remark: Да, это отличное железо. Теперь я смогу изготовить новые скальпели
          и зажимы для раненых.
        speaker: Лира Лекарь
      - remark: Спасибо тебе большое, путник. Деревня Речных Лугов в долгу перед тобой.
        speaker: Лира Лекарь
      - remark: В качестве благодарности возьми этот меч. С ним твои странствия станут
          безопаснее.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Стой! Что это у тебя так заманчиво звенит в мешке?
        speaker: Гоблин-вор
      - remark: Железо! Блестящее железо! Это теперь наша добыча!
        speaker: Гоблин-вор
      - remark: Отдавай ресурсы по-хорошему, или мы заберем их вместе с твоей головой!
        speaker: Гоблин-вор
      - remark: Парни, окружайте его! Этот человек слишком слаб, чтобы сопротивляться.
        speaker: Гоблин-вор
      - remark: Твой деревянный меч нас не напугает! В атаку!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 5
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую, путник. Вижу, у тебя есть деревянная кирка, но работаешь
          ты ей пока неумело.
        speaker: Гаррик Кузнец
      - remark: Мне пришло письмо из Деревни Речных Лугов от Лиры Лекаря. Ей срочно
          нужно железо для новых медицинских инструментов.
        speaker: Гаррик Кузнец
      - remark: Сам я не могу оставить кузню в Королевской столице, дел невпроворот.
        speaker: Гаррик Кузнец
      - remark: Отправляйся в Подорожниковый Бор, там как раз есть залежи нужной руды.
        speaker: Гаррик Кузнец
      - remark: Добудь 5 единиц железа и отнеси их Лире. Она вознаградит тебя получше,
          чем я.
        speaker: Гаррик Кузнец
      resource: Железо
  reward:
    item_name: Каменный меч
