quest:
  explanation:
    destination:
      character_to_deliver: Травница Марта снова используется как получатель, поскольку
        она принимает Одуванчик и находится в той же локации, что и исходное задание.
        Это обеспечивает цельность цепочки доставки.
      dialogs: Диалоги в финальной части подтверждают сдачу ресурса и получение награды.
        Они не содержат запрещённых сущностей и логично завершают маршрут квеста.
    enemy_to_face:
      amount: Количество 1 достаточно для сюжетной стычки и соответствует требованию
        к одному целостному квесту доставки без чрезмерной сложности.
      dialogs: Диалоги с противником содержат достаточное число реплик и создают короткую
        боевую сцену после добычи ресурса. Выбран Лесной разбойник, так как это противник
        ранга 1, соразмерный игроку с Деревянным мечом и 100 здоровья.
      enemy: Лесной разбойник — корректный враг для встречи на раннем этапе, его параметры
        соответствуют уровню игрока и не выходят за рамки доступного контента.
    resource_to_deliver:
      amount: Количество 3 не нарушает никаких ограничений мира и подходит для первого
        квеста по добыче, оставаясь выполнимым и понятным.
      character: Травница Марта выбрана, потому что она уже существует в мире, находится
        в Деревне Речных Лугов и принимает Одуванчик. Это делает квест строго согласованным
        с лором и географией.
      dialogs: Диалоги построены вокруг задания на сбор ресурса, который уже доступен
        игроку по миру и подходит его текущему инструментальному прогрессу. Указан
        ресурс Одуванчик, так как он соответствует рангу 1 и доступен с имеющимися
        возможностями. Количество 3 выбрано как небольшая, но осмысленная задача для
        персонажа 1 уровня.
      resource: Одуванчик — допустимый ресурс для сбора в текущем мире, не требующий
        высокого ранга инструмента и соответствующий стартовому этапу игрока.
  objective_description: Собери 3 Одуванчика и доставь их Травнице Марте в Деревню
    Речных Лугов.
  parts:
    destination:
      character_to_deliver: Травница Марта
      dialogs:
      - remark: Вернулся вовремя. Отдай мне Одуванчик, и я отмечу твой труд.
        speaker: Травница Марта
      - remark: Из этого сырья выйдет крепкий настой для жителей деревни.
        speaker: Травница Марта
      - remark: За твою помощь я выдам тебе Каменный меч — он пригодится в дальнейших
          дорогах.
        speaker: Травница Марта
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Эй, неси добычу сюда, и может быть, я тебя не трону.
        speaker: Лесной разбойник
      - remark: Такие травники думают, что смогут пройти мимо моих троп без расплаты.
        speaker: Лесной разбойник
      - remark: Докажи, что твой путь к торговле и добыче не закончится здесь.
        speaker: Лесной разбойник
      enemy: Лесной разбойник
    resource_to_deliver:
      amount: 3
      character: Травница Марта
      dialogs:
      - remark: Мне нужен свежий Одуванчик для лечебного настоя. Принеси его, и я
          помогу тебе с новым снаряжением.
        speaker: Травница Марта
      - remark: Одуванчики растут у Одуванчиковой Поляны, так что путь тебе известен.
        speaker: Травница Марта
      - remark: Собери ровно столько, сколько я попрошу, без лишней суеты.
        speaker: Травница Марта
      resource: Одуванчик
  reward:
    item_name: Каменный меч
