quest:
  explanation:
    destination:
      character_to_deliver: Получатель — тот же Гаррик Кузнец, потому что он уже выдавал
        задание и является корректной точкой завершения цепочки. Персонажи в начале
        и конце квеста совпадать могут только если это предусмотрено логикой, но здесь
        они и так являются одним и тем же адресатом доставки, что соответствует формату
        задания.
      dialogs: Диалоги на доставке тоже содержат 5 реплик. Гаррик Кузнец подтверждает
        приём ресурса и выдаёт награду, не вводя новых персонажей.
    enemy_to_face:
      amount: Количество противников 1, чтобы сохранить квест ранним и выполнимым
        без чрезмерного риска.
      dialogs: Диалоги с противником содержат 5 реплик и не выходят за пределы известных
        сущностей. Выбран Гоблин-вор как слабый враг, логичный для раннего этапа и
        для встречи после добычи ресурса.
      enemy: 'Гоблин-вор выбран из списка существующих противников: у него 24 здоровья
        и 3 урона за ход, что делает встречу ощутимой, но посильной для игрока 1 уровня.'
    resource_to_deliver:
      amount: 'Количество 3 выбрано как умеренная начальная цель: достаточно, чтобы
        квест ощущался как поручение, но не перегружал игрока на первом уровне.'
      character: Выбран Гаррик Кузнец, потому что он находится в Королевской столице
        и принимает Уголь. Это совместимо с текущей картой и не требует недоступных
        сущностей.
      dialogs: Диалоги состоят из 5 реплик, как требуется. Задание даёт Гаррик Кузнец
        в Королевской столице; он принимает Уголь, который соответствует доступным
        ресурсам мира и подходит игроку 1 уровня с деревянным мечом.
      resource: Уголь выбран строго из доступных ресурсов мира. Игрок может добывать
        ресурс, так как для него доступен минимальный инструмент ранга 1, а у него
        есть стартовое оружие и подходящий уровень для простого квеста.
  objective_description: Добыть 3 единицы Угля, пережить встречу на пути и доставить
    ресурс Гаррику Кузнецу в Королевской столице.
  parts:
    destination:
      character_to_deliver: Гаррик Кузнец
      dialogs:
      - remark: Отлично, это именно тот Уголь, который мне был нужен.
        speaker: Гаррик Кузнец
      - remark: С такой добычей я закончу работу без задержек.
        speaker: Гаррик Кузнец
      - remark: Прими свою награду, ты заслужил её честной работой.
        speaker: Гаррик Кузнец
      - remark: Возвращайся, если снова захочешь помочь кузне.
        speaker: Гаррик Кузнец
      - remark: Теперь горн будет гореть ровно и жарко.
        speaker: Гаррик Кузнец
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Что это у тебя в мешке? Неужели уголь для кузнеца?
        speaker: Гоблин-вор
      - remark: Отдай добычу, пока я не позвал своих!
        speaker: Гоблин-вор
      - remark: Такие, как ты, долго не ходят по тропам одни.
        speaker: Гоблин-вор
      - remark: Я заберу твою находку, если сможешь меня остановить.
        speaker: Гоблин-вор
      - remark: Покажи, что твой меч чего-то стоит.
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 3
      character: Гаррик Кузнец
      dialogs:
      - remark: Мне нужен крепкий Уголь, чтобы разогреть горн и закончить заказ.
        speaker: Гаррик Кузнец
      - remark: Принеси мне 3 единицы Угля из ближайших земель.
        speaker: Гаррик Кузнец
      - remark: С такой работой тебе легко справиться даже с деревянным мечом.
        speaker: Гаррик Кузнец
      - remark: Уголь здесь принимается только свежедобытый, не из чужих запасов.
        speaker: Гаррик Кузнец
      - remark: Вернёшься ко мне с добычей, и я приму её без лишних разговоров.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Каменный меч
