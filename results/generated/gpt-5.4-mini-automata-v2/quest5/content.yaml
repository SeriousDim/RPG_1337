quest:
  explanation:
    destination:
      character_to_deliver: Гаррик Кузнец указан как получатель, потому что он отличается
        от отправителя только внутри логики квеста невозможностью сам себе сдавать
        предмет; при этом оба имени должны быть разными, что соблюдено.
      dialogs: Финальные реплики также содержат 5 вхождений и принадлежат Гаррику
        Кузнецу, который принимает доставку без нарушения локационной логики.
    enemy_to_face:
      amount: Количество 1 делает стычку вероятной и не чрезмерно опасной для персонажа
        первого уровня.
      dialogs: Встреча оформлена с одним противником, и диалоги содержат 5 реплик,
        как требуется. Выбран Лесной разбойник как логичный ранний враг для маршрута
        по миру.
      enemy: Лесной разбойник выбран, потому что это противник ранга 1, которого игрок
        способен победить с текущими здоровьем и оружием.
    resource_to_deliver:
      amount: 'Количество 4 подходит для квеста ранга новичка: достаточно, чтобы задание
        ощущалось как сбор, но не перегружало игрока.'
      character: Гаррик Кузнец выбран, потому что он уже существует в мире, находится
        в Королевской столице и принимает Одуванчик.
      dialogs: Диалоги даны от Гаррика Кузнеца, который присутствует в Королевской
        столице и принимает Одуванчик. Количество 4 выбрано как посильное для игрока
        1 уровня с Деревянным мечом и соответствует доступному ресурсу ранга 1.
      resource: Одуванчик выбран, так как это ресурс ранга 1, доступный для игрока
        с начальным инструментом и имеющийся в мире.
  objective_description: Добыть 4 Одуванчика и доставить их Гаррику Кузнецу в Королевскую
    столицу, преодолев встречу на пути.
  parts:
    destination:
      character_to_deliver: Гаррик Кузнец
      dialogs:
      - remark: Отлично, Одуванчик именно в таком количестве и нужен.
        speaker: Гаррик Кузнец
      - remark: Ты справился быстрее, чем я ожидал от новичка.
        speaker: Гаррик Кузнец
      - remark: Сырье цело, значит, работа пойдет без задержек.
        speaker: Гаррик Кузнец
      - remark: Держи награду — она поможет тебе в следующих вылазках.
        speaker: Гаррик Кузнец
      - remark: 'Запомни: точность и аккуратность ценятся не меньше силы.'
        speaker: Гаррик Кузнец
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Добыча для кузнеца? Сначала отдай ее мне.
        speaker: Лесной разбойник
      - remark: Мелкий сборщик, а идет так уверенно. Посмотрим, как ты держишь оружие.
        speaker: Гоблин-вор
      - remark: Оставь траву и проходи дальше, целее будешь.
        speaker: Лесной разбойник
      - remark: Мы уже учли тебя в этой тропе. Теперь плати за проход.
        speaker: Гоблин-вор
      - remark: Не бойся, это лишь небольшая стычка на пути к кузнецу.
        speaker: Лесной разбойник
      enemy: Лесной разбойник
    resource_to_deliver:
      amount: 4
      character: Гаррик Кузнец
      dialogs:
      - remark: У меня кончился Одуванчик для срочного ремесленного дела. Принеси
          его быстро, пока заказ не сорвался.
        speaker: Гаррик Кузнец
      - remark: 'Ты как раз по силам для такого дела: сбор простой, но нужен аккуратный
          глаз.'
        speaker: Гаррик Кузнец
      - remark: Одуванчик растет недалеко, а твоего Деревянного меча хватит, если
          дорога станет небезопасной.
        speaker: Гаррик Кузнец
      - remark: Принеси ровно столько, сколько я сказал, без лишней задержки.
        speaker: Гаррик Кузнец
      - remark: После этого я передам тебе заслуженную награду.
        speaker: Гаррик Кузнец
      resource: Одуванчик
  reward:
    item_name: Деревянная лопата
