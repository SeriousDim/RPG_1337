quest:
  explanation:
    destination:
      character_to_deliver: Гаррик Кузнец
      dialogs: Доставка возвращает игрока к тому же персонажу-заказчику, но в этой
        части квеста он выступает как получатель ресурса. Диалоги содержат подтверждение
        сдачи задания и выдачу награды, а число реплик снова соблюдает ограничение.
    enemy_to_face:
      amount: '1'
      dialogs: После добычи ресурса игрок встречает Гоблина-ворa. Диалоги подчёркивают
        попытку отнять добычу и создают короткое боевое препятствие, при этом число
        реплик соответствует требованию 5.
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: '3'
      character: Гаррик Кузнец
      dialogs: Диалоги заданы с Гарриком Кузнецом, который находится в Королевской
        столице и принимает Уголь. Количество выбрано 3, чтобы квест был посилен игроку
        1 уровня с деревянным мечом и соответствовал доступному ресурсу ранга 1.
      resource: Уголь
  objective_description: Добудь 3 куска Угля и доставь их Гаррику Кузнецу в Королевской
    столице.
  parts:
    destination:
      character_to_deliver: Гаррик Кузнец
      dialogs:
      - remark: Ты вернулся вовремя.
        speaker: Гаррик Кузнец
      - remark: Покажи уголь, я сразу увижу, годится ли он для работы.
        speaker: Гаррик Кузнец
      - remark: Да, это тот самый материал, что мне был нужен.
        speaker: Гаррик Кузнец
      - remark: Ты заслужил награду за старание и за то, что не бросил дело на полпути.
        speaker: Гаррик Кузнец
      - remark: Забирай Каменный меч — он послужит тебе куда лучше.
        speaker: Гаррик Кузнец
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Ха! Слишком много руды носишь для такого слабого бойца!
        speaker: Гоблин-вор
      - remark: Отдай уголь, и, может быть, я тебя не трону... хотя, нет, всё равно
          трону.
        speaker: Гоблин-вор
      - remark: Не вздумай бежать через поляну!
        speaker: Гоблин-вор
      - remark: Твой деревянный меч мне даже нравится — сейчас проверим, на что он
          годится.
        speaker: Гоблин-вор
      - remark: Сначала я заберу добычу, а потом займусь тобой.
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 3
      character: Гаррик Кузнец
      dialogs:
      - remark: Слушай внимательно, мне нужен простой, но крепкий материал.
        speaker: Гаррик Кузнец
      - remark: Принеси мне Уголь из Одуванчиковой Поляны, он подходит для моей плавильни.
        speaker: Гаррик Кузнец
      - remark: Для новичка это будет хорошая проверка и не потребует сложного инструмента.
        speaker: Гаррик Кузнец
      - remark: Если справишься, я отплачу тебе оружием получше твоего нынешнего.
        speaker: Гаррик Кузнец
      - remark: Нужно ровно 3 куска Угля, не меньше.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Каменный меч
