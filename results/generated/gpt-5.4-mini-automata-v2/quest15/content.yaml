quest:
  explanation:
    destination:
      character_to_deliver: Гаррик Кузнец
      dialogs: 'В качестве получателя выбран Гаррик Кузнец в Королевской столице:
        он принимает Подорожник и может логично выдать награду. Персонаж-отправитель
        и персонаж-получатель различаются, как требуется, а маршрут остаётся в пределах
        существующих локаций.'
    enemy_to_face:
      amount: '1'
      dialogs: После добычи ресурса игрок встречает Гоблина-ворa, так как это противник
        подходящего ранга для первого уровня и он органично вписывается в дорожную
        засаду между поселениями. Диалоги содержат предупреждение и угрозу, но не
        вводят никаких отсутствующих в мире сущностей.
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: '3'
      character: Лира Лекарь
      dialogs: Выбран персонаж Лира Лекарь, потому что она в Деревне Речных Лугов
        принимает Подорожник и её квесты логично связаны с лечебными ресурсами. Количество
        ресурса задано как 3, чтобы оно было выполнимо для игрока с инструментом ранга
        1 и соответствовало ранней стадии прогрессии.
      resource: Подорожник
  objective_description: Собери 3 Подорожника, отбейся от нападающего на дороге, а
    затем доставь ресурс Гаррику Кузнецу в Королевскую столицу.
  parts:
    destination:
      character_to_deliver: Гаррик Кузнец
      dialogs:
      - remark: Отлично, Подорожник у тебя. Теперь отнеси его в Королевскую столицу
          к Гаррику Кузнецу.
        speaker: Лира Лекарь
      - remark: Он ждёт этот ресурс для своих запасов и хорошо вознаградит за доставку.
        speaker: Лира Лекарь
      - remark: Передай ему всё без остатка, ровно 3 штуки.
        speaker: Лира Лекарь
      - remark: После этого твоя работа будет завершена.
        speaker: Лира Лекарь
      - remark: Путь не близкий, но ты уже доказал, что справишься.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Хе-хе, травка уже почти у тебя? Отдай её мне, и, может быть, уйдёшь
          целым.
        speaker: Гоблин-вор
      - remark: Я слежу за каждым, кто таскает добычу по этим дорогам.
        speaker: Гоблин-вор
      - remark: Трое листьев — хорошая добыча. А вот и моя добыча.
        speaker: Гоблин-вор
      - remark: Посмотрим, хватит ли у тебя сил отбиться.
        speaker: Гоблин-вор
      - remark: Не рассчитывай, что я дам тебе пройти дальше без драки.
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 3
      character: Лира Лекарь
      dialogs:
      - remark: Мне нужно немного Подорожника для лечебных припарок. Ты как раз подходишь
          для такой работы.
        speaker: Лира Лекарь
      - remark: Собери ровно 3 штуки и возвращайся ко мне.
        speaker: Лира Лекарь
      - remark: Подорожник растёт в Подорожниковом Бору, недалеко от Деревни Речных
          Лугов.
        speaker: Лира Лекарь
      - remark: Без него мне не приготовить свежие повязки для раненых.
        speaker: Лира Лекарь
      - remark: Принеси добычу сначала ко мне, а потом я направлю тебя дальше.
        speaker: Лира Лекарь
      resource: Подорожник
  reward:
    item_name: Каменный меч
