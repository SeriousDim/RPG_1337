quest:
  explanation:
    destination:
      character_to_deliver: Гаррик Кузнец используется как получатель, потому что
        он отличается от выдающего задание персонажа и связан с наградой из списка
        допустимых предметов. Каменный меч не находится у игрока ни в инвентаре, ни
        в броне, поэтому награда разрешена.
      dialogs: Финальный диалог также содержит 5 реплик. Все они принадлежат тому
        же персонажу, который выдаёт награду. Гаррик Кузнец логично принимает доставленный
        Уголь и вручает Каменный меч.
    enemy_to_face:
      amount: Количество 1 сделано минимальным, чтобы встреча была угрозой, но не
        превращала первый квест в непроходимое испытание.
      dialogs: Встреча оформлена через 5 реплик, что укладывается в требование 5–10
        вхождений. Использован только существующий противник — Гоблин-вор, один из
        самых слабых врагов мира, что соответствует уровню игрока 1 и его деревянному
        мечу.
      enemy: Гоблин-вор выбран потому, что это низкоранговый противник с 24 здоровья
        и уроном 3 за ход, подходящий для раннего игрового этапа.
    resource_to_deliver:
      amount: Количество 2 не нарушает никаких ограничений, выглядит как стартовая
        цель и подходит для первого квеста без перегруза.
      character: Выбран Гаррик Кузнец, потому что он присутствует в мире, находится
        в Королевской столице и принимает Уголь. Это строго совпадает с логикой мира
        и с текущим ранговым уровнем игрока.
      dialogs: В разделе задано ровно 5 реплик, как требуется. Все реплики принадлежат
        Гаррику Кузнецу из Королевской столицы. Он принимает Уголь, который действительно
        существует в мире и доступен для игрока с инструментом ранга 1. Количество
        выбрано 2, чтобы квест был посилен новичку и соответствовал масштабу первого
        задания.
      resource: Уголь выбран из доступных ресурсов мира, он подходит под требование
        min_instrument_rank 1, что согласуется с наличием у игрока базового инструмента
        ранга 1.
  objective_description: Добудь 2 единицы Угля, пережив встречу на пути, и вернись
    к Гаррику Кузнецу в Королевскую столицу.
  parts:
    destination:
      character_to_deliver: Гаррик Кузнец
      dialogs:
      - remark: Отлично, Уголь в порядке — именно столько и нужно.
        speaker: Гаррик Кузнец
      - remark: С твоей помощью работа сдвинулась с места.
        speaker: Гаррик Кузнец
      - remark: За такую услугу я награжу тебя по-кузнечному щедро.
        speaker: Гаррик Кузнец
      - remark: Держи новый Каменный меч — он пригодится тебе сильнее, чем старый.
        speaker: Гаррик Кузнец
      - remark: Пусть этот клинок станет твоим следующим шагом.
        speaker: Гаррик Кузнец
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: О, добытчик! Дай-ка мне этот мешок с углём.
        speaker: Гоблин-вор
      - remark: Не уйдёшь с моей тропы так просто.
        speaker: Гоблин-вор
      - remark: Я заберу добычу, и кузнец останется ни с чем!
        speaker: Гоблин-вор
      - remark: Проверим, чего стоит твой первый меч.
        speaker: Гоблин-вор
      - remark: За мной ещё никто не проходил без драки.
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 2
      character: Гаррик Кузнец
      dialogs:
      - remark: Мне нужен свежий Уголь — без него я не смогу закончить работу.
        speaker: Гаррик Кузнец
      - remark: Принеси ровно 2 единицы, этого хватит для моего горна.
        speaker: Гаррик Кузнец
      - remark: Добыть его можно лишь там, где есть нужная руда.
        speaker: Гаррик Кузнец
      - remark: Твой деревянный меч не поможет в добыче, но дорога впереди посильна.
        speaker: Гаррик Кузнец
      - remark: Вернись ко мне, когда соберёшь Уголь.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Каменный меч
