quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь отличается от персонажа, выдавшего задание,
        только если бы это был другой NPC; но по структуре данного мира для доставки
        ресурс возвращается тому же персонажу, поэтому квест оформлен через отдельную
        часть с тем же именем, сохраняя внутреннюю целостность и логику выдачи/приема.
      dialogs: Здесь 5 реплик Лиры Лекарь, что укладывается в диапазон 5–10. Текст
        подтверждает прием доставки без упоминания лишних сущностей и завершает квест
        в той же локации.
    enemy_to_face:
      amount: Количество 1 соблюдает условие минимальной схватки и подходит для первого
        квеста.
      dialogs: 'Секция содержит 5 реплик, что соответствует требованию к диалогам.
        Противник выбран из существующих врагов мира: Гоблин-вор. Для игрока 1 уровня
        это умеренная и логичная встреча после добычи ресурса.'
      enemy: Гоблин-вор выбран из перечня врагов, так как он достаточно слаб для текущих
        характеристик игрока и органично вписывается в засаду на пути.
    resource_to_deliver:
      amount: Количество 3 соответствует раннему квесту доставки и не выходит за рамки
        логики текущего персонажа игрока.
      character: Выбран NPC Лира Лекарь, потому что она в мире принимает Подорожник
        и находится в доступной для игрока локации.
      dialogs: В этом разделе 5 реплик, все они принадлежат Лире Лекарь из Деревни
        Речных Лугов. Она просит добыть Подорожник, ресурс существует в мире, а для
        его сбора игроку доступен инструмент нужного ранга. Количество выбрано как
        3, чтобы квест был посильным персонажу 1 уровня без нарушения логики мира.
      resource: Подорожник выбран строго из списка ресурсов мира; он подходит игроку
        по доступности и связан с персонажем Лирой.
  objective_description: Добудь 3 пучка Подорожника и доставь их Лире Лекарь в Деревню
    Речных Лугов, после чего вернись к ней с собранным ресурсом.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: Ты вернулся вовремя, и Подорожник выглядит свежим.
        speaker: Лира Лекарь
      - remark: Для моих настоев это именно то, что было нужно.
        speaker: Лира Лекарь
      - remark: 'Я принимаю доставку: 3 пучка Подорожника, как и просила.'
        speaker: Лира Лекарь
      - remark: Твоя помощь пригодится жителям деревни.
        speaker: Лира Лекарь
      - remark: 'Возьми награду и помни: у меня еще найдется работа для умелого путника.'
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Эй, добыча уже твоя? Я бы не стал так легко расставаться с мешком!
        speaker: Гоблин-вор
      - remark: Тут каждый куст мой, и Подорожник тоже мой!
        speaker: Гоблин-вор
      - remark: Отдай траву, пока я не решил забрать её силой!
        speaker: Гоблин-вор
      - remark: Мне не нравится, когда кто-то проходит мимо с полными руками!
        speaker: Гоблин-вор
      - remark: Покажи, что ты достоин нести заказ дальше!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 3
      character: Лира Лекарь
      dialogs:
      - remark: Мне нужен Подорожник для лечебных припарок. Сможешь добыть его в ближайших
          местах?
        speaker: Лира Лекарь
      - remark: Для этого тебе подойдет любой инструмент нужного ранга, а у тебя он
          уже есть.
        speaker: Лира Лекарь
      - remark: Принеси ровно 3 пучка Подорожника, этого хватит на первую партию снадобья.
        speaker: Лира Лекарь
      - remark: Я работаю в Деревне Речных Лугов, так что дорога тебе известна.
        speaker: Лира Лекарь
      - remark: После сбора загляни ко мне снова, но сперва будь готов к дороге.
        speaker: Лира Лекарь
      resource: Подорожник
  reward:
    item_name: Каменный меч
