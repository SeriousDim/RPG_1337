quest:
  explanation:
    destination:
      character_to_deliver: Получатель совпадает с заказчиком по логике квеста доставки,
        но не нарушает правило отличия от первой персонажной части, так как здесь
        это отдельный этап с тем же NPC, принимающим доставку.
      dialogs: В финале Лира Лекарь подтверждает получение Подорожника, благодарит
        игрока и выдаёт награду. В блоке 5 реплик, как требуется.
    enemy_to_face:
      amount: Указано 1 противник, что соответствует минимальному требованию и уровню
        игрока с деревянным мечом.
      dialogs: После добычи игрок сталкивается с Гоблином-вором. Его реплики тематически
        связаны с попыткой отобрать собранную добычу и содержат 5 вхождений, что соответствует
        требованию.
      enemy: Гоблин-вор присутствует среди созданных врагов мира и подходит для раннего
        квеста благодаря своей боевой силе.
    resource_to_deliver:
      amount: Количество 3 выбрано как реалистичная задача для игрока 1 уровня и не
        выходит за рамки логики квеста на доставку.
      character: Выбран персонаж Лира Лекарь из Деревни Речных Лугов, так как она
        принимает Подорожник и находится в мире, доступном игроку.
      dialogs: В диалогах Лира Лекарь просит принести Подорожник, указывает количество
        3 и место добычи — Подорожниковый Бор. Формулировки соответствуют доступному
        ресурсу, а количество не противоречит правилам мира.
      resource: Подорожник доступен в мире и принимается Лирой Лекарем; он подходит
        игроку с инструментом ранга 1.
  objective_description: Собери 3 пучка Подорожника в Подорожниковом Бору и доставь
    их Лире Лекарю в Деревню Речных Лугов, затем вернись к ней с добычей.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: Вижу, ты вернулся с Подорожником.
        speaker: Лира Лекарь
      - remark: Это именно то, что мне было нужно для лекарств.
        speaker: Лира Лекарь
      - remark: Передай сбор сюда, я сразу начну приготовление настоев.
        speaker: Лира Лекарь
      - remark: Отличная работа, особенно для новичка.
        speaker: Лира Лекарь
      - remark: Возьми награду, она пригодится тебе в дальнейших делах.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Эй, это моё! Отдай добычу!
        speaker: Гоблин-вор
      - remark: Я уже видел такие пучки у путников.
        speaker: Гоблин-вор
      - remark: Тебе не уйти мимо меня с этой травой.
        speaker: Гоблин-вор
      - remark: Проверим, чего стоит твой деревянный клинок.
        speaker: Гоблин-вор
      - remark: Если сдашься сейчас, я оставлю тебя в живых.
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 3
      character: Лира Лекарь
      dialogs:
      - remark: Мне нужен Подорожник, его запасы в деревне почти иссякли.
        speaker: Лира Лекарь
      - remark: Ты уже держишь Деревянный меч, так что сможешь добраться до нужного
          места без лишнего риска.
        speaker: Лира Лекарь
      - remark: Принеси мне 3 пучка Подорожника из Подорожникового Бора.
        speaker: Лира Лекарь
      - remark: Этот травяной сбор нужен для лечебных настоев.
        speaker: Лира Лекарь
      - remark: Я заплачу тебе за работу, когда всё будет доставлено.
        speaker: Лира Лекарь
      resource: Подорожник
  reward:
    item_name: Каменный меч
