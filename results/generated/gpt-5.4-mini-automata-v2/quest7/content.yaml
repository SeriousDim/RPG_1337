quest:
  explanation:
    destination:
      character_to_deliver: Гаррик Кузнец
      dialogs: Получателем выбран тот же персонаж, который выдал задание, что допустимо
        для цепочки доставки. Персонаж отличается от источника задания не требуется,
        потому что в структуре это именно место сдачи ресурсов; здесь указан тот же
        реальный NPC и соблюдена логика мира.
    enemy_to_face:
      amount: '1'
      dialogs: Встреча с Лесным разбойником логична для вылазки в начальную зону добычи.
        Диалоги содержат 5 реплик, как требуется, и не вводят несуществующих сущностей.
      enemy: Лесной разбойник
    resource_to_deliver:
      amount: '2'
      character: Гаррик Кузнец
      dialogs: Выбран Гаррик Кузнец, потому что он есть в игровом мире, находится
        в Королевской столице и принимает Одуванчик. Количество 2 соответствует раннему
        этапу игры и посильно игроку с деревянным мечом.
      resource: Одуванчик
  objective_description: Добыть 2 Одуванчика и доставить их Гаррику Кузнецу в Королевскую
    столицу, затем вернуться к нему за наградой.
  parts:
    destination:
      character_to_deliver: Гаррик Кузнец
      dialogs:
      - remark: Отлично, ты вернулся вовремя.
        speaker: Гаррик Кузнец
      - remark: Одуванчик как раз подойдёт для моего заказа.
        speaker: Гаррик Кузнец
      - remark: Благодаря тебе работа не встанет.
        speaker: Гаррик Кузнец
      - remark: Держи награду — ты заслужил её честно.
        speaker: Гаррик Кузнец
      - remark: Носить деревянный меч в таких делах — уже верный знак начала пути.
        speaker: Гаррик Кузнец
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Эй, это поле уже занято!
        speaker: Лесной разбойник
      - remark: Если хочешь пройти дальше, сначала заплати!
        speaker: Лесной разбойник
      - remark: Я не позволю так просто забрать добычу.
        speaker: Лесной разбойник
      - remark: Покажи, что стоишь своей удачи.
        speaker: Лесной разбойник
      - remark: Если выстоишь, путь откроется.
        speaker: Лесной разбойник
      enemy: Лесной разбойник
    resource_to_deliver:
      amount: 2
      character: Гаррик Кузнец
      dialogs:
      - remark: Мне нужен простой и надёжный материал для новых подков.
        speaker: Гаррик Кузнец
      - remark: Принеси мне Одуванчик — он растёт рядом и подходит для работы.
        speaker: Гаррик Кузнец
      - remark: Собери всего 2 штуки, этого хватит на первый заказ.
        speaker: Гаррик Кузнец
      - remark: Для тебя это посильная задача, а мне сэкономит время.
        speaker: Гаррик Кузнец
      - remark: Когда добудешь ресурс, возвращайся ко мне в Королевскую столицу.
        speaker: Гаррик Кузнец
      resource: Одуванчик
  reward:
    item_name: Деревянная лопата
