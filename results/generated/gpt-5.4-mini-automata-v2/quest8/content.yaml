quest:
  explanation:
    destination:
      character_to_deliver: Мастер Ювелир — отдельный персонаж из того же мира, отличающийся
        от выдающего задание.
      dialogs: 'В разделе ровно 5 реплик, что соответствует условию. Для получения
        ресурса выбран Мастер Ювелир в Королевской столице: это существующий персонаж,
        который принимает Уголь. Персонаж отличается от Гаррика Кузнеца, как и требуется.
        Награда — Каменный меч — не совпадает с предметами в инвентаре игрока и не
        дублирует броню.'
    enemy_to_face:
      amount: 1 — единственная встреча, чтобы сохранить баланс для игрока 1 уровня.
      dialogs: В разделе ровно 5 реплик, как требуется. Выбран Гоблин-вор, потому
        что это один из самых слабых противников мира и он соответствует рангу первого
        квеста. Его параметры не превышают возможности игрока с 100 здоровья и оружием
        на 2 урона. Количество 1 сохранено, чтобы бой не был чрезмерно сложным для
        новичка.
      enemy: Гоблин-вор — противник из списка существующих врагов, подходящий по сложности.
    resource_to_deliver:
      amount: 3 — достаточный, но не чрезмерный объём для квеста первого уровня.
      character: Гаррик Кузнец — существующий персонаж из Королевской столицы, принимающий
        Уголь.
      dialogs: В разделе ровно 5 реплик, что соответствует требованию. Выбран Гаррик
        Кузнец из Королевской столицы, потому что он принимает Уголь и находится в
        стартовой зоне, доступной игроку 1 уровня. Ресурс Уголь разрешён для сбора
        инструментом ранга 1, а у игрока уже есть Деревянный меч, что не влияет на
        добычу. Количество 3 выбрано как умеренное и безопасное для первого квеста
        доставки.
      resource: Уголь — существующий ресурс ранга 1, доступный игроку с текущими характеристиками.
  objective_description: Доставь 3 единицы Угля Гаррику Кузнецу, пережив встречу по
    пути, а затем отнеси добытый ресурс Мастеру Ювелиру в Королевской столице.
  parts:
    destination:
      character_to_deliver: Мастер Ювелир
      dialogs:
      - remark: Уголь — вещь простая, но без него не разогреть металл как следует.
        speaker: Мастер Ювелир
      - remark: Я приму твою доставку и удостоверюсь, что всё в порядке.
        speaker: Мастер Ювелир
      - remark: Ты уже доказал, что умеешь выполнять поручения.
        speaker: Мастер Ювелир
      - remark: Передай мне принесённый Уголь, и дело будет закрыто.
        speaker: Мастер Ювелир
      - remark: После этого я подготовлю для тебя достойную награду.
        speaker: Мастер Ювелир
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Ха! Не уйдёшь с добычей так легко!
        speaker: Гоблин-вор
      - remark: Я заберу всё, что ты нашёл!
        speaker: Гоблин-вор
      - remark: Сначала расправься со мной, если сможешь.
        speaker: Гоблин-вор
      - remark: Твои руки заняты, а я быстрый.
        speaker: Гоблин-вор
      - remark: Проверим, достоин ли ты вернуться к кузнецу.
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 3
      character: Гаррик Кузнец
      dialogs:
      - remark: Мне нужен самый простой и доступный ресурс, чтобы я мог укрепить крепёж
          для городской работы.
        speaker: Гаррик Кузнец
      - remark: Принеси мне Уголь из ближайших земель, он подходит для твоего текущего
          уровня.
        speaker: Гаррик Кузнец
      - remark: Если принесёшь немного, я смогу быстро проверить качество партии.
        speaker: Гаррик Кузнец
      - remark: 'Путь недалёкий, но будь внимателен: работа важна для всей столицы.'
        speaker: Гаррик Кузнец
      - remark: Собери 3 единицы Угля и возвращайся ко мне без промедления.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Каменный меч
