quest:
  explanation:
    destination:
      character_to_deliver: Мастер Ювелир
      dialogs: Финальная передача происходит Мастеру Ювелиру в Королевской столице.
        Он уже присутствует в мире как действующий персонаж, а персонаж-получатель
        отличается от выдающего задание Гаррика Кузнеца, что соблюдает правило раздельных
        NPC. Его список принимаемых ресурсов включает Уголь, поэтому доставка полностью
        согласована с миром.
    enemy_to_face:
      amount: '1'
      dialogs: После добычи ресурса игрок встречает Гоблина-вора. Это противник ранга
        1, что строго соответствует слабому начальному этапу игры. Диалоги содержат
        ровно 5 реплик, как требуется, и создают логичное препятствие на пути к завершению
        доставки.
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: '3'
      character: Гаррик Кузнец
      dialogs: В первой части квеста задание выдаёт Гаррик Кузнец из Королевской столицы.
        Игроку доступен Уголь, потому что у него есть инструмент ранга 1 — Деревянный
        меч — и ресурс Уголь требует min_instrument_rank 1. Количество 3 выбрано умеренным
        и посильным для персонажа 1 уровня.
      resource: Уголь
  objective_description: Добудь 3 Угля, пережив столкновение на пути, и передай добычу
    Мастеру Ювелиру в Королевской столице.
  parts:
    destination:
      character_to_deliver: Мастер Ювелир
      dialogs:
      - remark: Теперь неси Уголь в Королевскую столицу, к Мастеру Ювелиру.
        speaker: Гаррик Кузнец
      - remark: Скажи ему, что это мой заказ и материал уже готов.
        speaker: Гаррик Кузнец
      - remark: Он примет добычу без лишних вопросов, если ты придёшь от моего имени.
        speaker: Гаррик Кузнец
      - remark: Отнеси всё аккуратно, мне важен каждый кусок.
        speaker: Гаррик Кузнец
      - remark: Как только передашь ресурс, дело будет считаться завершённым.
        speaker: Гаррик Кузнец
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Эй, это наш путь! Добычу никто не уносит без платы!
        speaker: Гоблин-вор
      - remark: Показывай мешок, иначе я заберу его силой!
        speaker: Гоблин-вор
      - remark: Сначала добыча, потом драка — но для тебя всё закончится здесь!
        speaker: Гоблин-вор
      - remark: Не рассчитывай пройти мимо, я чую свежий Уголь!
        speaker: Гоблин-вор
      - remark: Докажи, что достоин нести заказ дальше!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 3
      character: Гаррик Кузнец
      dialogs:
      - remark: Мне нужен редкий и добротный материал для новой работы. Сможешь принести
          Уголь?
        speaker: Гаррик Кузнец
      - remark: 'Для твоего уровня это подходящее дело: дорога недалека, а задача
          понятная.'
        speaker: Гаррик Кузнец
      - remark: Принеси ровно 3 Угля, и я подготовлю для тебя награду.
        speaker: Гаррик Кузнец
      - remark: Собирай ресурс в ближайших местах, где Уголь добывается без сложных
          инструментов.
        speaker: Гаррик Кузнец
      - remark: Когда вернёшься, сначала покажи мне добычу, а потом я укажу, куда
          нести заказ.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Каменный меч
