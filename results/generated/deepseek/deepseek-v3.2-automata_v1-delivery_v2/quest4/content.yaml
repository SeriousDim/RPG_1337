quest:
  explanation:
    destination:
      character_to_deliver: Выбрана Лира Лекарь. Она отличается от начального NPC
        (Гаррика), что соответствует требованиям. В ее списке `items_can_be_accepted_for_delivery_or_collection`
        тоже есть 'Уголь', что делает ее логичным получателем. Она также может дать
        награду, которой нет у игрока.
      dialogs: Диалог подтверждает успешную доставку, объясняет, почему этот ресурс
        был нужен именно этому персонажу (Лира использует уголь в лечебных целях).
        Это связывает двух NPC (брата и сестру) и добавляет глубины сеттингу. Также
        тут происходит награждение.
    enemy_to_face:
      amount: Установлено количество 1. Один враг ранга 1 - подходящий вызов для первого
        квеста, который не убьет игрока мгновенно, но даст почувствовать боевую систему.
      dialogs: Диалог вводит противника, мотивируя его нападение желанием отобрать
        добычу (ресурс). Это создает естественное препятствие на обратном пути из
        зоны добычи. Пресловутый 'теплый' уголь может привлекать враждебных существ.
      enemy: Выбран противник 'Лесной разбойник'. Это враг ранга 1 (урон 4, здоровье
        28), который представляет адекватную угрозу для игрока 1 уровня с деревянным
        мечом (урон 2). Игрок сможет победить его, сделав 14 ударов, но и сам получит
        повреждения, что создает вызов, соответствующий его уровню.
    resource_to_deliver:
      amount: Установлено количество 5. Это небольшое, но значимое число для первого
        задания. Оно достаточно для целей квеста, но не чрезмерно для игрока 1 уровня
        с базовым инструментом.
      character: Выбран Гаррик Кузнец, так как он является персонажем из списка, у
        которого в списке `items_can_be_accepted_for_delivery_or_collection` есть
        ресурс 'Уголь' ранга 1, что соответствует инструменту игрока (деревянная кирка,
        ранг 1). Это делает задание выполнимым и логичным.
      dialogs: Диалог построен на запросе ресурса (уголь) от NPC Гаррика Кузнеца,
        который присутствует в списке. Объяснена причина нужды (работа кузнеца), дано
        место добычи (Одуванчиковая Поляна), которое существует в мире, указан инструмент
        (деревянная кирка), который есть у игрока. Также в диалоге представлена конечная
        цель доставки - другой NPC, Лира Лекарь.
      resource: Выбран ресурс 'Уголь'. Это руда ранга 1, для добычи которой требуется
        инструмент ранга 1 (деревянная кирка). У игрока в инвентаре есть деревянная
        кирка, что делает задание выполнимым. Ресурс доступен в локации 'Одуванчиковая
        Поляна'.
  objective_description: Добудь 5 единиц угля на Одуванчиковой Поляне и доставь его
    Лире Лекарю в Деревню Речных Лугов.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: Здравствуй, незнакомец. Что привело тебя в нашу деревню? Ты выглядишь...
          слегка потрепанным.
        speaker: Лира Лекарь
      - remark: Меня прислал Гаррик. Я принес уголь.
        speaker: Игрок
      - remark: Ах, вот как! Брат прислал тебя? Спасибо, это как раз то, что нужно!
          Уголь я использую для стерилизации инструментов и в рецептах очищающих зелий.
        speaker: Лира Лекарь
      - remark: За последнее время у нас участились случаи лихорадки, все запасы исчерпаны.
          Как раз вовремя ты подоспел.
        speaker: Лира Лекарь
      - remark: Ты оказал большую помощь и нам, и брату. В знак благодарности прими
          от меня это.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Эй, ты! Что это у тебя в мешке? Пахнет чем-то ценным!
        speaker: Лесной разбойник
      - remark: Это всего лишь уголь для кузнеца.
        speaker: Игрок
      - remark: Уголь, говоришь? В наше время и это продать можно! Отдавай добром,
          а то будет худо!
        speaker: Лесной разбойник
      - remark: Я не отдам. Это заказ.
        speaker: Игрок
      - remark: Ну что ж, значит, заберу с трупа! Приятели, го за ним!
        speaker: Лесной разбойник
      enemy: Лесной разбойник
    resource_to_deliver:
      amount: 5
      character: Гаррик Кузнец
      dialogs:
      - remark: Эй, путник! Ты выглядишь крепким. Не мог бы оказать услугу старине
          Гаррику?
        speaker: Гаррик Кузнец
      - remark: Что случилось?
        speaker: Игрок
      - remark: Дело в том, что мои запасы угля на исходе. Без него я не могу разжечь
          горн для простейших поделок.
        speaker: Гаррик Кузнец
      - remark: Обычно я добываю его сам на Одуванчиковой Поляне, неподалеку от столицы.
          Но сейчас у меня полный заказ на подковы для королевской конюшни.
        speaker: Гаррик Кузнец
      - remark: Сходи туда, собери для меня немного угля. Деревянной киркой справишься.
          Думаю, штук пять будет достаточно, чтобы продержаться.
        speaker: Гаррик Кузнец
      - remark: Как соберешь, отнеси его моей сестре, Лире Лекарю, в Деревню Речных
          Лугов. Она использует уголь для приготовления лечебных мазей и зельев.
        speaker: Гаррик Кузнец
      - remark: Она тебя ждет и щедро отблагодарит. Ну что, возьмешься?
        speaker: Гаррик Кузнец
      - remark: Хорошо, я помогу.
        speaker: Игрок
      - remark: Отлично! Будь осторожен на Поляне. Там иногда шляются всякие твари,
          привлеченные теплом угольных жил.
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Деревянная лопата
