quest:
  explanation:
    destination:
      character_to_deliver: Выбрана Лира Лекарь. Она находится в другом городе (Деревня
        Речных Лугов), что логично для квеста на доставку. У неё в списке принимаемых
        ресурсов есть Железо (ранг 2), но нет Угля. Это не противоречит заданию, так
        как она принимает груз не как ресурс для себя, а как посылку от брата. Главное,
        что она — другой персонаж, отличный от отправителя, как того требует формат.
        Она также может дать награду соответствующего уровня.
      dialogs: Диалог завершает цепочку, подтверждает получение груза, даёт небольшой
        нарратив (Лира — сестра Гаррика), мягко спрашивает о приключениях и вручает
        награду. Создаёт ощущение завершённости небольшой истории.
    enemy_to_face:
      amount: Два противника. Один был бы слишком лёгким (игрок убил бы его, получив
        2-3 удара). Два создают тактическую задачу (кого бить первым) и требуют от
        игрока осознания, что бой рискованный, возможно, нужно будет искать способ
        отхилиться после него.
      dialogs: Диалог вводит противника органично — гоблины-воры хотят украсть добытый
        ресурс. Это создаёт конфликт и защиту цели. Диалог отражает характер противников
        (жадные, глуповатые). Вместо неожиданного нападения 'из кустов' это более
        игро-нарративное событие.
      enemy: 'Выбран Гоблин-вор, так как это враг 1-го ранга. У игрока только деревянный
        меч (2 урона за ход). Рассчитаем: у Гоблина-вора 24 HP. Игрок наносит 2 урона
        за ход, ему потребуется 12 ходов, чтобы убить одного. У игрока 100 HP. Два
        гоблина наносят суммарно 6 урона за ход (по 3 каждый). Игрок может убить первого
        гоблина за 12 ходов, получив за это время 12*6=72 урона от обоих. Затем он
        1 на 1 со вторым получит ещё несколько ударов. Итоговый урон будет близок
        к 100, но игрок может выжить. Это сложный, но выполнимый бой, соответствующий
        уровню.'
    objective_description: Описание чётко формулирует задачу (добыть, доставить) и
      называет локации, но сознательно не упоминает врагов, чтобы не спойлерить игроку
      сюрприз и не делать акцент на бою, так как это квест типа 'Доставка'.
    resource_to_deliver:
      amount: 6 единиц — это разумный объём для первого квеста. Это не 1-2 (слишком
        тривиально), и не 20 (слишком гриндильно). Позволяет игроку познакомиться
        с механикой добычи ресурсов.
      character: Выбран Гаррик Кузнец, потому что это один из немногих персонажей,
        которые принимают Уголь (ранг 1). Игрок находится на 1 уровне, поэтому взаимодействие
        с персонажами, требующими ресурсы высокого ранга, невозможно. Гаррик идеально
        подходит как стартовый квестодатель.
      dialogs: Диалог построен на объяснении бытовой нужды (не хватает угля для кузни),
        что мотивирует квест. Гаррик Кузнец — логичный отправитель, так как он изначально
        находится в Королевской столице, где предположительно стартует игрок, и у
        него в списке принимаемых предметов есть Уголь 1-го ранга. Указано конкретное
        место добычи — Одуванчиковая Поляна, которое существует в игре и содержит
        нужный ресурс. Количество (6) достаточно для создания ощущения задания, но
        не чрезмерно для первого уровня. В диалоге даётся цель доставки другому персонажу.
      resource: Выбран Уголь, так как это ресурс 1-го ранга, для добычи которого у
        игрока уже есть необходимый инструмент (Деревянная кирка с рангом 1). Это
        соответствует прогрессии и не блокирует выполнение задания.
    reward: Наградой выбран Каменный меч (ранг 2, урон 4). У игрока в инвентаре его
      нет (только Деревянный меч), поэтому правило не нарушено. Этот предмет является
      значимым апгрейдом для игрока 1-го уровня, мотивируя его на выполнение задания.
  objective_description: Кузнец Гаррик просит вас добыть 6 единиц угля в Одуванчиковой
    Поляне и доставить его сестре, Лире Лекарю, в Деревню Речных Лугов.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: Добро пожаловать в Деревню Речных Лугов! Ты от моего брата, Гаррика?
          Узнаю его узелки на мешке.
        speaker: Лира Лекарь
      - remark: Позволь взглянуть... Да, уголь хорошего качества. Он отлично подойдёт
          для стерилизации инструментов и приготовления целебных отваров.
        speaker: Лира Лекарь
      - remark: Спасибо, что доставил. Дорога из Королевской столицы не близкая. Надеюсь,
          тебе не встретились те назойливые гоблины с поляны?
        speaker: Лира Лекарь
      - remark: Встретились. Пришлось... убедить их, что этот уголь не для них.
        speaker: Игрок
      - remark: Бедняги, они вечно голодные. Но ты молодец, что справился. Держи,
          это тебе за труды. Не самый мощный клинок, но надёжнее твоего деревянного.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Хи-хи! Что это у нас тут? Мешок с углём? Отдай добычу, человечишка,
          и мы тебя не тронем!
        speaker: Гоблин-вор
      - remark: Угол нужен кузнецу. И я его туда доставлю. Не уверен, что джентльмены
          вашей профессии должны этим интересоваться.
        speaker: Игрок
      - remark: Джент-мен? Мы не джент-мены, мы — добытчики! Твой уголь теперь наш!
        speaker: Гоблин-вор
      - remark: Эй, Блинк! Иди сюда, тут один глупец с сокровищами!
        speaker: Гоблин-вор
      - remark: О-о-о! Блестящий уголь! Дай-дай-дай!
        speaker: Гоблин-вор (Блинк)
      - remark: Вижу, переговоры не вариант. Придётся защищать груз.
        speaker: Игрок
      - remark: А-а-а, драться! Мы любим драться!
        speaker: Гоблин-вор
      enemy: Гоблин-вор
    resource_to_deliver:
      amount: 6
      character: Гаррик Кузнец
      dialogs:
      - remark: Эй, новичок! Ты как раз вовремя. У меня тут заказ на новую партию
          инструментов, но запасы угля кончаются. Без угля я не смогу разжечь горны.
        speaker: Гаррик Кузнец
      - remark: На вылазку в прииски мне самому некогда — заказов выше крыши. Поможешь?
          Нужно добыть немного угля в Одуванчиковой Поляне, это совсем рядом.
        speaker: Гаррик Кузнец
      - remark: Твоя деревянная кирка как раз для этого подходит. Бери её, и вперёд.
          Шесть кусков угля мне будет достаточно, чтобы продержаться до следующей
          поставки.
        speaker: Гаррик Кузнец
      - remark: Как соберёшь, отнеси его сразу в Деревню Речных Лугов. Моя сестра,
          Лира Лекарь, ждёт партию материалов для изготовления лекарств. Она тебе
          хорошо заплатит.
        speaker: Гаррик Кузнец
      - remark: Дорога через поляну вроде бы безопасна, но будь начеку — там иногда
          шастают местные воришки. Удачи!
        speaker: Гаррик Кузнец
      resource: Уголь
  reward:
    item_name: Каменный меч
