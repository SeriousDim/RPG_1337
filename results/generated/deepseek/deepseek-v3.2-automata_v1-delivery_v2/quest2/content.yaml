quest:
  explanation:
    destination:
      character_to_deliver: Выбрана Лира Лекарь, которая отличается от Гаррика Кузнеца.
        Она находится в Деревне Речных Лугов, что логично для доставки ресурса, добытого
        рядом. Она также присутствует в списке уже сгенерированных персонажей и готова
        принять железную руду для своих нужд, согласно её списку accept_items.
      dialogs: Диалог с Лирой Лекарь при доставке ресурса в Деревню Речных Лугов.
        Она подтверждает получение заказа, благодарит, упоминает угрозы на дороге
        и вручает награду. Диалог соответствует характеру целителя и завершает цикл
        заданий. Количество реплик (5) соответствует требованиям.
    enemy_to_face:
      amount: Количество врагов - 1, минимум, разрешённый форматом. Это соответствует
        логике случайной встречи с одиночным бандитом и балансовым возможностям игрока
        на старте.
      dialogs: Диалог с Лесным разбойником при возвращении с добытой рудой. Враг представляет
        прямую угрозу, пытаясь отобрать груз. Диалог агрессивный и соответствует образу
        бандита. Количество реплик (6) соответствует требованиям. Появление врага
        логично вписывается в маршрут между локациями добычи и доставки.
      enemy: Выбран Лесной разбойник (ранг 1), так как это слабейший враг в мире.
        Урон игрока (2) позволяет убить его за 14 ударов (28 HP / 2). У врага урон
        4 за ход. Без брони игрок (100 HP) сможет выдержать 25 ходов врага, что делает
        бой выигрышным, хоть и ресурсозатратным по времени. Это подходящий по силе
        противник для новичка.
    objective_description: Описание цели фокусируется на основной задаче доставки
      (сбор и передача ресурса), как и требуется, без упоминания врага, игрок узнает
      о нём только в ходе выполнения.
    resource_to_deliver:
      amount: Установлено количество 16. Это достаточно для создания ощущения "задания",
        но не чрезмерно для стартового уровня. Это число не противоречит никаким балансным
        данным из мира.
      character: Выбран Гаррик Кузнец, так как он находится в стартовой локации (Королевская
        столица), знаком игроку (уже сгенерирован) и принимает для доставки ресурсы
        ранга 2 (Железо), что соответствует стартовому уровню.
      dialogs: Диалог с Гарриком Кузнецом в Королевской столице. Он знакомит с заданием,
        объясняет необходимость железной руды (ресурс ранга 2), указывает на опасность
        в пути и даёт точные инструкции по доставке Лире Лекарю. Количество реплик
        (7) соответствует требованиям. Диалог соответствует сеттингу и характеру NPC.
      resource: Выбрано Железо (ранг 2). Это следующий шаг в прогрессе после Угля
        (ранг 1). Для его добычи игроку нужен инструмент ранга 1 (что соответствует
        его деревянной кирке), что делает задание выполнимым. Этот ресурс присутствует
        в списке принимаемых Гарриком.
    reward:
      item_name: Каменный меч – это следующее по силе оружие (ранг 2, урон 4) после
        Деревянного меча (ранг 1, урон 2), который уже есть у игрока. Выдача этого
        предмета улучшит боевые возможности игрока. По правилам, Каменного меча нет
        в текущем инвентаре игрока, поэтому награда допустима и ценна.
  objective_description: Кузнец Гаррик просит вас добыть 16 слитков железной руды
    и доставить их Лире Лекарю в Деревню Речных Лугов.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: О, посетитель! Твоё лицо говорит мне, что ты не за целебным зельем
          пришёл. Что тебе нужно?
        speaker: Лира Лекарь
      - remark: Железная руда от Гаррика? Наконец-то! Я уже начала думать, что старый
          кузнец о своей клятве забыл. Мне она нужна для укрепляющих отваров.
        speaker: Лира Лекарь
      - remark: Позволь взглянуть... Да, качество хорошее. Рудник ещё не подвёл. Ты
          хорошо справился.
        speaker: Лира Лекарь
      - remark: Я слышала, в лесу орудует шайка разбойников. Надеюсь, они не доставили
          тебе хлопот.
        speaker: Лира Лекарь
      - remark: Спасибо за службу. Благодаря таким, как ты, деревня может спать спокойно.
          Прими это в знак благодарности.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Эй, парень! Что везешь в мешке? Поделишься с бедными путниками?
        speaker: Лесной разбойник
      - remark: Руда? Хм... Ценный груз. Королю, что ли, служишь? Мы тут сами себе
          короли.
        speaker: Лесной разбойник
      - remark: Быстро клади всё на землю и уходи, пока цел! Мы не любим, когда нам
          возражают.
        speaker: Лесной разбойник
      - remark: Ну что, решил играть в героя? Жаль, твоя сказка закончится здесь,
          в лесу!
        speaker: Лесной разбойник
      - remark: Ребята! Ещё один самоуверенный простак! Покажем ему, как мы встречаем
          гостей!
        speaker: Лесной разбойник
      - remark: Защищайся, если можешь! А лучше сразу беги, пока мы не разделали тебя,
          как курицу!
        speaker: Лесной разбойник
      enemy: Лесной разбойник
    resource_to_deliver:
      amount: 16
      character: Гаррик Кузнец
      dialogs:
      - remark: Добро пожаловать, путник! У меня дела спят. Королевским указом мне
          велено поставить мечи для ополчения, а железа в мастерской нет.
        speaker: Гаррик Кузнец
      - remark: Старый рудник близ Деревни Речных Лугов ещё не выработан, там можно
          найти железную руду. Но дорога небезопасна.
        speaker: Гаррик Кузнец
      - remark: Дубинки разбойников - не аргумент для хорошего меча, но твоей голове
          они вполне могут повредить. Будь осторожен.
        speaker: Гаррик Кузнец
      - remark: Добыть нужно 16 слитков чистой железной руды. Это не так уж и много
          для опытного шахтёра, но ты... Посмотрим, на что ты способен.
        speaker: Гаррик Кузнец
      - remark: Как соберёшь руду, отнеси её Лире Лекарю в Деревню Речных Лугов. Она
          ждёт поставки для своих лечебных настоев.
        speaker: Гаррик Кузнец
      - remark: Её хижина стоит у самого въезда в деревню, с крышей, покрытой соломой.
          Не перепутай.
        speaker: Гаррик Кузнец
      - remark: Если справишься, я дам тебе кое-что получше твоего деревянного зубочистки.
        speaker: Гаррик Кузнец
      resource: Железо
  reward:
    item_name: Каменный меч
