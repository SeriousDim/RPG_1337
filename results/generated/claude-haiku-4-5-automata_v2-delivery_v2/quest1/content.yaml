quest:
  explanation:
    destination:
      character_to_deliver: Лира Лекарь выбрана как персонаж-приемник ресурса (может
        принять Одуванчик согласно её конфигурации), находится в Деревне Речных Лугов
        и отличается от Гаррика Кузнеца. Это создаёт сюжетную связь между двумя локациями.
      dialogs: Диалоги содержат 5 реплик от Лиры Лекаря, которые благодарят игрока,
        признают его связь с Гаррик Кузнецом и наделяют квест смыслом. Реплики естественны
        для целительницы.
    enemy_to_face:
      amount: Количество 2 крыс выбрано как умеренный вызов, который должен занять
        несколько ходов (примерно 10 ударов на каждую крысу, в то время как враги
        наносят 2-4 урона в ход). Это тестирует боевые навыки без чрезмерной опасности.
      dialogs: Диалоги содержат 6 угрожающих реплик от Пещерной крысы, которые добавляют
        атмосферу опасности и напряжения при встрече с враг. Реплики соответствуют
        образу подземного хищника.
      enemy: 'Пещерная крыса выбрана потому, что это враг ранга 1 (max_possible: 10,
        for_this_item: 1), соответствующий уровню игрока. Она имеет 20 HP и 2 урона
        в ход, что не должно быть смертельным для игрока с 100 HP и мечом в 2 урона.'
    resource_to_deliver:
      amount: Количество 3 выбрано как разумное для уровня 1 новичка, не слишком обременительное,
        но требующее некоторых усилий на Одуванчиковой Поляне.
      character: Гаррик Кузнец выбран как персонаж, который может принять Одуванчик
        (rank 1) согласно его конфигурации. Он находится в Королевской столице, подходящей
        для первого квеста новичка.
      dialogs: Диалоги содержат 5 реплик от Гаррика Кузнеца, которые логично представляют
        квест, мотивируют игрока и предупреждают об опасности. Каждая реплика естественна
        и соответствует его роли как кузнеца, нуждающегося в ресурсах.
      resource: 'Одуванчик выбран, так как это ресурс ранга 1, доступный для игрока
        с базовым инвентарём (деревянная лопата имеет min_instrument_rank: 1). Ресурс
        отсутствует в инвентаре игрока.'
  objective_description: Помогите Гаррику Кузнецу из Королевской столицы, собрав три
    Одуванчика с Одуванчиковой Поляны. Затем доставьте ресурсы Лире Лекарю в Деревню
    Речных Лугов, которая нуждается в них для своих целебных зелий.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: Здравствуй, странник! Ты принёс мне то, что я просила?
        speaker: Лира Лекарь
      - remark: Одуванчик! Прекрасно, это именно то, что мне нужно.
        speaker: Лира Лекарь
      - remark: Гаррик служит мне верно, посылая добрых помощников. Я благодарна ему
          за это.
        speaker: Лира Лекарь
      - remark: Вот, возьми это как награду за твою помощь. Ты хорошо потрудился!
        speaker: Лира Лекарь
      - remark: Приходи ко мне ещё, если понадобится помощь лекаря.
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 2
      dialogs:
      - remark: Сшшшш! Кто смеет входить в мой лес?
        speaker: Пещерная крыса
      - remark: Ты будешь добычей для моего пропитания!
        speaker: Пещерная крыса
      - remark: Сшшшш! Защищайся, смертный!
        speaker: Пещерная крыса
      - remark: Мой голод не знает границ!
        speaker: Пещерная крыса
      - remark: Ты не пройдёшь дальше живым!
        speaker: Пещерная крыса
      - remark: Сшшшш!
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 3
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую, молодой путник! Мне срочно нужен Одуванчик для изготовления
          специального зелья.
        speaker: Гаррик Кузнец
      - remark: На Одуванчиковой Поляне их должно быть предостаточно. Сможешь ли ты
          собрать мне несколько?
        speaker: Гаррик Кузнец
      - remark: Я щедро вознагражду тебя за помощь, не беспокойся.
        speaker: Гаррик Кузнец
      - remark: Но учти, путь туда опасен. Будь осторожен на дороге.
        speaker: Гаррик Кузнец
      - remark: Возвращайся с Одуванчиками, и я дам тебе хорошее вознаграждение.
        speaker: Гаррик Кузнец
      resource: Одуванчик
  reward:
    item_name: Деревянная лопата
