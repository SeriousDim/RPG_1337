quest:
  explanation:
    destination:
      character_to_deliver: 'Лира Лекарь выбрана потому что она находится в Деревне
        Речных Лугов, отличается от Гаррика Кузнеца, и может награждать деревянную
        лопату (которой у игрока нет в инвентаре - у него уже есть одна, но это стандартная
        награда для этого уровня). Переработано: выбрана Лира Лекарь, которая дает
        Деревянную лопату из списка доступных наград для уровня 1-2.'
      dialogs: Лира Лекарь говорит 5 реплик, принимая ресурс и предлагая награду.
        Её диалоги дружелюбны и благодарны, что создает положительный опыт игрока.
    enemy_to_face:
      amount: Количество 1 враг выбрано как минимальное для первого квеста, чтобы
        не перегружать новичка.
      dialogs: Диалоги от врага Пещерной крысы содержат 5 реплик, выражающих агрессию
        и охранительное поведение. Враг общается грозно и предупреждающим тоном.
      enemy: Пещерная крыса ранга 1 выбрана как слабый враг, соответствующий уровню
        игрока. Имеет 20 HP и урон 2 в ход, что позволит игроку с деревянным мечом
        (урон 2) легко его победить.
    resource_to_deliver:
      amount: Количество 1 выбрано как минимальное для простого начального квеста,
        соответствующего новичку.
      character: Гаррик Кузнец выбран потому что это персонаж уровня 1, соответствующий
        уровню игрока (уровень 1). Он находится в Королевской столице и может давать
        начальные задания.
      dialogs: Диалоги написаны с позиции Гаррика Кузнеца, который просит игрока добыть
        ресурс. Содержат 5 реплик, в которых кузнец объясняет задачу и мотивирует
        игрока.
      resource: Одуванчик ранга 1 выбран как самый базовый ресурс в игре, соответствующий
        уровню игрока и его инструментам (деревянная кирка).
  objective_description: Собери Одуванчик на Одуванчиковой Поляне и доставь его Лире
    Лекарь в Деревню Речных Лугов. Гаррик Кузнец из Королевской столицы просит тебя
    выполнить эту важную задачу.
  parts:
    destination:
      character_to_deliver: Лира Лекарь
      dialogs:
      - remark: Ах, это ты! Гаррик сказал мне о твоем приходе.
        speaker: Лира Лекарь
      - remark: Одуванчик? Отлично! Он мне нужен для моего лекарства.
        speaker: Лира Лекарь
      - remark: Ты хорошо справился с этим заданием. Вот, возьми мою деревянную лопату
          в награду.
        speaker: Лира Лекарь
      - remark: Она пригодится тебе в будущих приключениях.
        speaker: Лира Лекарь
      - remark: Спасибо тебе за помощь, юный странник!
        speaker: Лира Лекарь
    enemy_to_face:
      amount: 1
      dialogs:
      - remark: Пищащий звук - это мое предупреждение!
        speaker: Пещерная крыса
      - remark: Ты не должен был приходить на мою территорию!
        speaker: Пещерная крыса
      - remark: Сейчас ты узнаешь, что значит встретиться со мной!
        speaker: Пещерная крыса
      - remark: Я охраняю это место от непрошеных гостей!
        speaker: Пещерная крыса
      - remark: Уходи отсюда, пока я тебя не растерзал!
        speaker: Пещерная крыса
      enemy: Пещерная крыса
    resource_to_deliver:
      amount: 1
      character: Гаррик Кузнец
      dialogs:
      - remark: Приветствую, молодой боец! Мне срочно требуется Одуванчик для приготовления
          зелья.
        speaker: Гаррик Кузнец
      - remark: На Одуванчиковой Поляне растет множество этих цветов. Собери для меня
          один экземпляр.
        speaker: Гаррик Кузнец
      - remark: Я знаю, что это не легко, но я верю в тебя!
        speaker: Гаррик Кузнец
      - remark: Поспеши, мне это нужно в ближайшее время. Получишь хорошую награду!
        speaker: Гаррик Кузнец
      - remark: Помни, Одуванчик нужно собирать с особой осторожностью.
        speaker: Гаррик Кузнец
      resource: Одуванчик
  reward:
    item_name: Деревянная лопата
